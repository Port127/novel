# 去AI感规则库
# 由 /anti-ai-check 读取，/anti-ai-rewrite 参照执行

rules:

  # ── 一、套话与AI腔调监控词表 ──
  phrase_watchlist:
    # 空泛情绪词
    - 不由得
    - 不禁
    - 竟然
    - 一丝
    - 这一刻
    - 那一刻
    - 与此同时
    - 心中一动
    - 心中暗想
    - 内心深处
    - 眼中闪过一丝
    - 嘴角微微上扬
    # AI 典型比喻句式
    - 仿佛
    - 宛如
    - 犹如
    - 恍若
    - 好似
    - 如同.*一般
    - 像是被.*洗礼
    - 仿佛在诉说着
    # 机械转折
    - 然而
    - 却不曾想
    - 殊不知
    - 岂料
    # 空泛修饰
    - 深邃的目光
    - 坚定的眼神
    - 淡淡的笑意
    - 嘴角勾起一抹
    - 不经意间
    - 缓缓开口
    - 微微颔首
    - 语气不容置疑
    # 叙事腔调
    - 这场.*注定
    - 命运的齿轮
    - 故事才刚刚开始
    - 这只是.*的开始
    - 一切都将.*改变

  # ── 二、句式与结构阈值 ──
  sentence_pattern_limits:
    repeated_short_sentence_ratio: 0.35
    parallel_structure_ratio: 0.25       # 排比/并列结构占比上限
    consecutive_same_opener: 3           # 连续相同句首上限（如连续3个"他"开头）

  # ── 三、比喻密度控制 ──
  metaphor:
    max_per_1000_chars: 3                # 每千字比喻上限
    max_consecutive: 1                   # 连续比喻句上限（不允许比喻叠比喻）
    watchlist_patterns:                  # 典型AI比喻模式
      - "如同.*一般"
      - "仿佛.*似的"
      - "像.*一样"
      - "宛如.*般"
      - "恍若.*"
    preferred_fix: "用具体动作或感官细节替代抽象比喻"

  # ── 四、场景描写占比控制 ──
  description_ratio:
    max_pure_description_ratio: 0.30     # 纯描写段落占全文上限 30%
    max_consecutive_desc_paragraphs: 2   # 连续纯描写段落上限
    definition: "纯描写 = 无对白、无动作、无心理的环境/外貌/氛围段落"
    preferred_fix: "在描写中穿插角色动作或反应，让描写服务于叙事推进"

  # ── 五、对白质量控制 ──
  dialogue:
    require_character_voice_difference: true
    min_distinct_markers_per_main_character: 2
    # 对白同质化检测
    generic_dialogue_patterns:
      - "你说得对"
      - "我明白了"
      - "这不可能"
      - "你到底想怎样"
      - "够了"
      - "原来如此"
      - "事情没那么简单"
    max_generic_ratio: 0.20              # 通用对白占比上限
    # 对白口语化要求
    require_speech_pattern_ref: true     # 生成对白时必须参照角色 speech_pattern
    allow_profanity_per_character: true  # 粗话由角色 profanity_level 控制，不一刀切禁止

  # ── 六、评分标准 ──
  scoring:
    high_risk_below: 60
    medium_risk_below: 80
    dimensions:
      - name: 套话密度
        weight: 0.20
      - name: 句式重复
        weight: 0.15
      - name: 比喻过载
        weight: 0.20
      - name: 描写堆砌
        weight: 0.15
      - name: 对白同质化
        weight: 0.20
      - name: 机械转折
        weight: 0.10
