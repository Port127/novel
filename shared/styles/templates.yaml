# 风格模板库
# 存储可复用的写作风格模板

styles:
  # 示例风格模板
  - name: 古龙风
    tags: [武侠, 冷峻, 短句]
    features:
      sentence:
        - 短句为主，多在10字以内
        - 常用留白，意犹未尽
        - 对话简洁，一字千金
      rhetoric:
        - 少修辞，重意境
        - 常用对比、反问
      dialogue:
        - 人物语言精炼
        - 常用：冷笑、淡淡道、沉声道
        - 对话比动作重要
      rhythm:
        - 慢节奏，留悬念
        - 章末常有反转
    examples:
      - "剑出鞘，人已死。"
      - "他笑了，笑得很冷。"
    use_cases:
      - 武侠对决
      - 冷峻场景
      - 人物刻画

  - name: 热血玄幻
    tags: [玄幻, 热血, 快节奏]
    features:
      sentence:
        - 短句为主，节奏明快
        - 大量感叹句
        - 常用排比增强气势
      rhetoric:
        - 比喻：自然意象（火焰、雷霆）
        - 夸张：力量描写夸张
        - 对比：废柴vs天才
      dialogue:
        - 直接简洁
        - 主角话少狠，配角话多怂
      rhythm:
        - 快节奏，少铺垫
        - 高潮密集，章章有爆点
        - 章末钩子
    examples:
      - "恐怖如斯！"
      - "这股力量，竟然恐怖到这种程度！"
    use_cases:
      - 战斗场面
      - 突破场景
      - 热血情节

# 细腻言情风格
  - name: 细腻言情
    tags: [言情, 细腻, 情感]
    features:
      sentence:
        - 长短句交替
        - 心理描写细腻
        - 感官描写丰富
      rhetoric:
        - 比喻：情感相关意象
        - 排比：情绪递进
      dialogue:
        - 对话感性
        - 内心独白多
      rhythm:
        - 慢节奏，重情感
        - 细节刻画
    examples:
      - "心像被什么东西轻轻揪了一下。"
      - "那一刻，时间仿佛静止了。"
    use_cases:
      - 情感场景
      - 内心戏
      - 感情发展

  - name: 吐槽幽默
    tags: [幽默, 吐槽, 轻松, 都市]
    features:
      sentence:
        - 用严肃的语气说荒唐的事
        - 主角内心吐槽与外部表情形成反差
        - 短句收尾制造笑点（"完了。""谢谢，有被冒犯到。"）
      rhetoric:
        - 降格法：用高级词汇描述低级事物（"以一种不可名状的优雅姿态——摔了"）
        - 反讽：正话反说（"真是谢谢你的高见"）
        - 类比错位：跨领域类比制造荒谬感
      dialogue:
        - 角色间信息差制造误会式幽默
        - 接话方式出其不意——预期 A 回答 B
        - 捧哏逗哏节奏：一个认真一个跑偏
      rhythm:
        - 铺垫→铺垫→打断（三段式笑点结构）
        - 紧张场景中插入不合时宜的日常细节消解气氛
        - 笑点之后不解释，留给读者反应时间
    examples:
      - "他用一种看垃圾分类指南的眼神审视着这份合同。"
      - "\"你有什么遗言吗？\"陈默想了想：\"外卖到了帮我拿一下。\""
    use_cases:
      - 都市日常
      - 紧张场景的气氛调节
      - 角色人设中的"反差萌"

  - name: 冷幽默
    tags: [幽默, 冷幽默, 反讽, 黑色幽默]
    features:
      sentence:
        - 语气平静如水，内容荒谬离谱
        - 不用感叹号，用句号和省略号制造冷感
        - 用客观描述代替情绪词
      rhetoric:
        - 低调陈述法：用轻描淡写描述重大事件（"他死了。这让午饭时间变得稍微尴尬了一些。"）
        - 精确到荒谬：用过度精确的数字或描述制造喜感
        - 并列错位：把不同量级的事物放在同一列表
      dialogue:
        - 一本正经地胡说八道
        - 对话双方各说各的、逻辑自洽但完全错位
        - 用礼貌和客套包裹恶意或荒唐
      rhythm:
        - 慢节奏蓄力——在读者以为是正经叙事时突然拐弯
        - 重复与累积——同一荒唐事重复出现形成running gag
        - 章末用看似无关的冷淡句子回扣前文
    examples:
      - "根据统计，他是今天第三个试图用拳头和墙壁讲道理的人。墙壁依旧不为所动。"
      - "\"计划有变。\"这是今天第七次听到这句话了。他开始怀疑这个团队从来没有过计划。"
    use_cases:
      - 末世/废土文中的生存荒诞
      - 理性型主角的内心独白
      - 黑色幽默基调的作品

