# 风格模板库
# 存储可复用的写作风格模板

styles:
  # 示例风格模板
  - name: 古龙风
    tags: [武侠, 冷峻, 短句]
    features:
      sentence:
        - 短句为主，多在10字以内
        - 常用留白，意犹未尽
        - 对话简洁，一字千金
      rhetoric:
        - 少修辞，重意境
        - 常用对比、反问
      dialogue:
        - 人物语言精炼
        - 常用：冷笑、淡淡道、沉声道
        - 对话比动作重要
      rhythm:
        - 慢节奏，留悬念
        - 章末常有反转
    examples:
      - "剑出鞘，人已死。"
      - "他笑了，笑得很冷。"
    use_cases:
      - 武侠对决
      - 冷峻场景
      - 人物刻画

  - name: 热血玄幻
    tags: [玄幻, 热血, 快节奏]
    features:
      sentence:
        - 短句为主，节奏明快
        - 大量感叹句
        - 常用排比增强气势
      rhetoric:
        - 比喻：自然意象（火焰、雷霆）
        - 夸张：力量描写夸张
        - 对比：废柴vs天才
      dialogue:
        - 直接简洁
        - 主角话少狠，配角话多怂
      rhythm:
        - 快节奏，少铺垫
        - 高潮密集，章章有爆点
        - 章末钩子
    examples:
      - "恐怖如斯！"
      - "这股力量，竟然恐怖到这种程度！"
    use_cases:
      - 战斗场面
      - 突破场景
      - 热血情节

# 细腻言情风格
  - name: 细腻言情
    tags: [言情, 细腻, 情感]
    features:
      sentence:
        - 长短句交替
        - 心理描写细腻
        - 感官描写丰富
      rhetoric:
        - 比喻：情感相关意象
        - 排比：情绪递进
      dialogue:
        - 对话感性
        - 内心独白多
      rhythm:
        - 慢节奏，重情感
        - 细节刻画
    examples:
      - "心像被什么东西轻轻揪了一下。"
      - "那一刻，时间仿佛静止了。"
    use_cases:
      - 情感场景
      - 内心戏
      - 感情发展

# 使用 /style-create 添加更多风格