# worldbuilding.yaml schema
# 世界观设定文件
# 路径: novels/{project_id}/settings/worldbuilding.yaml

# 字段说明格式：
# 字段名: 示例值                  # [R|O] | 字段说明
# R = 必填, O = 可选
# 示例值仅作格式参考，实际内容由用户/AI生成

world_type: ""                        # R | 世界观类型
                                      # 可选值：修仙/都市/科幻/悬疑/历史/武侠/奇幻/其他

setting_period: ""                    # O | 时间背景

# ──────────────────────────────────────────────
# 力量体系（可选，部分类型可能不存在）
# ──────────────────────────────────────────────

power_system:                         # O | 力量体系对象
  name: ""                            # R | 体系名称
  type: ""                            # R | 体系类型
                                      # 可选值：灵气/魔法/斗气/科技/超能力/异能/无

  ranks: []                           # R | 等级划分列表
                                      # 每个等级包含：
                                      # - name: 等级名称
                                      # - description: 等级描述
                                      # - capabilities: 能力列表（可选）

  rules: []                           # O | 核心规则列表
                                      # 每个规则包含：
                                      # - rule: 规则内容
                                      # - implications: 规则影响（可选）

  limitations: []                     # O | 限制条件列表
                                      # 每个限制包含：
                                      # - limitation: 限制内容
                                      # - consequences: 违反后果（可选）

# ──────────────────────────────────────────────
# 势力组织
# ──────────────────────────────────────────────

factions: []                          # O | 势力列表
                                      # 每个势力包含：
                                      # - name: 势力名称
                                      # - type: 势力类型
                                      #   可选值：宗门/王朝/公司/家族/军团/教会/帮派/组织/其他
                                      # - stance: 立场
                                      #   可选值：正派/中立/反派/不确定
                                      # - territory: 势力范围（可选）
                                      # - key_figures: 关键人物列表（可选）
                                      # - description: 势力描述（可选）

# ──────────────────────────────────────────────
# 地理空间
# ──────────────────────────────────────────────

locations: []                         # O | 地点列表
                                      # 每个地点包含：
                                      # - name: 地点名称
                                      # - type: 地点类型
                                      #   可选值：城市/山区/海域/秘境/建筑/区域/其他
                                      # - description: 地点描述（可选）
                                      # - significance: 剧情重要性（可选）
                                      # - sub_locations: 子地点列表（可选）

# ──────────────────────────────────────────────
# 背景知识
# ──────────────────────────────────────────────

lore:                                 # O | 背景知识
  history: []                         # 历史事件列表
                                      # 每个事件包含：
                                      # - event: 事件名称
                                      # - period: 发生年代
                                      # - impact: 对剧情的影响

  artifacts: []                       # 重要物品列表
                                      # 每个物品包含：
                                      # - name: 物品名称
                                      # - type: 物品类型
                                      # - owner: 拥有者（可选）
                                      # - description: 物品描述
                                      # - significance: 剧情重要性（可选）

  terminology: []                     # 术语词典列表
                                      # 每个术语包含：
                                      # - term: 术语名称
                                      # - category: 所属类别（可选）
                                      # - meaning: 含义解释
                                      # - first_appearance: 首次出现章节（可选）