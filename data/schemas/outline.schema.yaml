# outline.yaml schema
# 大纲设定文件
# 路径: novels/{project_id}/settings/outline.yaml

# 字段说明格式：
# 字段名: 示例值                  # [R|O] | 字段说明
# R = 必填, O = 可选
# 示例值仅作格式参考，实际内容由用户/AI生成

premise: ""                           # R | 核心前提（一句话概括全书）
theme: []                             # R | 主题标签列表
                                      # 示例值类型：成长/爱情/复仇/探索/生存/其他

tone: []                              # O | 基调标签列表
                                      # 示例值类型：热血/轻松/沉重/悬疑/温馨/其他

# ──────────────────────────────────────────────
# 三幕式结构
# ──────────────────────────────────────────────

acts: []                              # R | 幕列表

# 每幕包含：
# - act: 幕编号（1/2/3...）
# - title: 幕名称
# - chapters: [起始章, 结束章]
# - arc: 本幕叙事弧线描述
#
# - sequences: 序列列表
#   每个序列包含：
#   - sequence: 序列编号
#   - title: 序列名称
#   - chapters: [起始章, 结束章]
#   - beats: 节拍列表
#     每个节拍包含：
#     - beat: 节拍编号
#     - title: 节拍名称
#     - chapter: 所在章节
#     - description: 节拍描述
#     - tension: 张力值（1-5，1=最低，5=最高）
#
# - turning_point: 转折点信息
#   - chapter: 转折章节
#   - description: 转折描述
#   - type: 转折类型
#     可选值：inciting_incident/first_threshold/midpoint/dark_night/climax

# ──────────────────────────────────────────────
# 情节线索（可选，多线叙事时使用）
# ──────────────────────────────────────────────

plotlines: []                         # O | 情节线索列表
                                      # 每个线索包含：
                                      # - name: 线索名称
                                      # - description: 线索描述
                                      # - importance: 重要程度（primary/secondary/tertiary）
                                      # - chapters_covered: [起始章, 结束章]
                                      # - stages: 线索发展阶段（可选）

# ──────────────────────────────────────────────
# 钩子网络（可选，伏笔→回收）
# ──────────────────────────────────────────────

hooks: []                             # O | 钩子列表
                                      # 每个钩子包含：
                                      # - hook_id: 钩子ID
                                      # - hook_type: 钩子类型
                                      #   可选值：道具/人物/悬念/信息/情感
                                      # - planted_chapter: 埋设章节
                                      # - detail: 钩子描述
                                      # - harvested_chapter: 回收章节（可选）
                                      # - resolution: 回收方式（可选）

# ──────────────────────────────────────────────
# 节奏曲线（可选）
# ──────────────────────────────────────────────

pacing_curve: []                      # O | 张力曲线关键节点
                                      # 每个节点包含：
                                      # - chapter: 章节号
                                      # - tension: 张力值（1-5）
                                      # - note: 张力说明（可选）