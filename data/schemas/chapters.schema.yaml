# chapters_index.yaml schema
# 章节索引文件
# 路径: novels/{project_id}/settings/chapters_index.yaml

# R = 必填, O = 可选

chapters: []                          # R | 章节列表

# 每个章节包含：
# chapter: 1                         # R | 章节号
# title: ""                          # R | 章节标题
# file: "content/chapter_001.md"     # R | 正文路径
# outline_file: "settings/chapter_outlines/chapter_001.md"  # R | 单章详细蓝图路径
# status: "planned"                  # R | 状态 planned/draft/written/revised
# words_target: 3000                 # R | 目标字数
# words: 0                           # R | 实际字数
# density: "密"                      # R | 密度（密/中/疏）
# tension: 3                         # R | 张力值（1-5）
# summary:                           # R | 五要素摘要
#   main_plot: ""
#   character_change: ""
#   foreshadowing: ""
#   emotion: ""
#   hook: ""
# beats: []                          # R | 节拍列表，3-15 个
# functions: []                      # O | 章节功能标签列表
# characters: []                     # O | 出场人物列表
# beat_ref:                          # O | 对应大纲节拍
#   act: 1
#   sequence: 1
#   beat: 1

stats:
  total: 0
  planned: 0
  draft: 0
  written: 0
  revised: 0
  total_words: 0
