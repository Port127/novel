# project.yaml schema
# 项目元信息文件
# 路径: novels/{project_id}/project.yaml

# 字段说明格式：
# 字段名: 示例值                  # [R|O] | 字段说明
# R = 必填, O = 可选
# 示例值仅作格式参考，实际内容由用户填写或系统生成

# ──────────────────────────────────────────────
# 基本信息
# ──────────────────────────────────────────────

project_id: ""                        # R | 项目ID（系统自动生成）
                                      # 格式：nv_{YYYYMMDD}_{random4}

name: ""                              # R | 项目名称（书名）
author: ""                            # R | 作者名
genre: ""                             # R | 类型标签
                                      # 可选值：修仙/都市/科幻/悬疑/历史/武侠/奇幻/其他

# ──────────────────────────────────────────────
# 状态流转
# ──────────────────────────────────────────────

# 状态流：planning → drafting → revising → completed
#   planning   = 设定阶段（世界观/大纲/人物）
#   drafting   = 写作阶段（章节正文）
#   revising   = 修改阶段（润色/调整）
#   completed  = 完成

status: planning                      # R | 项目状态

# ──────────────────────────────────────────────
# 时间信息
# ──────────────────────────────────────────────

created: ""                           # R | 创建日期（YYYY-MM-DD）
updated: ""                           # R | 最后更新日期（YYYY-MM-DD）

# ──────────────────────────────────────────────
# 统计信息
# ──────────────────────────────────────────────

stats:
  chapters_written: 0                 # R | 已写章节数
  chapters_planned: 0                 # R | 计划章节数
  words_total: 0                      # R | 总字数

# ──────────────────────────────────────────────
# 引用信息（可选）
# ──────────────────────────────────────────────

references: []                        # O | 关联的素材引用列表
                                      # 每个引用包含：
                                      # - material_id: 素材ID（来自 novel-material）
                                      # - type: 引用类型（outline/worldbuilding/character/chapter）
                                      # - note: 备注

# ──────────────────────────────────────────────
# AI 配置（可选）
# ──────────────────────────────────────────────

ai_config:
  model: ""                           # O | 默认模型
  style_guide: ""                     # O | 风格指南文本
  auto_save: true                     # O | 自动保存 AI 生成记录