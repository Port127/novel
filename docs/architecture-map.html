<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Novel Writing System — Architecture Map</title>
<style>
/* ═══ Reset & Base ═══ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0b0f19; --bg-card: #141927; --bg-card-hover: #1a2035;
  --border: #1e293b; --border-active: #475569;
  --text: #e2e8f0; --text-muted: #94a3b8; --text-dim: #64748b;
  --accent: #8b5cf6; --accent-glow: rgba(139,92,246,.25);
  --radius: 12px; --radius-sm: 8px;
}
html { font-size: 15px; scroll-behavior: smooth; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
  background: var(--bg); color: var(--text); line-height: 1.6;
  min-height: 100vh; overflow-x: hidden;
}
a { color: var(--accent); text-decoration: none; }

/* ═══ Animated background grid ═══ */
body::before {
  content: ""; position: fixed; inset: 0; z-index: -1;
  background-image:
    radial-gradient(circle at 20% 30%, rgba(139,92,246,.06) 0%, transparent 50%),
    radial-gradient(circle at 80% 70%, rgba(59,130,246,.06) 0%, transparent 50%),
    linear-gradient(rgba(30,41,59,.3) 1px, transparent 1px),
    linear-gradient(90deg, rgba(30,41,59,.3) 1px, transparent 1px);
  background-size: 100% 100%, 100% 100%, 60px 60px, 60px 60px;
}

/* ═══ Header ═══ */
.header {
  text-align: center; padding: 3.5rem 2rem 2rem;
  background: linear-gradient(180deg, rgba(139,92,246,.08) 0%, transparent 100%);
}
.header h1 { font-size: 2.6rem; font-weight: 700; letter-spacing: .02em; }
.header h1 span { background: linear-gradient(135deg, #a78bfa, #60a5fa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
.header .subtitle { color: var(--text-muted); font-size: 1.15rem; margin-top: .5rem; }
.header .version { display: inline-block; margin-top: .75rem; padding: .2rem .8rem; border-radius: 20px; font-size: .8rem; color: var(--accent); border: 1px solid rgba(139,92,246,.3); }

/* ═══ Stats Bar ═══ */
.stats { display: flex; justify-content: center; gap: 2rem; flex-wrap: wrap; padding: 1.5rem 2rem 2.5rem; }
.stat-card {
  text-align: center; padding: 1.2rem 2rem; border-radius: var(--radius);
  background: var(--bg-card); border: 1px solid var(--border);
  min-width: 140px; transition: transform .2s, border-color .2s;
}
.stat-card:hover { transform: translateY(-2px); border-color: var(--border-active); }
.stat-value { font-size: 2.4rem; font-weight: 800; font-variant-numeric: tabular-nums; background: linear-gradient(135deg, #a78bfa, #60a5fa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
.stat-card:nth-child(1) .stat-value { background: linear-gradient(135deg, #a78bfa, #c084fc); -webkit-background-clip: text; background-clip: text; }
.stat-card:nth-child(2) .stat-value { background: linear-gradient(135deg, #60a5fa, #38bdf8); -webkit-background-clip: text; background-clip: text; }
.stat-card:nth-child(3) .stat-value { background: linear-gradient(135deg, #34d399, #2dd4bf); -webkit-background-clip: text; background-clip: text; }
.stat-card:nth-child(4) .stat-value { background: linear-gradient(135deg, #fbbf24, #fb923c); -webkit-background-clip: text; background-clip: text; }
.stat-label { font-size: .85rem; color: var(--text-muted); margin-top: .2rem; }

/* ═══ Section ═══ */
.section { max-width: 1280px; margin: 0 auto; padding: 0 2rem; }
.section-title {
  display: flex; align-items: center; gap: .75rem; margin-bottom: 1.5rem;
  font-size: 1.15rem; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: .08em;
}
.section-title::after { content: ""; flex: 1; height: 1px; background: var(--border); }

/* ═══ Layer ═══ */
.layer {
  position: relative; margin-bottom: 1.2rem; padding: 1.5rem;
  border-radius: var(--radius); border: 1px solid var(--border);
  background: var(--bg-card);
}
.layer-header { display: flex; align-items: baseline; gap: .75rem; margin-bottom: 1rem; }
.layer-badge {
  font-size: .7rem; font-weight: 700; padding: .15rem .6rem; border-radius: 4px;
  text-transform: uppercase; letter-spacing: .06em; color: #fff;
}
.layer-name { font-size: 1.1rem; font-weight: 600; }
.layer-sub { font-size: .8rem; color: var(--text-dim); }
.layer-desc { font-size: .85rem; color: var(--text-muted); margin-bottom: 1rem; }

/* ═══ Layer connectors ═══ */
.layer-connector {
  display: flex; justify-content: center; padding: .3rem 0;
}
.layer-connector svg { width: 24px; height: 28px; }
.layer-connector path { stroke: var(--border-active); stroke-width: 2; fill: none; stroke-dasharray: 4 3; }

/* ═══ Module Cards ═══ */
.modules-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: .75rem;
}
.module-card {
  padding: 1rem; border-radius: var(--radius-sm);
  border: 1px solid var(--border); background: rgba(255,255,255,.02);
  cursor: pointer; transition: all .2s; position: relative; overflow: hidden;
}
.module-card::before {
  content: ""; position: absolute; top: 0; left: 0; right: 0; height: 2px;
  opacity: 0; transition: opacity .2s;
}
.module-card:hover { background: var(--bg-card-hover); border-color: var(--border-active); transform: translateY(-1px); }
.module-card:hover::before { opacity: 1; }
.module-card.expanded { border-color: var(--border-active); background: var(--bg-card-hover); }
.module-card.highlighted { border-color: var(--accent); box-shadow: 0 0 20px var(--accent-glow); animation: pulse-glow 1.5s ease-in-out infinite alternate; }
.module-card.highlighted::before { opacity: 1; }
@keyframes pulse-glow { from { box-shadow: 0 0 12px var(--accent-glow); } to { box-shadow: 0 0 28px var(--accent-glow); } }
.module-head { display: flex; align-items: center; gap: .5rem; }
.module-icon { font-size: 1.3rem; }
.module-name { font-weight: 600; font-size: .95rem; }
.module-count {
  margin-left: auto; font-size: .7rem; font-weight: 600; padding: .1rem .45rem;
  border-radius: 10px; background: rgba(255,255,255,.06); color: var(--text-dim);
}
.module-desc { font-size: .78rem; color: var(--text-dim); margin-top: .4rem; line-height: 1.5; }

/* ═══ Skills list (expandable) ═══ */
.skills-list {
  max-height: 0; overflow: hidden; transition: max-height .35s ease;
  margin-top: 0;
}
.module-card.expanded .skills-list { margin-top: .75rem; }
.skill-item {
  display: flex; align-items: baseline; gap: .5rem;
  padding: .35rem 0; border-top: 1px solid rgba(255,255,255,.04);
  font-size: .8rem;
}
.skill-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; margin-top: 6px; }
.skill-name { font-weight: 500; white-space: nowrap; }
.skill-desc { color: var(--text-dim); }

/* ═══ Pipeline composition overlay ═══ */
.pipeline-hint {
  position: absolute; bottom: .5rem; right: .75rem;
  font-size: .65rem; color: var(--text-dim); opacity: 0;
  transition: opacity .2s;
}
.module-card:hover .pipeline-hint { opacity: 1; }

/* ═══ Lifecycle Flow ═══ */
.lifecycle { padding: 3rem 0; }
.lifecycle-track {
  display: flex; align-items: stretch; gap: 0; overflow-x: auto;
  padding: 1rem .5rem 1.5rem; -webkit-overflow-scrolling: touch;
}
.lifecycle-step {
  display: flex; flex-direction: column; align-items: center;
  min-width: 110px; flex: 1; position: relative;
}
.lifecycle-node {
  width: 46px; height: 46px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 1rem; font-weight: 700; color: #fff;
  position: relative; z-index: 2; transition: transform .2s;
  cursor: default;
}
.lifecycle-step:hover .lifecycle-node { transform: scale(1.15); }
.lifecycle-label { margin-top: .6rem; font-size: .82rem; font-weight: 600; text-align: center; }
.lifecycle-sub { font-size: .7rem; color: var(--text-dim); text-align: center; margin-top: .15rem; max-width: 110px; }
.lifecycle-arrow {
  position: absolute; top: 23px; left: calc(50% + 23px); width: calc(100% - 46px);
  height: 2px; z-index: 1;
}
.lifecycle-step:last-child .lifecycle-arrow { display: none; }

/* ═══ Selling Points ═══ */
.selling-points { padding: 2.5rem 0 3rem; }
.sp-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: .75rem; }
.sp-item {
  display: flex; align-items: flex-start; gap: .65rem;
  padding: .85rem 1rem; border-radius: var(--radius-sm);
  background: var(--bg-card); border: 1px solid var(--border);
  font-size: .88rem; line-height: 1.5; transition: border-color .2s;
}
.sp-item:hover { border-color: var(--border-active); }
.sp-check { color: #10b981; font-size: 1rem; flex-shrink: 0; margin-top: .1rem; }

/* ═══ Footer ═══ */
.footer {
  text-align: center; padding: 2rem; color: var(--text-dim); font-size: .8rem;
  border-top: 1px solid var(--border);
}

/* ═══ Tooltip ═══ */
.tooltip {
  position: fixed; z-index: 100; padding: .6rem .9rem;
  background: #1e293b; border: 1px solid var(--border-active);
  border-radius: var(--radius-sm); font-size: .8rem;
  max-width: 320px; pointer-events: none; opacity: 0;
  transition: opacity .15s; box-shadow: 0 8px 32px rgba(0,0,0,.4);
}
.tooltip.visible { opacity: 1; }
.tooltip-title { font-weight: 600; margin-bottom: .2rem; }
.tooltip-body { color: var(--text-muted); line-height: 1.5; }
.tooltip-skills { margin-top: .4rem; padding-top: .4rem; border-top: 1px solid var(--border); font-size: .75rem; color: var(--text-dim); }

/* ═══ Animations ═══ */
@keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
.animate-in { animation: fadeUp .5s ease both; }
.delay-1 { animation-delay: .1s; } .delay-2 { animation-delay: .2s; }
.delay-3 { animation-delay: .3s; } .delay-4 { animation-delay: .4s; }

/* ═══ Responsive ═══ */
@media (max-width: 768px) {
  .header h1 { font-size: 1.8rem; }
  .stats { gap: 1rem; }
  .stat-card { min-width: 110px; padding: .8rem 1.2rem; }
  .stat-value { font-size: 1.8rem; }
  .modules-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); }
  .lifecycle-step { min-width: 90px; }
}
</style>
</head>
<body>

<div class="header animate-in">
  <h1><span id="title"></span></h1>
  <div class="subtitle" id="subtitle"></div>
  <div class="version" id="version"></div>
</div>

<div class="stats" id="stats"></div>

<div class="section">
  <div class="section-title">系统架构 <span style="font-size:.75rem;color:var(--text-dim);text-transform:none;letter-spacing:0;font-weight:400">点击模块展开技能列表 · 点击流水线高亮关联技能</span></div>
  <div id="layers"></div>
</div>

<div class="section lifecycle">
  <div class="section-title">创作生命周期 <span style="font-size:.75rem;color:var(--text-dim);text-transform:none;letter-spacing:0;font-weight:400">从想法到出版的完整旅程</span></div>
  <div class="lifecycle-track" id="lifecycle"></div>
</div>

<div class="section selling-points">
  <div class="section-title">核心价值</div>
  <div class="sp-grid" id="selling-points"></div>
</div>

<div class="footer">
  AI Novel Writing System &mdash; Architecture Map &mdash; <span id="footer-date"></span>
</div>

<div class="tooltip" id="tooltip">
  <div class="tooltip-title" id="tt-title"></div>
  <div class="tooltip-body" id="tt-body"></div>
  <div class="tooltip-skills" id="tt-skills"></div>
</div>

<script src="architecture-map-data.js"></script>
<script>
(function () {
  const D = MAP_DATA;

  // ─── Utils ───
  const $ = (s, p) => (p || document).querySelector(s);
  const $$ = (s, p) => [...(p || document).querySelectorAll(s)];
  const el = (tag, cls, html) => { const e = document.createElement(tag); if (cls) e.className = cls; if (html) e.innerHTML = html; return e; };

  // ─── Header ───
  $("#title").textContent = D.meta.title;
  $("#subtitle").textContent = D.meta.subtitle;
  $("#version").textContent = D.meta.version;
  $("#footer-date").textContent = new Date().toLocaleDateString("zh-CN");

  // ─── Stats with animated counters ───
  const statsEl = $("#stats");
  D.meta.highlights.forEach((h, i) => {
    const card = el("div", `stat-card animate-in delay-${i + 1}`);
    card.innerHTML = `<div class="stat-value" data-target="${h.value}">0</div><div class="stat-label">${h.value}${h.suffix} ${h.label}</div>`;
    statsEl.appendChild(card);
  });

  function animateCounters() {
    $$(".stat-value").forEach(el => {
      const target = +el.dataset.target;
      const duration = 1200;
      const start = performance.now();
      const tick = (now) => {
        const p = Math.min((now - start) / duration, 1);
        const ease = 1 - Math.pow(1 - p, 3);
        el.textContent = Math.round(target * ease);
        if (p < 1) requestAnimationFrame(tick);
      };
      requestAnimationFrame(tick);
    });
  }

  const io = new IntersectionObserver(entries => {
    if (entries[0].isIntersecting) { animateCounters(); io.disconnect(); }
  }, { threshold: .5 });
  io.observe(statsEl);

  // ─── Layer color lookup ───
  const layerColors = {};
  D.layers.forEach(l => { layerColors[l.id] = l; });

  // ─── Build skill ID → module mapping ───
  const skillToModule = {};
  const skillData = {};
  D.modules.forEach(m => {
    m.skills.forEach(s => {
      skillToModule[s.id] = m.id;
      skillData[s.id] = s;
    });
  });

  // ─── Render Layers ───
  const layersEl = $("#layers");
  const moduleElements = {};

  D.layers.forEach((layer, li) => {
    if (li > 0) {
      const conn = el("div", "layer-connector");
      conn.innerHTML = '<svg viewBox="0 0 24 28"><path d="M12 0 L12 28"/><path d="M8 20 L12 28 L16 20"/></svg>';
      layersEl.appendChild(conn);
    }

    const layerEl = el("div", `layer animate-in delay-${li + 1}`);
    layerEl.style.borderColor = `${layer.color}22`;

    const headerHTML = `
      <div class="layer-header">
        <span class="layer-badge" style="background:${layer.color}">${layer.subtitle}</span>
        <span class="layer-name">${layer.name}</span>
      </div>
      <div class="layer-desc">${layer.description}</div>
    `;
    layerEl.innerHTML = headerHTML;

    const grid = el("div", "modules-grid");
    const layerModules = D.modules.filter(m => m.layer === layer.id);

    layerModules.forEach(mod => {
      const card = el("div", "module-card");
      card.dataset.moduleId = mod.id;
      card.style.setProperty("--mod-color", layer.color);
      card.innerHTML = `
        <style>.module-card[data-module-id="${mod.id}"]::before { background: ${layer.color}; }</style>
        <div class="module-head">
          <span class="module-icon">${mod.icon}</span>
          <span class="module-name">${mod.name}</span>
          <span class="module-count">${mod.skills.length}</span>
        </div>
        <div class="module-desc">${mod.description}</div>
        ${mod.layer === "pipeline" ? '<div class="pipeline-hint">点击查看组合</div>' : ""}
        <div class="skills-list">${mod.skills.map(s => `
          <div class="skill-item" data-skill-id="${s.id}">
            <span class="skill-dot" style="background:${layer.color}"></span>
            <span class="skill-name">${s.name}</span>
            <span class="skill-desc">${s.description}</span>
          </div>
        `).join("")}</div>
      `;

      card.addEventListener("click", () => toggleModule(card, mod));
      grid.appendChild(card);
      moduleElements[mod.id] = card;
    });

    layerEl.appendChild(grid);
    layersEl.appendChild(layerEl);
  });

  // ─── Module expand / pipeline highlight ───
  let activeModule = null;

  function toggleModule(card, mod) {
    clearHighlights();

    if (activeModule === card) {
      card.classList.remove("expanded");
      card.querySelector(".skills-list").style.maxHeight = "0";
      activeModule = null;
      return;
    }

    if (activeModule) {
      activeModule.classList.remove("expanded");
      activeModule.querySelector(".skills-list").style.maxHeight = "0";
    }

    card.classList.add("expanded");
    const list = card.querySelector(".skills-list");
    list.style.maxHeight = list.scrollHeight + "px";
    activeModule = card;

    // Pipeline skill-level highlighting is handled by hover on individual skill items
  }

  function clearHighlights() {
    $$(".module-card.highlighted").forEach(c => c.classList.remove("highlighted"));
  }

  // ─── Lifecycle Flow ───
  const lcEl = $("#lifecycle");
  const lcColors = ["#8b5cf6", "#7c3aed", "#6366f1", "#3b82f6", "#2563eb", "#0891b2", "#14b8a6", "#059669", "#10b981", "#22c55e"];

  D.lifecycle.forEach((step, i) => {
    const stepEl = el("div", "lifecycle-step");
    stepEl.innerHTML = `
      <div class="lifecycle-node" style="background:${lcColors[i % lcColors.length]}" 
           data-step='${JSON.stringify(step)}'>${step.step}</div>
      <div class="lifecycle-label">${step.name}</div>
      <div class="lifecycle-sub">${step.description}</div>
      ${i < D.lifecycle.length - 1 ? `<div class="lifecycle-arrow"><svg width="100%" height="2" style="overflow:visible"><line x1="0" y1="1" x2="100%" y2="1" stroke="${lcColors[i % lcColors.length]}" stroke-width="2" stroke-dasharray="6 4" opacity=".5"/></svg></div>` : ""}
    `;
    lcEl.appendChild(stepEl);
  });

  // ─── Lifecycle tooltip + click-to-highlight ───
  const tooltip = $("#tooltip");
  const ttTitle = $("#tt-title");
  const ttBody = $("#tt-body");
  const ttSkills = $("#tt-skills");

  $$(".lifecycle-node").forEach(node => {
    node.style.cursor = "pointer";
    node.addEventListener("mouseenter", (e) => {
      const step = JSON.parse(node.dataset.step);
      ttTitle.textContent = `Step ${step.step}: ${step.name}`;
      ttBody.textContent = step.description;

      const composed = D.pipeline_composition[step.pipeline];
      if (composed) {
        ttSkills.textContent = "组合技能: " + composed.map(id => skillData[id]?.name || id).join(" → ");
        ttSkills.style.display = "block";
      } else {
        ttSkills.style.display = "none";
      }

      const rect = node.getBoundingClientRect();
      tooltip.style.left = Math.max(8, rect.left + rect.width / 2 - 150) + "px";
      tooltip.style.top = rect.bottom + 10 + "px";
      tooltip.classList.add("visible");
    });
    node.addEventListener("mouseleave", () => { tooltip.classList.remove("visible"); });

    node.addEventListener("click", () => {
      const step = JSON.parse(node.dataset.step);
      clearHighlights();
      const composed = D.pipeline_composition[step.pipeline];
      if (composed) {
        composed.forEach(skillId => {
          const targetModId = skillToModule[skillId];
          if (targetModId && moduleElements[targetModId]) {
            moduleElements[targetModId].classList.add("highlighted");
          }
        });
      }
      const firstHighlighted = $$(".module-card.highlighted")[0];
      if (firstHighlighted) {
        firstHighlighted.scrollIntoView({ behavior: "smooth", block: "center" });
      }
    });
  });

  // ─── Selling Points ───
  const spEl = $("#selling-points");
  D.meta.selling_points.forEach(sp => {
    const item = el("div", "sp-item");
    item.innerHTML = `<span class="sp-check">✓</span><span>${sp}</span>`;
    spEl.appendChild(item);
  });

  // ─── Skill item hover in expanded cards ───
  document.addEventListener("mouseover", (e) => {
    const item = e.target.closest(".skill-item");
    if (!item) return;
    const sid = item.dataset.skillId;
    const composed = D.pipeline_composition[sid];
    if (composed) {
      clearHighlights();
      composed.forEach(skillId => {
        const targetModId = skillToModule[skillId];
        if (targetModId && moduleElements[targetModId]) {
          moduleElements[targetModId].classList.add("highlighted");
        }
      });
    }
  });

  document.addEventListener("mouseout", (e) => {
    const item = e.target.closest(".skill-item");
    if (item) clearHighlights();
  });

})();
</script>
</body>
</html>
