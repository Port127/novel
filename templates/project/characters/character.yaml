# 角色档案
# 由 /character-add 创建，/character-edit 更新
# 路径: characters/{角色名}.yaml

name: ""
aliases: []               # 别名、称号、绰号
role: protagonist         # protagonist / supporting / minor / antagonist
archetype: ""             # 英雄 / 导师 / 信使 / 门槛守卫 / 变形者 / 阴影 / 盟友 / 骗子
narrative_function: ""    # 推动主线 / 情感锚点 / 缓解气氛 / 世界观展示 / 制造冲突 / 提供信息 / 镜像对照

first_appearance: ""      # 首次登场章节，如"第1章"
first_scene: ""           # 首次登场场景ID，如 ch0001_s01

# 基本信息
profile:
  age: ""
  gender: ""
  occupation: ""          # 职业/身份
  affiliation: []         # 所属组织/阵营
  location: ""            # 常驻地点

# 性格特质
traits: []                # 如: [毒舌, 精明, 护短, 爱财]
moral_spectrum: ""        # 正义 / 灰色 / 黑暗 / 亦正亦邪 / 被迫为恶
fatal_flaw: ""            # 会伤到自己或他人的关键缺陷
obsession: ""             # 执念 / 长期追求 / 放不下的目标
soft_spot: ""             # 软肋 / 最在意的人或事
misbelief: ""             # 角色坚信但并不完全正确的信念
contrast_habit: ""        # 反差习惯，用来增加辨识度
tragedy_trigger: ""       # 容易触发悲剧的结构点，如"总在太晚时才明白真相"

# 语言画像——决定这个角色"怎么说话"
speech_pattern:
  tone: ""                # 语气基调：嘲讽 / 温吞 / 粗犷 / 书卷气 / 阴阳怪气 / 少年气
  sentence_style: ""      # 句式偏好：短句多 / 长句多 / 碎片化 / 反问多 / 祈使多
  catchphrase: []         # 口头禅/高频词，如 ["操", "得了吧", "有意思"]
  profanity_level: ""     # 粗话程度：无 / 偶尔 / 常见 / 满嘴脏话
  education_voice: ""     # 教育水平对用词的影响：文盲口语 / 普通 / 书面化 / 学究 / 古风
  verbal_tics: []         # 语言小癖好，如 ["说话喜欢拖尾音", "紧张时结巴", "爱用反问"]
  taboo_words: []         # 这个角色绝不会说的话/词，如 ["请", "对不起"]（用于反向约束）
  sample_lines: []        # 2-3 句最能代表此角色说话方式的典型台词
  # sample_lines 示例:
  # - "少废话，干不干？"
  # - "你以为我在跟你商量？"

# 外貌描述
appearance: ""

# 背景故事
backstory: ""

# 能力
abilities: []
# - name: ""
#   description: ""

# 人物弧光
arc: []
# - stage: "起点"
#   state: "角色初始状态描述"
#   chapter: 1
#   scene: ""
#   moment_type: ""       # 性格展示 / 性格转变 / 内心独白 / 道德抉择 / 成长顿悟 / 堕落滑落 / 信念崩塌 / 信念重建 / 身份揭示 / 觉醒 / 最终抉择
#   trigger: ""           # 触发弧光变化的事件（可选）

# 人物关系（由 /relationship-add 维护）
relations: []
# - character: ""
#   type: ""
#   description: ""
#   dynamic: ""           # 救赎与被救赎 / 镜像与对立 / 共生与寄生 / 守护与诅咒
#   tension_source: ""    # 关系中的主要张力来源

# 交叉索引（由 /character-add 初始化，/project-reindex 维护）
# 防膨胀规则：related_settings 上限 10 条，related_factions 上限 5 条
# 超出上限时只保留按相关度排序的 Top N，并记录 overflow 计数
# 完整引用数据见 PROJECT_MAP.md
cross_references:
  related_settings: []
  # - id: rule_001
  #   name: 设定名称
  #   relevance: 与该角色的关联说明
  settings_overflow: 0    # 被截断的条目数
  related_factions: []
  # - id: faction_001
  #   name: 势力名称
  #   stance: 该势力对此角色的态度
  factions_overflow: 0    # 被截断的条目数
  related_characters: []
  key_chapters: []
  related_plot_nodes: []

# 当前状态快照（由 /chapter-update 在状态推进时维护）
# 用于写新章时快速了解"此刻这个角色是什么状态"，避免回读全部正文
current_state:
  as_of_chapter: ""       # 快照对应的最新章节，如 ch005
  location: ""            # 当前所在位置
  emotional_state: ""     # 当前情绪/心理状态
  knows: []               # 此角色已知的关键信息（读者视角）
  # - "知道师父失踪"
  # - "不知道李四是卧底"
  secrets_from_reader: [] # 角色知道但读者还不知道的信息
  # - "其实偷看了信件内容"
  active_goal: ""         # 当前行动目标
  condition: ""           # 身体/能力状态，如"左臂受伤"、"灵力封印中"
  pending_tensions: []    # 未解决的悬念/冲突
  # - "和李四的误会未解开"

# 登场统计（由系统维护）
appearance_stats:
  scene_count: 0
  active_chapters: ""
  dominant_scene_types: []
  tension_avg: 0

# 备注
notes: ""
