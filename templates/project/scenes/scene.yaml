# 场景档案模板
# 由 /chapter-create 创建，/chapter-update 更新
# 路径: scenes/ch{章号}_s{场景序号}.yaml
# 命名示例: ch0001_s01.yaml

scene_id: ""              # 如 ch0001_s01
chapter_id: ""            # 如 ch001
chapter: ""               # 章节名，如"第1章 章名"
title: ""                 # 场景标题（概括性短语）
text_range: []            # [起始行, 结束行]（可选，用于原文定位）

summary: ""               # 50-100字，概括本场景发生了什么

# ====== 多维标签 ======

# A. 场景内容层 — 发生了什么
content:
  scene_type: []          # 争吵/告白/对决/密谋/逃亡/修炼/探秘/审讯/追逐/宴会/葬礼/祭祀/旅途/独处/回忆/梦境/日常/战争/营救/谈判/伏击/考验/仪式/觉醒
  conflict: []            # 价值观/误会/利益/生死/情感/立场/信仰/权力/忠诚/身份/道德
  stakes: []              # 生死/荣辱/情感/信念/自由/世界存亡/身份秘密/权力地位/承诺/真相

# B. 人物层 — 谁和谁、怎么互动
characters: []
# - name: ""
#   role_in_scene: ""     # 视角人物 / 对手 / 新引入 / 旁观者
#   action: ""            # 本场景中的行为概括

people:
  relationship: []        # 恋人/师徒/对手/父子/母女/挚友/君臣/同门/主仆/陌生人/暗恋/仇人/盟友/兄弟姐妹/上下级/同伴
  interaction: []         # 对抗/合作/试探/告别/重逢/背叛/守护/牺牲/教导/求助/利用/和解/挑衅/暗中观察/并肩作战
  power_dynamic: ""       # 平等 / 上对下 / 下对上 / 翻转 / 此消彼长
  character_moment: []    # 性格展示/性格转变/内心独白/道德抉择/成长顿悟/堕落滑落/信念崩塌/信念重建/身份揭示/初次亮相/最终抉择
  moral_spectrum: []      # 正义/灰色/黑暗/亦正亦邪/被迫为恶

# C. 情感层 — 什么感受
emotion:
  emotion: []             # 紧张/温馨/悲伤/愤怒/诡秘/燃/绝望/释然/孤独/恐惧/狂喜/麻木/挣扎/平静/怀念/屈辱/敬畏
  tension: 1              # 1-5  1=平静日常 3=暗流涌动 5=生死一线
  reader_effect: []       # 催泪/爽感/窒息/治愈/震撼/细思恐极/心疼/解气/揪心/释然/毛骨悚然/会心一笑/热血沸腾/怅然若失

# D. 结构层 — 在故事中的位置和作用
structure:
  plot_stage: ""          # 开篇/第一幕-诱因/第一幕-发展/第二幕-对抗/中点/第二幕-低谷/第三幕-高潮/第三幕-收束/尾声
  plot_function: []       # 铺垫/转折/升级/高潮/收束/伏笔埋设/伏笔回收/并线/分流/呼应/反转/节奏调节/信息揭示
  pacing: ""              # 加速 / 减速 / 爆发 / 喘息 / 蓄力 / 骤停

# E. 技法层 — 怎么实现的
craft:
  technique: []           # 对比/留白/蒙太奇/闪回/视角切换/环境映射/象征隐喻/反讽/平行叙事/意识流/嵌套叙事/不可靠叙述/时间跳跃/倒叙/白描/细节放大/重复与变奏
  dialogue_type: []       # 争吵/说服/审讯/试探/告白/独白/寒暄下的暗斗/教学/谈判/威胁/安慰/多人混战/言不由衷/以退为进/沉默对峙
  pov: ""                 # 第一人称 / 第三人称限制 / 全知 / 多视角轮转 / 旁观者
  info_delivery: []       # 自然嵌入/角色口述/闪回/文献引用/环境暗示/对话带出/内心独白带出/行动展示

# F. 场景物理层 — 在什么环境中
setting:
  location: []            # 室内/户外/地下/高空/水下/密闭空间/广阔战场/街巷/宫殿/山野/都市/荒漠/船上/废墟/秘境
  scale: ""               # 独角戏 / 双人戏 / 三角 / 小团体 / 群戏 / 千军万马
  time_weather: []        # 白天/黑夜/黎明/黄昏/雨/雪/雷暴/迷雾/烈日/月光

# ====== 情节线索（可选）======
plot_threads: []
# - thread_id: "线索名称（如：身份秘密）"
#   role: plant           # plant(埋设) / develop(发展) / payoff(回收)
#   related_scenes: []
#   confidence: ""        # high / medium / low

# ====== 精彩段落标记（可选）======
highlights: []
# - lines: [23, 31]
#   note: "简述为什么值得参考"
#   technique: []

# 创建/更新记录
created: ""
updated: ""
