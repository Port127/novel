# 故事大纲（结构化版）
# 由 /plot-init 创建，/plot-add 更新
# 与 outline.md 互补：此文件为结构化数据，outline.md 为叙述性文档

# 全书概要
premise: ""               # 一句话概括故事
theme: []                 # 主题，如 [成长, 牺牲, 信念]
tone: []                  # 基调，如 [热血, 沉重, 幽默]

# ============================================================
# 结构骨架
# ============================================================
structure: []
# - act: ""               # 幕次，如"第一幕：起"
#   title: ""             # 幕次标题
#   chapters: [1, 50]     # 章节范围 [起, 止]
#   arc: ""               # 本幕主线弧光描述
#   key_event: ""         # 核心事件
#   turning_point: ""     # 转折点
#   pacing_note: ""       # 节奏说明

# ============================================================
# 多时间线（可选）
# ============================================================
timelines: []
# - name: ""
#   description: ""
#   chapters: []          # 关键章节节点

# ============================================================
# 伏笔追踪
# ============================================================
foreshadowing: []
# - id: f001
#   name: ""              # 可读名称，如"赵宋手背的疤痕"
#   level: major          # major（主线必收）/ minor（支线应收）/ micro（氛围加分）
#   status: planted       # planted / pending（接近截止）/ recovered / abandoned
#   plant_chapter: 1
#   plant_scene: ""       # 埋设场景ID（可选）
#   plant_description: "" # 埋设方式描述
#   payoff_chapter: TBD   # 回收章节，未定填 TBD
#   payoff_description: ""
#   recovery_deadline:     # 回收截止（可选，不填则无硬性截止）
#     type: chapter        # chapter / event / word_count
#     value: ""            # 如 15、"灰域崩塌"、300000
#     hard: false          # true=硬截止必须回收, false=软截止可延期
#   recovery_conditions: "" # 回收前提条件，如"主角到达凝华阶段"
#   linked_hooks: []       # 关联钩子ID列表（钩子链）
#   confidence: ""         # high / medium / low

# ============================================================
# 节奏曲线
# ============================================================
pacing_curve: []
# - chapter: 1
#   tension: 3            # 1-5
#   note: ""              # 节奏说明
#   scenes: []            # 关联场景ID（可选）
