# 节奏模板
# [R] = 必填字段，[O] = 可选字段

# 整体节奏
整体节奏: ""                  # [R] 整体节奏描述

# 各卷/幕节奏
卷节奏: []                    # [O] 各卷节奏
# 每卷包含：
#   开篇: ""
#   第一个高潮: ""
#   中期高潮: ""
#   卷末高潮: ""

# 副本节奏（如有）
副本节奏原则: []              # [O] 副本节奏原则

# 张力曲线
张力曲线: ""                  # [O] 整体张力曲线描述
tension_curve: []             # [O] 章节级张力曲线，tension 范围 1-5
# 每项包含：
#   chapter: 1
#   tension: 3
#   note: ""

# 爽点分布
爽点分布: []                  # [O] 爽点分布
# 每项包含：
#   chapters: ""              # 章节范围
#   爽点: []                  # 爽点列表
