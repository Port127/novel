# 叙事弧线模板
# 可被 daily-write 按 chapter_range 或 beat_refs 定位。
# [R] = 必填字段，[O] = 可选字段

# Arc 列表
arcs: []
# 每个 Arc 包含：
#   id: ""                    # Arc 编号
#   name: ""                  # Arc 名称
#   chapter_range: ""         # 章节范围（如 "1-20"）
#   beat_refs: []             # 对应大纲节拍
#   # 每个 beat_ref 包含：
#   #   act: 1
#   #   sequence: 1
#   #   beat: 1
#   time: ""                  # 故事内时间
#   theme: ""                 # 主题
#   goal: ""                  # 弧线目标
#   conflict: ""              # 核心冲突
#   payoff: ""                # 兑现方式
#
#   core_events: []           # 核心事件列表
#   chapter_beats: []         # 章节节拍
#   # 每个节拍包含：
#   #   chapter: ""           # 章节号或范围
#   #   content: ""           # 内容描述
#
#  爽点: []                  # 爽点/钩子
#   感情线: ""                # 感情线进展
#   商业线: ""                # 商业线进展（如有）
#   副本: []                  # 副本安排（如有）

# 节奏总览
节奏总览:                     # [O]
  爽点密度: ""                # 爽点分布密度
  副本间隔: ""                # 副本间隔原则
  张力曲线: {}                # 各 Arc 张力曲线
