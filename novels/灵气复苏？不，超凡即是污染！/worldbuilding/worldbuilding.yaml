# 世界观索引
# 由 /novel-init 创建，/setting-add 自动更新
# 与 setting.md 互补：此文件为结构化索引，setting.md 为叙述性文档
# 详细设定条目存放在 entries/ 目录下

# 核心概念
core_concepts:
  - name: 双宇宙融合
    one_liner: 2024年起，两个常数截然不同的宇宙开始不可逆地彼此渗透
    entry_id: rule_001
  - name: 逻辑污染
    one_liner: 超凡力量的本质是被另一个宇宙的逻辑覆写
    entry_id: rule_002
  - name: 现实抚平机制
    one_liner: A宇宙对逻辑入侵的本能免疫反应，不分敌我
    entry_id: rule_003
  - name: 双重消耗律
    one_liner: 概念能力的代价——核心不可逆磨损 + 肉体排异撕裂
    entry_id: rule_004
  - name: 不可名状
    one_liner: 有些真相的存在方式本身不允许被言说
    entry_id: lore_002
  - name: 灰域
    one_liner: 超然物质潮汐涌入超过阈值时在局部制造的物理规则紊乱失稳区，色彩分裂与余光衰减是最早可感知征象
    entry_id: rule_006
  - name: 异变体
    one_liner: 灰域内现实修复过程的错误输出——逻辑碎片获得临时物理形态
    entry_id: rule_007
  - name: 特例现象
    one_liner: 两宇宙融合的"合并错误"在极少数个体身上产生的异常觉醒模式
    entry_id: lore_003

# 力量体系概要
power_system:
  name: 五阶体系（逻辑污染路径）
  type: 异能
  entry_ids:
    - power_001
    - power_002
    - power_003
    - power_004

# 势力概要
factions_summary:
  - name: 修补匠
    stance: 一切超凡都是肿瘤，必须切除
    entry_id: faction_001
  - name: 蚀渊
    stance: 概念核心不可再生，那就从活人身上取
    entry_id: faction_002
  - name: 归零神教
    stance: 融合是神圣的格式化，应当主动加速
    entry_id: faction_003
  - name: 恒序局
    stance: 世界即数据，变数即威胁，一切纳入监管
    entry_id: faction_004
  - name: 彼岸者
    stance: 只是想存在于这个世界——代价是替换掉你
    entry_id: faction_005

# 地理概要
geography_summary:
  spatial_hierarchy: ""
  entry_ids: []

