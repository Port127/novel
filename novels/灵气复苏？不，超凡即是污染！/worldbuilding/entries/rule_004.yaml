id: rule_004
name: 双重消耗律
category: world_rule
status: confirmed

summary: 概念能力的代价分两笔收取，一笔不可再生，一笔血肉来偿。

description: |
  概念的力量从来不是免费的。每一次使用都同时打开两张账单。
  
  第一笔是本体的磨损。
  概念核心——或者说神体——的质量会在每次使用中被永久消耗。
  不可修复，不可再生，不可转移。
  就像一根正在燃烧的蜡烛，你没办法把烧掉的蜡重新装回去。
  每一次点燃都在缩短剩余的长度，
  而你永远不知道还剩多少。
  
  第二笔是排异的撕裂。
  概念的本质属于B宇宙的逻辑，而它的载体——你的肉身和精神——
  扎根在A宇宙的物理框架中。
  发动概念的瞬间，两套互不兼容的底层逻辑在同一具身体里激烈碰撞。
  这不是"消耗体力"可以描述的感受，
  而是你身体里的每一个细胞都在同时被两种现实争夺所有权。
  轻则意识模糊、感官错乱，重则肉身结构直接崩解。
  
  两笔账叠在一起，意味着概念者的每一次出手
  都是在向两个方向同时透支：
  不可再生的核心寿命，和有极限的肉体承受力。
  
  对赵宋而言，这条规则更加残酷——
  他的神体本就残缺，而他的肉体尚处于凡人水准。
  别人付得起的代价，他可能一次就见底。

rules:
  - 概念核心质量随使用永久磨损，不可再生
  - 概念发动时对A宇宙载体（肉体/精神）产生排异消耗
  - 两种消耗同时发生，叠加计算

constraints:
  - 没有已知方法修复已磨损的概念核心
  - 排异消耗的承受上限因人而异

