id: power_004
name: 记忆梦境
category: power_system
status: confirmed

summary: 在特殊条件下，赵宋会以梦境的形式坠入未来赵宋的记忆，身临其境地经历从未发生过的80年中的某个片段。

description: |
  有时候赵宋会做一种不一样的梦。
  
  不是普通人那种模糊的、荒诞的、醒来就碎的梦。
  而是清晰到可以闻见空气里的味道、
  感受到地面的温度、听见心跳频率的梦。
  他在梦中以第一人称存在于某个陌生的场景里，
  拥有不属于自己的记忆、判断和情感反应。
  他活在另一个人的身体中，看着那个人看过的东西，
  感受着那个人当时的恐惧或疲倦或平静。
  
  那个人是未来的他自己。
  那些场景是未来80年中的某个片段。
  而那80年从未在任何一条现实中真正发生过。
  
  他在亲历一段不存在的人生。
  
  梦境不可主动触发。它出现在神体剧烈波动之后，
  在重伤濒死的边缘，在污染突破某个阈值的瞬间——
  仿佛某种共振被意外激活。
  赵宋无法选择看到什么。
  呈现的片段似乎与他当前的处境存在某种隐秘的呼应，
  但这种呼应的逻辑不属于A宇宙。
  
  醒来后记忆会像真正的梦一样衰减。
  细节会在几小时内变得模糊，关键信息如果不立刻记录就会流失。
  只有情绪残留得最久——
  有时候赵宋会整天被一种无来由的悲伤或愤怒笼罩，
  却已经想不起梦里到底发生了什么。
  
  长时间沉浸有代价。
  深度梦境会导致醒来后短暂的人格混淆——
  赵宋会用未来赵宋的方式思考、说话、做判断，
  仿佛那80年的重量还压在他肩上。
  这种混淆通常持续几小时到几天不等。
  每一次，他都要重新确认"我是现在的赵宋"。

rules:
  - 不可主动触发——仅在神体剧烈波动/重伤濒死/污染突破时出现
  - 呈现内容不可选择，与当前处境存在非因果的隐秘呼应
  - 梦境为纯体验，无法改变其中任何事
  - 醒来后记忆衰减，需立即记录关键信息
  - 清晰度与沉浸深度随污染程度递进

constraints:
  - 长时间沉浸导致人格混淆（分不清"我"和"他"）
  - 过于频繁的梦境可能侵蚀赵宋对自身身份的确认
  - 梦境内容对应的事件从未真正发生——沉浸于不存在的记忆有存在性风险

plot_links:
  - node: 双时间线叙事
    role: 打开未来80年时间线作为平行叙事空间
  - node: 信息释放
    role: 以体验而非告知的方式向赵宋（和读者）传递关键信息
  - node: 情感线
    role: 赵宋亲眼目睹未来自己的失去与遗憾，为当下的选择提供情感驱动

character_links:
