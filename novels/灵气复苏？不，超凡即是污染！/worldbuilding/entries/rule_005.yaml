id: rule_005
name: 污染与信息的共生律
category: world_rule
status: confirmed

summary: 你能听懂多少来自另一个宇宙的语言，取决于你已经被那个宇宙改变了多少。

description: |
  未来赵宋能向年轻赵宋传递多少信息，
  不取决于他想说多少，
  而取决于对面那个年轻人能承受多少。
  
  A宇宙的认知框架是线性的、因果的、可证伪的。
  在这套框架下，有些信息不是被加密了，
  而是根本不具备被表达的条件。
  就像你无法用平面上的语言向一个从未离开过纸面的生物描述"高度"——
  不是你词穷，是"高度"这个维度在他的现实中不存在。
  
  只有当赵宋被B宇宙的逻辑足够深地渗透之后，
  他的认知才会生长出新的维度——
  一种能够解析非线性、非因果、非逻辑信息的"解码器"。
  污染不是代价。或者说，它既是代价，也是钥匙。
  你用"变得不那么像人"的方式，
  换取了"理解更多真相"的能力。
  
  主导权始终在年轻赵宋手中。
  未来赵宋无法强灌任何信息。
  他只能引导、暗示、诱惑——
  在被允许的那条窄缝中，
  用八十年磨出来的全部耐心，
  去说服一个刚毅、冲动、随时可能把他当成幻觉的年轻人。
  
  这是一场注定不对等的对话：
  一方什么都知道但什么都不能说，
  一方什么都不知道但握着全部的权力。

rules:
  - 赵宋被B宇宙污染的深度决定可接收的信息量
  - 主导权在年轻赵宋手中，未来赵宋只能引导/诱惑
  - 信息传递的限制不是外力封锁，而是认知维度不匹配

constraints:
  - 未来赵宋无法强制传递信息
  - 信息解锁不可跳级——必须随污染程度自然递进

plot_links:
  - node: 信息释放节奏
    role: 读者获取信息的节奏被绑定在赵宋的"污染进度"上——天然的叙事节流阀

character_links:
  - character: 赵宋（现在）
    relation: 利用了——污染越深，获取的信息越多（被动获益）
  - character: 赵宋（未来）
    relation: 受限于——只能在被允许的窗口中间接引导

