id: lore_003
name: 特例现象
category: lore
status: confirmed

summary: 两宇宙融合过程中产生的"合并错误"在极少数个体身上表现为异常觉醒模式——特例，每种特例代表不同层级的规则破损。

description: |
  正常的力量觉醒遵循确定的路径：
  超然物质附着 → Path A 物质态攀升 → 
  临界点处超然物质相变 → 概念核心凝结。
  
  但两个宇宙的融合不是精确的手术。它更像两块不规则的拼图
  被硬挤到同一个框里——接缝处总会出现错位、撕裂、溢出。
  
  当这些"合并错误"恰好落在某个个体身上时，
  正常觉醒路径被绕过或扭曲，产生了不该存在的力量形态。
  这些个体被称为"特例"。
  
  世界上已知或潜在的特例极少——总数可能在三到六个之间。
  每个特例代表的不是同一种错误的不同程度，
  而是完全不同层级的规则破损：
  
  - 时间层级错误：未来干涉过去（赵宋）
  - 空间层级错误：概念核心与地点而非人绑定（锚地者）
  - 结构层级错误：概念核心在形成时碎裂（碎片者）
  - 个体层级错误：概念核心横跨两个载体（共振者）
  - 方向层级错误：B→A 反向污染产生拟人实体（倒灌者）
  
  特例的存在本身就是两宇宙融合深度的证据。
  对各势力而言，每一个特例都是无价的研究标本、
  潜在的战略武器、或必须被消除的不稳定因素。

rules:
  - 特例由两宇宙融合中的"合并错误"产生
  - 每种特例代表不同层级的规则破损
  - 特例总数极少（世界范围内约3-6个）
  - 特例的力量形态不遵循正常觉醒路径
  - 特例之间的异常类型互不相同

constraints:
  - 特例无法被人工制造或复制
  - 特例的力量形态不可预测——只有出现后才能被归类
  - 并非所有特例都知道自己是特例

