id: faction_004
name: 恒序局
category: faction
status: confirmed

summary: 它提供秩序，也施加枷锁。它保护你的安全，前提是你交出自由。

description: |
  恒序局是官方背景的超凡事务管控机构。
  
  它的前身也许是某个国安体系的秘密分支，
  在灵气复苏初期被紧急扩编为独立建制。
  没人确切知道它的成立时间，
  但当公众第一次听说"超凡者"这个词的时候，
  恒序局已经在运转了。
  
  它的运行逻辑不是善恶，而是确定性。
  恒序局追求的是一种绝对的可预测——
  给每一种超凡力量建档，
  给每一种概念编制数字指纹，
  让每一个超凡者都有编号、有档案、有可量化的行为模型。
  任何不在数据库里的东西，
  任何无法被预判的变量，
  都是必须被消除的不确定性。
  
  它是五大势力中最灰色的存在。
  恒序局不屠杀超凡者。它的手段比屠杀文明得多，
  也比屠杀更让人窒息：
  收编、登记、分级、派遣、监控。
  你的力量不再属于你，而属于"国家超凡资产管理体系"。
  你不是人，你是一个带编号的资源。
  
  但它也确实维持着某种秩序。
  在修补匠烧焦一切、蚀渊掠夺一切、归零神教炸毁一切的世界里，
  恒序局至少让超市还在营业，让学校还在上课，
  让普通人可以假装什么都没有发生。
  
  未来赵宋曾隶属于恒序局。
  这意味着在那条从未被实现的时间线上，
  恒序局存续了至少八十年——
  它是五方势力中最持久的机器。
  也是最冰冷的。
  
  对赵宋的态度：
  非法变量。必须收编、编号、工具化。
  不一定要杀掉——但一定要握在手里。

rules:
  - 官方背景超凡管控机构
  - 追求对所有超凡力量的行政监管和可预测性
  - 手段以收编、登记、监控为主
  - 未来赵宋曾隶属于此

constraints:
  - 恒序局的秩序建立在对自由的剥夺之上
  - 内部可能存在不同派系（鹰派/务实派）

plot_links:
  - node: 体制压力
    role: 对赵宋施加的是系统性的、持续的管控压力而非一次性打击
  - node: 未来线索
