id: rule_002
name: 逻辑污染
category: world_rule
status: confirmed

summary: 所谓修行不存在。存在的只有被另一个宇宙改写的过程。

description: |
  世人管这叫"修行"，仿佛这是一桩主动追求的美事。
  
  实际上没有人在修行。每一个所谓的"超凡者"，
  都只是一个被B宇宙逻辑侵蚀得足够深的感染体。
  
  超然物质渗入人体后，会逐层覆写宿主原有的物理规则。
  你的骨骼不再遵循A宇宙的材料强度参数，
  你的血液开始响应意志而非心脏的泵压，
  你掌心托起的火焰不需要燃料，也不在意氧气浓度。
  这不是"获得力量"。这是你身体里的物理法则正在被替换。
  
  越强大的人，被改写得越深。
  走到最远处的"超凡者"，已经不再是A宇宙的生灵——
  他们是两套逻辑的叠加态，半是血肉，半是定义。
  站在他们对面，你能感觉到空气里有什么东西不对劲，
  但你说不出来。那种不对劲就是：
  他身上的物理常数和你的不一样了。
  
  即便是从未"修行"的普通人，也在不知不觉中被轻微污染着。
  剂量太小，尚不足以在日常中显现。就像呼吸中多了一种
  无色无味的成分——暂时无害，但你已经在吸入了。

rules:
  - 超凡力量的本质是被B宇宙逻辑覆写
  - 污染程度与力量等级正相关
  - 普通人也会被轻微污染，但无明显危害

constraints:
  - 污染不可主动选择方向，只能被动接受
  - 污染到极致的个体将不再属于A宇宙的生命形态

