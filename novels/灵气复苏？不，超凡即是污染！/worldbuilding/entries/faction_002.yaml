id: faction_002
name: 蚀渊
category: faction
status: confirmed

summary: 没有旗号，没有宣言。只有深渊一样的饥饿，和从活人身上剥离概念核心的冰冷技术。

description: |
  "蚀渊"是外界给他们起的名字。
  真正的成员从不自称任何东西。
  
  他们是一群站在四阶巅峰的人。
  超然物质在他们体内积累到了可以撕裂山脉的浓度，
  肉体已经被改造到远超人类极限的程度，
  但概念的门槛就是不为他们打开。
  
  他们是被拒之门外的人。
  能听见门那边传来的声音，能感觉到门把手的温度，
  但转不动。
  这种挫败持续数年、数十年之后，
  滋生出的不是绝望，而是一种冷酷到极致的实用主义：
  
  既然概念核心不可再生，
  既然我无法自己凝结——
  那就从别人身上取。
  
  蚀渊精通一种被称为"活体剥离"的技术。
  细节不适合被详细描述。
  只需要知道：他们能把概念核心从一个活着的人身上拆下来，
  在不完全杀死载体的前提下进行移植。
  被剥离的人不会立即死去，
  但他们会永久失去概念能力，
  而精神层面的创伤——那种"存在的一部分被从你身上撕走"的感觉——
  往往导致不可逆的崩溃。
  
  对赵宋的态度：
  一颗从未被使用过的、保持出厂状态的原生概念核心。
  完美无瑕，未经磨损。
  在蚀渊眼中，这不是一个人。
  是一块足以让整个组织改写命运的完美矿石。

rules:
  - 由四阶巅峰但无法凝结概念的强者组成
  - 掌握"活体剥离"——从活体上剥离概念核心的移植技术
  - 无组织名号，"蚀渊"为外界代称

constraints:
  - 活体剥离技术并不完美——移植成功率和排异问题未知

plot_links:
  - node: 身体威胁
    role: 对赵宋最直接的物理层面威胁——他们要的是核心，不是人

character_links:
