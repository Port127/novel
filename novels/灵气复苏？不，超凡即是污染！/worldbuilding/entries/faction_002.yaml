    relation: 视为完美的"概念矿石"——未磨损的原生核心
  - character: 林却
    relation: 知道太多、战斗力弱、没有靠山——完美的情报型拉拢对象
  - character: 纪微
    relation: 碎片者一旦被注意到，可能成为"碎片移植"实验对象
  - character: 韩炽 / 韩凝
    relation: '"共享核心"的研究素材——双人一核的机制可能蕴含核心复制的线索'

