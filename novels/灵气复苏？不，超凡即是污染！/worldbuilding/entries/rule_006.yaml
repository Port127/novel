id: rule_006
name: 灰域
category: world_rule
status: confirmed

summary: 超然物质以潮汐方式涌入现实，在局部地区制造出物理规则紊乱的失稳区——灰域。灰域出现时，现实的颜色渲染首先发生偏移，色彩分裂与余光衰减是最早可感知的征象。

description: |
  灵气复苏不是均匀渗透的。
  
  超然物质的涌入呈现潮汐式波动——浓度在时间和空间上不断起伏。
  当某个区域在短时间内承受了超出阈值的超然物质灌注，
  现实的物理规则就会在该区域内发生紊乱，
  形成一块边界模糊、内部法则不稳定的失稳区。
  
  民间叫它"灰域"。官方文件（在恒序局成型之后）
  称之为"超然物质浓聚异常区"，但没人用这个名字。
  
  ## 色彩分裂征象
  
  灰域出现前和出现期间，颜色会发生异常。这不是能量可见化，
  而是两个宇宙的视觉常数差异直接表现在渲染层——
  现实的颜色渲染本身出了问题。
  
  颜色不会统一偏移，而是各自走极端：
  某些颜色变得鲜艳，某些颜色变得暗淡，某些颜色在闪烁。
  整体而言世界在逐渐变得灰暗，但幅度不大——只是稍显灰暗，
  低到让人怀疑自己眼花或疲劳。
  
  最关键的是余光衰减律：注视区域色彩还算正常，
  灰暗和异常主要躲在主视线之外的余光里。
  你越努力看清，越看不见异常在蔓延。
  这意味角色永远无法通过直接观察确认灰域是否存在——
  它只在你"没在看"的时候展示自己。
  
  早期阶段，这种色彩异常是唯一比仪器更早的预警信号，
  但也最不可靠：没人能说服别人"我余光里颜色不太对"。
  随着融合加深，闪烁频率会增加，注视区也开始异常，
  到后期"正常颜色"反而成了需要刻意维持的状态。
  
  灰域的特征：
  - 不可预测地出现，无法精确预报，持续数小时到数天不等
  - 内部物理规律不稳定：重力偏移、光线折射异常、
    感知失真、温度与实际能量不匹配
  - 超然物质浓度骤升，对超凡者而言既是机会也是威胁
  - 普通人困在其中会受到生理和精神伤害——
    轻则眩晕恶心，重则器官应激、认知混乱、记忆碎裂
  - 部分灰域会自行消散（现实抚平机制介入），
    部分会恶化扩张，极少数会"固化"成为永久失稳区
  
  灰域出现的频率与两宇宙融合的深度正相关。
  故事开始时，灰域是每周级别的偶发事件。
  随着融合加速，频率在缓慢但确定地上升——
  大部分人还没注意到这条曲线。
  
  在恒序局等官方组织尚未成型的早期，
  灰域清理依赖民间超凡者小团体自发运作。
  进入灰域、疏散平民、处理异变体、遏制扩张——
  这是一份有报酬、有风险、需要团队配合的工作。
  单人作业在灰域中几乎等于自杀：
  感知失真让侦察成为必需，环境伤害让医疗无法缺席，
  异变体遭遇让火力不可或缺，多变量同时涌来让指挥协调成为生存前提。

rules:
  - 灰域由超然物质潮汐涌入超过局部阈值时产生
  - 出现不可精确预测，但可通过超然物质浓度监测获得模糊预警
  - 持续时间从数小时到数天不等
  - 灰域可自行消散（现实抚平）、恶化扩张、或极罕见地固化
  - 灰域出现频率与两宇宙融合深度正相关，整体趋势上升
  - 色彩分裂是灰域最早可感知征象，出现在灰域完全成形之前
  - 余光衰减律：注视区域色彩正常，异常存在于余光与主视线之外
  - 色彩异常无法作为灰域存在的可靠证据——越注视越看不见

constraints:
  - 普通人进入灰域会受到不可忽视的伤害
  - 灰域内感知不可靠，单人行动风险极高
  - 无法人工制造灰域（归零神教一直在尝试）
  - 灰域消散后区域恢复正常，但长期暴露区域可能留下微弱残余
  - 色彩异常无法被拍摄或记录，只有直接感知者能体验
  - 角色不能通过"盯着看"来确认灰域，只能依靠余光判断或团队交叉验证

