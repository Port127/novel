id: rule_001
name: 双宇宙融合
category: world_rule
status: confirmed

summary: 2024年起，两个常数截然不同的宇宙开始不可逆地彼此渗透。

description: |
  2024年，世界开始出现无法解释的噪点。
  
  起初只是偶发的物理失常——无风自皱的湖面、结构完好却发出骨裂声的立交桥、
  某个路口的信号灯连续三天亮起一种从未被制造过的颜色。多数人以为是都市传说，
  少数人以为是仪器误差。没有人意识到，这些不是故障。
  是另一套现实正在挤进来。
  
  我们的宇宙——后来被标注为"A宇宙"——正与一个本不该被感知的异质宇宙
  发生渐进式融合。后者没有正式名称，研究者在文件中用"B宇宙"指代它，
  但那些真正瞥见过它的人往往拒绝再谈论。
  
  两个宇宙之间不存在高低。它们的差异不在于等级，而在于根基——
  就像圆周率在两边取了不同的值。A宇宙中的观测者看B宇宙，
  看到的是一场逻辑如液体般流动的永恒幻梦，定义可以叠加，因果可以倒流。
  而B宇宙的存在若反过来观测A——它们看到的是一座令人反胃的监牢，
  万物被钉死在僵硬的因果链上，一块石头必须被另一块石头撞击才会移动。
  对于习惯了"定义即现实"的意识而言，
  这是一种黏稠的、令人发疯的规则暴力。
  
  一种被后来者称为"超然物质"的异质能量，正沿着融合的裂隙渗入现实的
  每一道缝隙。它不挑剔宿主，不在意善恶，只是安静地、
  不可阻挡地改写着这个世界的底层代码。
  
  融合不可逆。完全不可逆。
  但可以重新塑造。

rules:
  - 融合始于2024年，是渐进式的
  - 两宇宙无高低之分，只有"常数差异"
  - 融合完全不可逆，但可重新塑造
  - 超然物质是B宇宙渗入A宇宙的媒介

constraints:
  - 融合不可被阻止或逆转
  - 超然物质的渗透无法被完全隔绝

plot_links:
  - node: 终极目标
    role: 未来赵宋的终极目的是"扯开"两个纠缠的宇宙——在不可逆的前提下重新塑造融合的方式

character_links:
  - character: 赵宋
    relation: 受限于——身处融合时代，是所有矛盾的交汇点

