id: faction_001
name: 修补匠
category: faction
status: confirmed

summary: 世界在裂开，他们自认是缝合伤口的人。至于缝合时撕掉多少好肉——那不在他们的计算范围内。

description: |
  修补匠只信一件事：
  宇宙融合是致命的癌变，
  一切超凡力量都是长在现实肌体上的逻辑肿瘤。
  
  在他们眼中，Path A和Path B没有本质区别。
  一个三阶能操控火焰的超凡者，
  和一个五阶能改写因果的概念者，
  区别只在于肿瘤的大小。
  他们对待两者的态度完全一致：切除。
  
  修补匠的武器不是超凡力量——
  恰恰相反，他们中的大多数并不具备超凡能力，
  或者有意识地拒绝使用。
  他们的武器是现实本身。
  
  通过精密的仪器追踪"现实褶皱"——
  超凡力量扰动现实后留下的痕迹——
  修补匠能够定位逻辑异常区域，
  并人为触发宇宙的免疫反应：现实抚平机制。
  他们不是在与超凡者战斗。
  他们是在引导宇宙自己清除病灶。
  
  代价从来不小。
  抚平机制不分敌我，不辨善恶。
  每一次人为触发都可能造成大范围的附带毁灭。
  修补匠不在乎。
  在他们的哲学里，局部的焦土好过全局的沦陷。
  一栋楼塌了可以重建，一个宇宙的逻辑崩了就什么都没了。
  
  对赵宋的态度：
  零号病人。一个跳过物质态直接拥有概念的逻辑异常体。
  不是需要被治愈的病人，是需要被彻底清除的病毒。

rules:
  - 核心信条：一切超凡力量都是现实的病变
  - 掌握人为触发现实抚平机制的技术
  - 成员多数不具备超凡能力或拒绝使用

constraints:
  - 人为触发抚平机制会造成不可控的附带损伤

plot_links:
  - node: 外部威胁
    role: 对赵宋的直接追杀力量——他们要的不是控制，是抹杀

character_links:
  - character: 赵宋
    relation: 视为"零号病人"，必须彻底删除
  - character: 庄怀瑾
    relation: 锚地是"不会消散的灰域"——修补匠眼中必须清除的逻辑异常

setting_links:
  - target_id: rule_003
    relation: depends_on
    note: 修补匠的核心技术建立在人为触发抚平机制之上

