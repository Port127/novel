id: lore_002
name: 不可名状
category: lore
status: tentative

summary: 有些真相不是被隐藏了，而是它们存在的方式本身就不允许被言说。

description: |
  这不是一条规则。不是一种力量。不是一个实体。
  它是所有规则尚未触及的地方——
  是语言退场之后的沉默，是因果链断裂处的空白。
  
  已知的表面现象：
  未来赵宋与年轻赵宋之间的信息传递，
  受到某种根本性的限制。
  这种限制不是封印，不是诅咒，不是任何人施加的约束。
  它更像是——
  某些信息在A宇宙的逻辑中根本没有对应的容器。
  你无法用不存在的词说出不存在的话。
  
  已知的一个切面：
  未来赵宋的存在本身构成一个悖论。
  未来不可改变。
  因此从因果律的严格视角看，
  他不是"来自"某条已实现的时间线——
  他是直接从虚空中诞生的。
  那段他所"记得"的八十年，从未在任何现实中发生过。
  它只是"未来"——
  一个永远悬在前方、从未落地的可能性。
  
  但这仅仅是不可名状的一个极小的切面。
  像一座冰山露出水面的尖角，
  像一扇门缝里漏出的一线光——
  你知道后面有东西，
  但你没有打开那扇门的手。
  
  也许永远不会有。
  也许这就是重点。

