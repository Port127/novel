id: rule_003
name: 现实抚平机制
category: world_rule
status: confirmed

summary: 宇宙不会坐视自己的规则被改写。它的反击没有恶意，也没有怜悯。

description: |
  现实抚平机制不是某种智慧意志的审判，
  而是比引力更古老的存在惯性。
  
  当概念对现实的干扰超出局部承载阈值，
  A宇宙会本能地发动排异反应——
  就像一具身体对入侵病毒的免疫应答。
  只不过这具"身体"是整个现实，
  而"免疫细胞"是物理法则本身。
  
  没有人能预测抚平机制会以什么面目出现。
  它的表现因地、因时、因触发源的性质而千变万化：
  
  有时是概念真空——一片区域内所有超凡力量骤然失效，
  像氧气被瞬间抽尽，刚才还在操纵雷电的四阶强者
  忽然发现自己只是一个站在雨里的普通人。
  
  有时是空间坍塌——现实的物理结构直接断裂、折叠，
  三维空间像被揉皱的纸团，吞噬其中一切。
  
  有时是时空回廊——因果链被局部搅乱，
  困在其中的人经历着尚未发生或早已结束的片段，
  在自己的时间里迷路。
  
  唯一确定的规律：干扰越大，回弹越剧烈。
  若超载到极端，现实会毫不犹豫地抹杀异常源头
  及其周围的一切——不是惩罚，不是报复，
  只是免疫系统清除入侵物的本能。
  它不认识你是谁，也不在乎。

rules:
  - 概念干扰越大、作用域越广，回弹越剧烈
  - 表现形式不可预测（概念真空/空间坍塌/时空回廊等）
  - 过载可导致载体及周围环境被抹杀
  - 本质是A宇宙的存在惯性，非智慧意志

constraints:
  - 无法被关闭或绕过
  - 人为触发是可能的（修补匠的核心技术）

