id: rule_007
name: 异变体
category: world_rule
status: confirmed

summary: 灰域内的现实修复过程中，逻辑碎片偶尔获得临时物理形态，形成有攻击性的异常实体——异变体。

description: |
  灰域不只是"规则紊乱的区域"。
  
  当现实抚平机制试图修复灰域内的逻辑损伤时，
  修复过程本身会产生"废料"——
  被覆写了一半的物理规则碎片、
  未能完全被清除的B宇宙逻辑残留、
  以及两套法则互相挤压时挤出来的畸形产物。
  
  这些废料在大多数情况下会自行消散。
  但在超然物质浓度足够高的环境下，
  它们偶尔会"结晶"——获得临时的物理形态和某种趋近于
  本能的行为模式。
  
  这就是异变体。
  
  异变体不是B宇宙的生物。它们没有意识、没有目的、没有来处。
  它们是现实修复过程中的错误输出——
  像打印机卡纸时吐出来的乱码页。
  但乱码页不会咬人。异变体会。
  
  低阶异变体的行为接近条件反射：趋近能量源、
  攻击移动目标、在遭受物理打击时短暂解体后重组。
  Path A 超凡者可以用元素能力压制甚至消灭它们，
  但效率不高——你在用A宇宙的规则攻击一个由A/B混合规则构成的东西。
  
  高阶异变体是另一回事。
  当一块足够大的B宇宙逻辑碎片未被抚平机制清除干净，
  它所结晶出的异变体会携带类似"概念"的特性——
  不是真正的概念能力，但在效果上已经足够致命。
  高阶异变体不能被纯物理手段消灭，
  只能被"解构"——用另一种概念级的干预将其逻辑结构拆碎。
  
  这是赵宋的概念能力被迫动用的最自然场景，
  也是读者第一次看到"概念 vs 概念"对抗的窗口。

rules:
  - 异变体是灰域内现实修复过程的副产物
  - 不是B宇宙生物，没有意识和目的
  - 低阶异变体可被 Path A 能力压制/消灭
  - 高阶异变体携带类概念特性，只能被概念级干预解构
  - 灰域消散后，未被消灭的异变体会因超然物质浓度下降而自行瓦解

constraints:
  - 异变体不能在灰域外长期存在（离开高浓度环境会瓦解）
  - 异变体不可被驯化或控制（无意识可沟通）
  - 高阶异变体极为罕见，出现频率远低于低阶

plot_links:
