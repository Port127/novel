id: power_003
name: 神体寄附与消散转移
category: power_system
status: confirmed

summary: 一个正在消散的意识，一具正在被继承的神体，一场没有说明书的遗产交接。

description: |
  未来赵宋的神体不在年轻赵宋的体内。
  它以独立的形式存在，栖息在他感知不到的某处——
  像一个看不见的影子，像一层贴在现实背面的薄膜。
  年轻的赵宋不知道它在那里。
  
  而未来赵宋的意识，就寄附在这具残缺的神体之上。
  他以潜意识的形态驻留在年轻赵宋的脑海深处，
  大多数时候沉默如一潭死水。
  只有在神体被激发的时刻——
  当那种不属于A宇宙的力量苏醒的瞬间——
  他才能浮上意识的表面，
  与年轻的自己进行短暂的、受限的对话。
  
  在赵宋的脑海里，未来赵宋的形象与他自己一模一样。
  同样的面孔，同样的身高，同样年轻的样子。
  只是眼神不同。那双眼睛里装着八十年的东西，
  但装它们的容器只有二十岁的形状。
  
  一个悖论性的过程正在静默进行：
  神体在消耗——每一次使用都在加速这个过程——
  未来赵宋作为独立个体正在消散。
  但与此同时，他对神体的控制权却在消散中趋于完整。
  像一位正在溶解的雕塑家，双手反而越来越稳。
  
  当他彻底消失的那一刻，
  神体将完全归属年轻赵宋。
  全部的力量，全部的权限，零说明书。

rules:
  - 神体以独立形态附着于年轻赵宋，不在其体内
  - 未来赵宋的意识寄附于神体之上
  - 仅在神体激发时可与年轻赵宋进行有限对话
  - 消散速率与神体使用频率正相关
  - 消散过程中，未来赵宋对神体的控制权反而趋于完整
  - 未来赵宋完全消散后，神体完全归属年轻赵宋

constraints:
  - 未来赵宋无法强制与年轻赵宋沟通
  - 对话内容受到不可名状的限制
  - 消散不可逆

