id: faction_003
name: 归零神教
category: faction
status: confirmed

summary: 在他们的信仰里，旧世界的灭亡不是末日，是产房。

description: |
  归零神教相信一件极其简单的事：
  融合不是灾难。融合是圆满。
  
  两个宇宙的碰撞不是癌变，而是神圣的格式化——
  旧逻辑的终结，新存在的起点。
  人类不应当抗拒融合，不应当修补裂缝，
  而应当敞开每一道门，拆掉每一堵墙，
  让新旧两套现实彻底汇流。
  
  在旧世界的废墟之上，全体升维。
  
  他们是五方势力中最疯狂的一支。
  教众会主动制造大规模的逻辑崩坏事件——
  在人口密集区引爆概念冲突，
  诱导现实与B宇宙的深度重叠，
  制造不可逆的融合锚点。
  每一次成功，都意味着世界又有一小块区域被永久改写，
  再也回不去了。
  
  教团内部以"融合度"划分等级。
  身体被B宇宙逻辑改写得越深，地位越高。
  高层已经不完全是人类——
  他们的思维方式开始呈现B宇宙的特征：
  流动的，叠加的，不再遵循因果。
  跟他们说话的时候你会感到不安，
  不是因为他们说了什么可怕的话，
  而是因为他们的逻辑在你听起来是对的，
  但你知道不应该是对的。
  
  与赵宋无直接关联。
  但这不等于安全。
  归零神教的每一次行动都是全球性的灾害种子。

rules:
  - 核心信条：融合是神圣的格式化，应当主动加速
  - 制造大规模逻辑崩坏事件作为"融合锚点"
  - 内部等级以"融合度"（被B宇宙改写的程度）衡量

constraints:
  - 高融合度成员的思维已偏离人类逻辑，组织决策可能不可预测

plot_links:
  - node: 全局威胁
    role: 制造的逻辑崩坏事件是故事中大规模灾难的来源之一

character_links:
  - character: 赵宋
    relation: 无直接关联——但其行动间接影响赵宋的生存环境
  - character: 阮声
    relation: 倒灌者的存在与归零神教"加速融合"的信仰有天然呼应——可能的关联

