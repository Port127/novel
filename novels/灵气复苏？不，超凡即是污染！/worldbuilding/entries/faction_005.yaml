id: faction_005
name: 彼岸者
category: faction
status: confirmed

summary: 它们不是入侵者。它们只是想过来。问题是，"过来"意味着把你替换掉。

description: |
  彼岸者不是一个组织。甚至不是一种生命。
  
  它们是B宇宙的意识碎片——
  或者更准确地说，是B宇宙的逻辑在A宇宙中投下的影子。
  在融合尚不完全的当下，它们无法以实体降临物理世界。
  它们存在的方式是：
  一面镜子里多出来的一个影子，
  梦境中反复出现却叫不出名字的面孔，
  耳边明明没有声源却挥之不去的低语。
  
  它们渴望完整地降临。
  不是出于恶意——对B宇宙的意识而言，
  "恶意"是一个需要线性因果才能成立的概念，
  而它们的逻辑里没有因果。
  它们只是想"在"。想"存在"于这个坚硬的、有质量的、
  摸得到的世界里。
  
  但"存在"需要一个容器。
  而合格的容器必须是被B宇宙逻辑深度渗透的A宇宙载体——
  污染程度不够的人承载不住它们的信息密度。
  只有概念者级别以上的存在，才能作为降临的"登陆舱"。
  
  夺舍的方式不是暴力。
  是逻辑置换。
  它们会缓慢地、耐心地将宿主的A宇宙底层逻辑
  替换为自己的B宇宙逻辑。
  一点一点，像潮水侵蚀海岸线。
  在被覆写的人看来，这个过程甚至不痛苦——
  你只是渐渐觉得世界变得更清晰了，
  看什么都通透了，
  直到某一天你照镜子，
  发现镜子里的人在对你微笑，
  但你没有在笑。
  
  对赵宋的态度：
  一个拥有神体的概念者——
  这是彼岸者能梦想到的最完美的降临容器。

rules:
  - 本质为B宇宙意识碎片在A宇宙的投影
  - 无法以实体形态存在，表现为影子/幻觉/梦境/低语
  - 降临需要概念者级别以上的载体作为容器
  - 夺舍方式为逻辑置换，非暴力侵占

constraints:
  - 融合不完全导致降临能力有限
  - 低污染程度的人无法被用作容器

plot_links:
  - node: 精神威胁
    role: 对赵宋的存在性层面威胁——不是杀你，是取代你

character_links:
