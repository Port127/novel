id: power_001
name: 五阶力量体系
category: power_system
status: confirmed

summary: 从肉体强化到逻辑改写，五个台阶标记着一个人被另一个宇宙吞噬的深度。

description: |
  路径A是超凡者的正统进阶路线。本质上不是修炼，
  而是超然物质对人体的逐层渗透与改造。
  每升一阶，你就离"人"更远一步。
  
  一阶·淬体
  超然物质初次附着肉体。感官锐化，体能越过人类极限的边界。
  你还是你，只是更快、更硬、更难被杀死。
  受伤的地方愈合得更快，黑暗中看得更远，
  但你的邻居不会注意到任何异常——除非你愿意让他们注意到。
  
  二阶·凝华
  渗透加深，超然物质开始与肌体真正融合，而非仅仅附着。
  力量、速度、恢复力出现质的跃迁。
  普通武器对你开始失去意义。你仍然遵循物理规律——
  只是你的物理参数已经不再写在人类的字典里。
  
  三阶·驭象
  超然物质浓度突破某个阈值，开始外溢。
  你不再只是改变自己的身体，而是能影响身体之外的现实。
  水在你掌心凝聚，雷电循着你的意志落下，
  火焰贴着你的皮肤但不燃烧你。
  这些仍然勉强可以用能量转化来解释，
  但已经踩在物理学能自圆其说的最后边缘。
  在不知情者眼中，这就是"超能力"。
  
  四阶·临概
  物质态的尽头。超凡力量完全掌控，肉体与超然物质浑然一体。
  更关键的是——你站在了概念的门槛上。
  体内积累的超然物质浓度已经逼近相变的临界值。
  从这里再跨一步，就不再是"更强"，而是"不同"。
  绝大多数四阶终其一生无法跨过这道门槛。
  他们是被关在最后一扇门前的人，
  能听见门那边的声音，却永远找不到钥匙。
  
  五阶·概念
  超然物质发生相变，从能量态凝结为"概念核心"。
  你的力量不再经由物质，而是直接作用于现实的底层逻辑。
  隐身不是光线折射——是"被看见"这个概念被从你身上剥离。
  定位不是追踪信号——是沿着因果链反向检索存在本身。
  这已经不是更强的力量，而是另一种存在方式。
  
  常规认知：没有深厚的物质态积累，绝无可能触及概念。
  赵宋打破了这条铁律。

rules:
  - 五阶依次为：淬体、凝华、驭象、临概、概念
  - 一至四阶为物质态（Path A），五阶为概念态（Path B）
  - 四阶是概念的门槛，绝大多数人无法跨越
  - 常规路径必须从一阶逐步推进

constraints:
  - 跳阶被认为不可能（赵宋是已知唯一例外）
  - 每一阶的提升都意味着更深的逻辑污染

