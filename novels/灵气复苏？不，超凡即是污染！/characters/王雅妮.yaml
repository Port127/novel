# 角色档案

name: "王雅妮"
aliases: ["王妮"]
role: supporting
archetype: "盟友"
narrative_function: "缓解气氛 / 制造冲突 / 情感锚点"

first_appearance: "第1章"
first_scene: ""

profile:
  age: "27"
  gender: 女
  occupation: "小团体战斗核心"
  affiliation: ["独立小团体"]
  location: "待定"

traits: [直率, 暴烈, 护短, 厌恶虚伪, 不耐烦]
moral_spectrum: "正义"

fatal_flaw: |
  拒绝适应。
  世界在变——势力在成形、规则在建立、灰色地带在扩大。
  王雅妮拒绝参与这一切。
  在她的字典里，事情要么对要么错，
  敌人要么打要么不打，
  没有"先收编再观察"这种恒序局式的废话。
  这种不妥协在小规模生存中是美德，
  在势力化的世界里是自杀。

obsession: |
  不当旁观者。
  她见过旁观者——见过一群超凡者站在安全距离外
  看着普通人被卷入逻辑崩坏区，没有一个人动。
  从那以后，她对"袖手旁观"的容忍度为零。
  哪怕局势不利、哪怕不关她的事。
  这让她成为最可靠的战友，也让她成为最容易被利用的人。

soft_spot: |
  比她弱的人。
  不是"弱者"这个抽象概念——
  是具体的、站在她面前的、正在害怕的那个人。
  赵宋刚被收留的时候，
  团队里其他人在评估他的战术价值，
  只有王雅妮在看他眼里那种"我不知道发生了什么"的慌张。
  她是第一个对赵宋说"别怕"的人。

misbelief: |
  "只要够强就不需要妥协。"
  她以为力量可以替代一切政治手腕。
  三阶的战斗力在小规模冲突中确实足够碾压，
  但当五大势力成型后，
  个人武力在体系面前什么都不是。
  她会在这堵墙前撞得头破血流。

contrast_habit: |
  战斗结束后会给伤员包扎——手法出奇地轻柔。
  跟她平时砸桌子骂人的画风完全不搭。
  被人提起的话会面无表情地说"别恶心我"，
  然后继续轻手轻脚地缠绷带。

tragedy_trigger: |
  她的"不当旁观者"原则总有一天会把她推到
  一个不可能的位置：两边都有她想保护的人，
  而她只能站在一边。
  她没有选择的能力——她只有战斗的能力。

appearance: |
  高挑，偏瘦但线条硬朗。
  总是扎着马尾，不化妆，穿方便活动的衣服。
  手上有旧伤的痕迹。
  说话的时候喜欢直视对方的眼睛——
  不是在挑衅，是她觉得不看着对方说话是不尊重人。

backstory: |
  三阶·驭象，火元素方向。
  觉醒较早，单打独斗能力在团队中最强。
  加入沈夜的团队不是因为需要保护——
  是因为沈夜是少数不把她当"女性超凡者"而是当战斗力看的人。
  在团队中扮演"谁也惹不起的火药桶"和"最先冲出去的那个"的双重角色。

abilities:
  - name: "三阶·驭象（火元素）"
    description: "火焰操控，偏向爆发型近战。战斗风格直接、猛烈、不留后路。"

arc:
  - stage: "起点"
    state: "团队战斗核心。对赵宋最先表现出不带条件的善意。"
    chapter: 1
    moment_type: "性格展示"

relations:
  - character: "赵宋"
    type: "战友/姐姐式"
    description: "第一个对赵宋说'别怕'的人。不关心他是几阶什么系，只关心他还活着。"
    dynamic: "守护与诅咒"
    tension_source: "她想保护赵宋，但赵宋的秘密越来越多——她保护的到底是谁？"
  - character: "沈夜"
    type: "战友/对位"
    description: "尊重他的能力，反感他的务实。两人在'人还是资源'这个问题上永远无法达成一致。"
    dynamic: "镜像与对立"
    tension_source: "当沈夜选择恒序局时，她会把这当成背叛。"
  - character: "林却"
    type: "队友/互相看不顺眼"
    description: "她觉得他油嘴滑舌不可靠。但战斗中他的预警救过她不止一次——她记着，嘴上不说。"
    dynamic: "镜像与对立"
    tension_source: "两个极端的人：一个只信拳头，一个只信情报。团队在的时候互补，团队散了就是对立。"
  - character: "姜棠"
    type: "朋友/互补"
    description: "唯一会对姜棠说'你也歇会儿'的人。姜棠每次都说没事。王雅妮每次都不信。"
    dynamic: "守护与诅咒"
    tension_source: "两种保护方式都会把人烧干。王雅妮用拳头，姜棠用自己。"

