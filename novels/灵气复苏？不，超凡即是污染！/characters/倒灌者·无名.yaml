# 角色档案
# 特例五：倒灌者
# 本档案使用代号，真名在故事中逐步揭示

name: "（自称·阮声）"
aliases: ["倒灌者", "那个不该是人的人"]
role: supporting
archetype: "阴影 / 存在论威胁"
narrative_function: "制造冲突 / 世界观展示 / 终极警示"

first_appearance: "第三季或第四季"
first_scene: ""

profile:
  age: "外貌约25，实际'年龄'无法定义"
  gender: "呈现为女性"
  occupation: "无（她不确定自己是否应该有'职业'这个概念）"
  affiliation: ["与归零神教或彼岸者有关联（待定）"]
  location: "不固定——她一直在移动，仿佛在寻找什么"

traits: [安静, 困惑, 模仿性极强, 偶尔展现出不属于人类的逻辑跳跃, 对"普通"的东西有异常的好奇]
moral_spectrum: "亦正亦邪"

fatal_flaw: |
  她不知道自己是什么。
  这不是修辞。
  她拥有完整的人类记忆——童年、成长、亲人——
  但这些记忆没有来源。
  没有人认识她。没有人丢失了她。
  她的记忆对应的那个人，可能从未存在过。
  
  她的本质是B宇宙的逻辑碎片
  被A宇宙的现实法则反向污染后获得了人的形态。
  但她的主观体验是完全的、真实的、
  充满了人类情感的。
  她"觉得"自己是人。
  但她的存在方式说她不是。
  
  这个矛盾正在慢慢撕裂她。

obsession: |
  证明自己是"真的"。
  不是证明给别人看——是证明给自己看。
  她反复做人类会做的事：吃饭、睡觉、
  读书、发呆、生气、难过。
  每一次她都在确认："看，我在做人类的事。"
  但每一次确认之后，
  那个"我真的是人类吗"的声音就更大一点。

soft_spot: |
  那些接受她的人。
  不是"知道真相后接受她"——
  那种人她还没遇到过。
  是"在不知道真相的情况下把她当普通人对待"的人。
  这对正常人来说毫无意义。
  对她来说是唯一能让她暂时忘记那个问题的东西。

misbelief: |
  "如果我变得足够像人，我就是人。"
  她用模仿替代存在。
  但她越像人，就越被A宇宙的逻辑锁定——
  这意味着她的概念能力在衰减。
  变成"完全的人"的终点，
  是被现实抚平机制永久固化为一个
  没有任何特殊之处的普通人。
  记忆完整，能力归零，来历无法解释。
  这是解脱还是另一种死亡？

contrast_habit: |
  她会在完全不合适的场合微笑——
  不是社交性的微笑，是那种
  "哦原来人类在这种时候会觉得难过"的微笑。
  她在学习情绪的时候有时会搞错对应关系。
  在逐渐"变得更像人"的过程中，
  这种错位越来越少——
  但偶尔闪现时，比任何超凡能力都让人脊背发凉。

tragedy_trigger: |
  总有一天她必须做一个选择：
  继续使用概念能力（意味着承认自己不是人），
  还是彻底放弃能力、被固化为人
  （意味着永远无法知道自己到底是什么）。
  
  两个选项都不给她答案。
  它们只是在问：你更怕哪一种不知道？

appearance: |
  看起来完全是一个普通的年轻女性。
  偏瘦，中等身高，黑色长发，穿着朴素。
  没有任何超凡者的特征——
  没有异色的眼睛，没有超然物质残留的痕迹。
  她看起来是这个世界上最普通的人。
  
  但如果你的感知足够敏锐——
  比如姜棠的生物感知或林却的超然物质探测——
  会发现她的生理指标有微妙的"偏差"。
  心率完美但过于规律。体温恒定到不自然的程度。
  超然物质不是附着在她身上，而是从她身体里向外溢出。
  她不是被污染的人。她是污染本身穿上了人皮。

backstory: |
  方向层级的合并错误。
  
  正常的力量觉醒方向是 A→B：
  A宇宙的人被B宇宙的逻辑污染，获得超凡力量。
  阮声是反过来的——
  B宇宙的某个逻辑碎片被A宇宙的物理法则反向污染，
  在A宇宙的框架内获得了物理形态、人类记忆和人格。
  
  她不是一个被污染的人类。
  她是一段B宇宙的逻辑穿上了人类的外壳。
  
  但外壳太好了。好到连她自己都以为自己是真的。
  她拥有完整的主观体验——
  记忆是连贯的，情感是真实的，
  痛苦是真正痛的，孤独是真正孤独的。
  
  她的概念能力与其他概念者截然不同：
  她不是"改写A宇宙的规则"，
  而是"还原被A宇宙压制的B宇宙逻辑"。
  效果类似但机制相反。
  而每一次使用能力，都会让她"更像人"——
  因为A宇宙的法则在更深地锁定她。
  
  这是一个会自我消解的特例：
  能力越强时越不像人，越像人时能力越弱。
  终点是完全的人类化——或者完全的逻辑化。
  
  她被谁发现、被谁利用、与赵宋如何相遇——待定。
  但她的存在本身就是一个问题：
  如果一段逻辑碎片拥有了完整的人类情感，
  它有没有"活下去"的权利？

abilities:
  - name: "逻辑还原（方向层级特例）"
    description: |
      释放被A宇宙物理法则压制的B宇宙逻辑——
      效果上类似概念级干预（局部规则改写），
      但机制是"还原"而非"覆写"。
      使用后自身被A宇宙逻辑更深锁定，
      人类化程度上升，能力上限下降。
  - name: "逻辑亲和（被动）"
    description: |
      作为B宇宙逻辑的"本体"，
      她对概念级能力有天然的感知和亲和力——
      能直觉性地理解概念者的能力原理。
      这也意味着概念级攻击对她的伤害
      比对正常人类更大——因为那是在"攻击她的本质"。

arc:
  - stage: "伪装"
    state: "以普通人或低阶超凡者的身份生活。不知道或拒绝承认自己的本质。"
    chapter: TBD
    moment_type: "初次亮相"
  - stage: "撕裂"
    state: "真实本质被揭露——可能是被姜棠的生物感知察觉，或被彼岸者/归零神教接触。面对'我是什么'的存在性危机。"
    chapter: TBD
    moment_type: "信念崩塌"

relations:
  - character: "赵宋"
    type: "特例同类/终极警示"
    description: |
      赵宋被B宇宙污染越来越深。
      阮声是"污染到尽头"的一种可能形态——
      不是人变成了非人，而是非人变成了人。
      她是赵宋的终极镜像：如果污染之路走到底，
      "人"和"B宇宙逻辑"之间的界限还存在吗？
    dynamic: ""
    tension_source: "赵宋看到她时会恐惧自己的未来。她看到赵宋时会嫉妒他至少知道自己曾经是人。"

