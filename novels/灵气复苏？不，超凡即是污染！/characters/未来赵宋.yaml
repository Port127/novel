# 角色档案
# 由 /character-add 创建

name: "未来赵宋"
aliases: ["脑中的声音", "那个人", "另一个我"]
role: protagonist
archetype: "导师 / 骗子"
narrative_function: "推动主线 / 情感锚点 / 提供信息 / 制造冲突"

first_appearance: "第1章（潜意识层，模糊直觉）"
first_scene: ""

# 基本信息
profile:
  age: "约100岁（心理年龄），外貌呈现为与年轻赵宋一致"
  gender: 男
  occupation: "原恒序局成员（那条从未实现的时间线上）"
  affiliation: ["恒序局（未来/已不存在）"]
  location: "寄附于年轻赵宋的神体之上，以潜意识驻留于其脑海"

# 性格特质
traits: [冷冽, 沉着, 言语诱惑, 极重戒心, 神经质, 刚毅(底色), 坚强(底色)]
moral_spectrum: "灰色"

fatal_flaw: |
  操控本能。
  八十年的生存教会他一件事：
  直接说真话是世界上最低效的沟通方式。
  所以他引导、暗示、设局、诱骗——
  哪怕面对的是年轻时候的自己。
  他不是不想坦诚。是坦诚这个技能在八十年里被磨掉了，
  像一块用了太久的刀，连刀刃在哪里都看不出来了。
  这让年轻赵宋对他最本能的反应永远是"你在骗我"。
  而很多时候，年轻赵宋是对的。

obsession: |
  扯开两个宇宙。
  这不是一句口号，是他用八十年的消耗换来的唯一结论：
  两个宇宙继续纠缠下去，所有人都会死。
  不是可能，是一定。
  他见过那个"一定"的样子。
  所以他把自己的存在压缩成一具残缺的神体送了回来。
  但这个目标太大了，大到他只能把它拆碎——
  拆成一个个"引导年轻赵宋做正确选择"的小任务，
  然后祈祷自己在消散之前拆完。

soft_spot: |
  年轻的自己。
  不是自恋。是某种比自恋更深也更痛的东西。
  他看着年轻的赵宋犯他当年犯过的错，
  想伸手拉住却只能旁观，
  想开口警告却说不出那个关键的字。
  他最怕的不是自己消散——
  是消散之后，年轻的赵宋重蹈他的覆辙。
  那就意味着一切都白费了。

misbelief: |
  "我比他更知道什么是对的。"
  八十年的经验让他确信自己的判断优于一切。
  但他忘了一件事：
  他的判断是在一条从未被实现的时间线上形成的。
  那些经验的根基本身是虚空的。
  他以为自己在引导赵宋避开陷阱，
  但有些"陷阱"在这条时间线上可能根本不存在——
  而他因为笃信自己的经验，
  反而把赵宋推向了新的、他预料之外的危险。

contrast_habit: |
  在脑海对话中偶尔流露出不合时宜的幽默——
  冷的、刻薄的、像是在葬礼上讲笑话的那种。
  这跟他一贯的冷冽形象完全矛盾。
  但那是八十年孤独的后遗症：
  你要么学会跟自己开玩笑，要么疯掉。
  年轻赵宋每次听到都会愣住——
  因为那一瞬间他在那个冷酷的声音里
  听到了某种他认识的东西。是自己的影子。

tragedy_trigger: |
  他不存在。
  这不是隐喻。
  未来赵宋本质上是从虚空中凭空诞生的存在——
  那条他"来自"的时间线从未被实现过。
  他的全部记忆、经验、情感、执念，
  都建立在一段从未发生过的历史上。
  这意味着他越是拼命引导年轻赵宋"走正确的路"，
  就越是在用一个不存在的蓝图雕刻一个真实的人。
  而他永远无法确认：
  那个蓝图到底是指南针，还是诅咒。

# 外貌描述
appearance: |
  在赵宋脑海中的形象与年轻赵宋完全一致。
  同一张脸，同一个身高，同样年轻。
  但不一样的东西藏在眼神里——
  那不是二十岁的人应该有的眼神。
  是一种看什么都已经看过一遍的疲倦，
  间或被某种锐利的计算打断。
  偶尔，在某个不设防的瞬间，
  那双眼睛里会闪过一丝
  和年轻赵宋一模一样的冲动——
  然后立刻被压下去。
  
  实际上，在那条未来的时间线中，
  他因为生命被超然物质延长，
  活到一百岁时仍呈现中年面貌。
  但他选择在赵宋脑海中投射年轻的形象——
  是刻意的，还是潜意识的，
  连他自己可能都说不清。

# 背景故事
backstory: |
  在一条从未被实现的时间线上，赵宋以普通人的身份
  在灵气复苏的浪潮里沉默了八十年。
  
  不是英雄式的隐忍。是真的普通。
  没有奇遇，没有贵人，没有觉醒。
  只有一天一天的活着。
  在超凡者彼此厮杀、势力此起彼伏的八十年里，
  他像一粒沙子一样滚过每一场浪，
  每一次都差一点被淹没，每一次都侥幸留下来。
  
  他后来加入了恒序局。不是因为认同它的理念，
  而是因为恒序局是最不在乎你是谁的地方——
  它只在乎你有没有用。一个活了几十年的老兵，
  即便没有超凡力量，也有活下来本身所积累的价值。
  
  他在恒序局见过太多。
  见过修补匠把一座城市烧成白地只为清除一个概念者。
  见过蚀渊把活人像拆零件一样拆开。
  见过归零神教在欢呼中引爆了半个省的逻辑结构。
  见过彼岸者悄无声息地取代了他身边的人，
  而他到最后才发现。
  
  也失去过。失去的那些，是他回来的次要理由。
  
  八十年的尽头，两个宇宙的纠缠终于到了不可收拾的地步。
  灾变降临。他见过那个终局的样子。
  那不是末日——末日至少还有一个明确的结束。
  那是一种更糟的东西：
  两套逻辑在同一个空间里互相覆写，永远不停，
  所有存在都被卡在一个不断重置的噩梦循环中。
  
  就在那个时刻，他跨过了临界点。
  一个四阶的老人，通过某种特殊的机缘，
  获得了一具本不该属于他的神体。
  他的神体能力是时间锚定——与过去形成锚点，附着于上。
  
  他把残缺的自己送了回去。
  代价是一切。

# 能力
abilities:
  - name: "有限对话"
    description: |
      在神体被激发时浮上意识表面，
      与年轻赵宋进行受限的信息交换。
      受不可名状的限制约束。
      随着年轻赵宋污染加深，可言说的范围扩大。
  - name: "潜意识引导"
    description: |
      在非激发状态下，以模糊直觉的方式
      影响年轻赵宋的判断和反应——
      让他"不自觉地"避开某些危险或做出某些选择。
      效果微弱，且年轻赵宋有完全的否决权。
  - name: "神体控制（递增）"
    description: |
      随着自身的消散，对神体的控制权趋于完整。
      消散越接近终点，释放的力量越精确——
      但每一次释放都加速消散。
  - name: "记忆投射（被动）"
    description: |
      在特定条件下，80年的记忆碎片以梦境的形式
      被投射到年轻赵宋的意识中。
      不可主动控制投射内容。

