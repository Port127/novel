# 备注
notes: |
  未来赵宋是一个本质上不存在的角色。
  他从虚空中诞生，他的记忆对应的历史从未发生。
  这是"不可名状"的一个切面——
  也是他与年轻赵宋之间信息限制的深层根源。
  
  写作时注意：
  - 他的对话风格应该和年轻赵宋有明显区分——
    更短、更冷、偶尔有不合时宜的黑色幽默
  - 他的"诱骗"不是恶意的，但也不完全是善意的——
    是一种被八十年训练出来的本能
  - 他在消散过程中可能会出现越来越频繁的"裂隙"——
    冷冽的外壳下闪过年轻赵宋的影子
  - 最后的消散不应该是壮烈的，应该是安静的
    甚至有点突然——像一个句子说到一半就没有了

