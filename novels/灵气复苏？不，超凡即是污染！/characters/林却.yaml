notes: |
  第二季分化候选路径：被蚀渊接触。
  林却知道太多、战斗力太弱、保护太少——
  他是所有势力都想拉拢的情报型人才。
  蚀渊可能用"概念者的秘密"作为诱饵接近他。
  他不一定会"加入"蚀渊，但他可能会为了获取信息
  而走得比任何人预期的更远。
  
  与赵宋的镜像关系：
  林却的好奇心和赵宋的执念（"我到底是什么"）
  是同一枚硬币的两面。
  区别在于赵宋的追问是向内的，林却的好奇是向外的。

