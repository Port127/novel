# 角色档案

name: "林却"
aliases: []
role: supporting
archetype: "变形者"
narrative_function: "制造冲突 / 镜像对照"

first_appearance: "第1章"
first_scene: ""

profile:
  age: "22"
  gender: 男
  occupation: "小团体侦察手"
  affiliation: ["独立小团体"]
  location: "待定"

traits: [聪明, 好奇心过重, 嘴碎, 自负, 善于伪装]
moral_spectrum: "灰色"

fatal_flaw: |
  想知道的欲望比自我保护本能更强。
  林却对未知的东西有一种几乎是病态的饥渴——
  不是学者式的、有条理的求知，
  而是赌徒式的、一定要翻开最后一张牌的冲动。
  他会为了"看一眼"就走进不该走的地方，
  跟不该打交道的人交换情报，
  签下他读都没读完的契约。
  沈夜说他迟早死在好奇心上。
  林却的回答是"那至少不是死在无聊上"。

obsession: |
  弄清楚规则。
  不是遵守规则——是弄清楚规则到底是什么、边界在哪里、
  怎样才能在不被抓到的情况下踩线。
  灵气复苏改写了世界的物理规则，
  而林却觉得这是有史以来最刺激的谜题。
  他最想知道的问题是"这个世界的bug在哪里"。
  赵宋——一个跳过Path A直接拥有概念级能力的异常——
  正好就是一个巨大的、行走的、活生生的bug。

soft_spot: |
  沈夜。
  不是崇拜，不是友谊——更接近一种负债感。
  林却在觉醒早期差点死在一次失控实验里，
  是沈夜把他拽出来的。
  他从不提这件事，但他留在团队里的唯一原因
  就是还没想好怎么还这笔债。
  除此之外他对谁都不真正在意——
  或者说他一直在努力让自己不在意。

misbelief: |
  "只要我比别人知道得多，就不会被任何人算计。"
  他把信息当护甲。
  但信息不是力量——信息是诱饵。
  知道太多的人不会更安全，
  只会被更多人需要，也被更多人忌惮。
  当蚀渊或其他势力需要一个"知道很多又没有靠山"的人时，
  林却就是完美的猎物。

contrast_habit: |
  任何时候手里都在把玩什么东西——
  笔、打火机、硬币、别人的钥匙。
  他的手不能闲着，否则大脑就会开始
  往不该想的方向跑。
  安静坐着的林却比说个不停的林却更危险。

tragedy_trigger: |
  他会在某一天得到一个他真正想知道答案的问题，
  而代价刚好是他唯一在乎的东西。
  他会犹豫。然后他会选知道。
  然后他会后悔一辈子。

appearance: |
  瘦，不高，永远一副刚睡醒的样子。
  眼睛是那种很浅的棕色，亮得有点不自然——
  二阶强化的后遗症，感官过度敏锐导致的瞳孔变异。
  总是穿深色衣服，因为侦察的时候需要不显眼。
  但他本人的气质完全做不到不显眼——
  他进一个房间，三分钟内所有人都会知道他在。

backstory: |
  二阶·凝华，没有明确的元素倾向。
  擅长感知扩展和微量超然物质操控——
  不是用来打架的，是用来"看"和"听"的。
  他的觉醒不是在危机中发生的，
  而是他自己对着超然物质的浓度波动做实验时"触发"的。
  团队中战斗力最弱的一个，但情报能力最强。
  知道的东西永远比他说出来的多。

abilities:
  - name: "二阶·凝华（感知强化）"
    description: |
      超然物质操控偏向感知扩展——
      范围探测、微量物质追踪、环境异常感知。
      战斗能力有限，但侦察和预警方面无可替代。

arc:
  - stage: "起点"
    state: "团队的侦察手和情报源。对赵宋的异常表现出比所有人都浓厚的好奇——不是善意的好奇。"
    chapter: 1
    moment_type: "性格展示"

relations:
  - character: "赵宋"
    type: "队友/观察者"
    description: "林却是团队里第一个察觉赵宋'不对劲'的人。不是因为敏锐——是因为好奇让他一直在看。"
    dynamic: ""
    tension_source: "他知道赵宋有秘密。他想知道那个秘密。这个欲望比他对赵宋的善意更强。"
  - character: "沈夜"
    type: "恩人/欠债者"
    description: "被沈夜救过。留在团队的真正原因。对沈夜有一种不愿承认的忠诚。"
    dynamic: "救赎与被救赎"
    tension_source: "当离开团队的诱惑足够大时，这笔债还能不能拴住他？"
  - character: "王雅妮"
    type: "队友/互相看不顺眼"
    description: "王雅妮觉得他油嘴滑舌不可靠。林却觉得王雅妮是头不会转弯的蛮牛。但在战斗中他们配合得不错。"
    dynamic: "镜像与对立"
    tension_source: "当团队分裂时，他们会站在同一边还是对面？"
  - character: "姜棠"
    type: "队友/沉默的契约"
    description: "两个不同方向的'看见者'——他看外面，她看人。偶尔交换眼神就知道对方在想什么。"
    dynamic: ""
    tension_source: "林却走得越远，姜棠对他的担忧就越重——但她不会拦他，他也不会解释。"

