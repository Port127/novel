    dynamic: ""
    tension_source: "当赵宋的'有用'变成'危险'时，他会做什么选择？"
  - character: "王雅妮"
    type: "战友/路线分歧"
    description: "尊重她的战斗力，压不住她的脾气。两个人在'生存优先还是底线优先'上永远谈不拢。"
    dynamic: "镜像与对立"
    tension_source: "当他选择恒序局时，她会把这当成背叛。而他会把她的拒绝当成任性。"
