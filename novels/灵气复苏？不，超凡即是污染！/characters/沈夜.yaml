    description: "从失控实验里把林却拽出来的人。沈夜不把这当人情——他把这当团队管理。但林却记着。"
    dynamic: "救赎与被救赎"
    tension_source: "林却留在团队是因为这笔债。如果债清了，沈夜还能拿什么留住他？"
