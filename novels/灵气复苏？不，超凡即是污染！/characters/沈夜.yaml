notes: |
  第二季分化候选路径：恒序局。
  沈夜的务实性格与恒序局的"秩序管理"理念高度契合。
  他加入恒序局不是背叛——是他一贯逻辑的延伸。
  但对赵宋而言，曾经收留自己的人变成了体制的一部分，
  这比直接的敌意更难消化。

