first_appearance: "第1章"
first_scene: ""

profile:
  age: "30"
  gender: 男
  occupation: "小团体队长"
  affiliation: ["独立小团体"]
  location: "待定"

traits: [沉稳, 务实, 寡言, 有决断力, 冷静到近乎冷漠]
moral_spectrum: "灰色"

fatal_flaw: |
  用"有没有用"来衡量一切。
  沈夜收留赵宋的那一刻不是出于善意——
  是因为一个空间系觉醒者对团队有战术价值。
  他不是坏人。他只是在灵气复苏的生存压力下
  把"人"和"资源"这两个概念揉得太紧，
  已经分不清哪个先、哪个后了。
  某一天他会为了四个人牺牲一个人，
  然后在没人看见的地方把那杯酒喝到天亮。

obsession: |
  让所有人活着。
  不是什么崇高的理想——是一种被过去失败刻进骨头的强迫症。
  他带过的上一个团队没了。细节他不说。
  所以现在他对"全员存活"有一种不健康的执着，
  为此愿意付出任何东西——包括信任、感情和底线。

soft_spot: |
  犯傻的年轻人。
  他嘴上不说，但王雅妮太冲的时候他拦着，
  林却走太远的时候他拽回来，
  姜棠扛太多的时候他默默把活接过去。
  赵宋加入后，这个名单多了一个人。

misbelief: |
  "只要我做出正确的决策，所有人就能活下来。"
  他高估了决策的力量，低估了运气和人心的变数。
  当团队在势力化浪潮中分裂的时候，
  他会发现有些东西不是正确的决策能留住的。

contrast_habit: |
  任务结束后会独自去吃一碗面。
  固定的店、固定的位置、固定的口味。
  在超凡者的世界里维持一个极其普通的仪式感——
  仿佛只要那碗面还在，世界就还没完全失控。

tragedy_trigger: |
  对他来说最残酷的事不是牺牲某个人，
  而是发现自己牺牲的那个人本来不需要被牺牲——
  是他的判断错了。
  第一个团队的覆灭已经给了他一次这样的体验。
  他不确定那次分路撤退的决策是否正确——
  如果当时选了另一条路呢？
  这个问题他每晚都在回答，每晚答案都不一样。

appearance: |
  偏瘦，不像三阶该有的体格。
  面容沉静，有一种三十岁不该有的老气。
  眼睛很少看人——不是回避，
  是他在看人的时候同时在看整个环境。

backstory: |
  灵气复苏早期觉醒的超凡者。三阶·驭象，能力倾向待定。
  
  第一支团队：
  灵气复苏进入中期、灰域开始频发后，
  沈夜组建了第一支灰域清理队。
  四个人，配置合理，运作了将近一年。
  在一次大规模灰域响应中，灰域突然恶化扩张——
  感知全面失真，行动路线被切断，异变体密度远超预估。
  沈夜做了一个决策：分两路撤退。
  他带走了两个人。另外两个走了另一条路。
  他这一路活了。另一路没有。
  他不知道那个决策是对的还是错的。
  他只知道他选了，然后有人死了。
  
  独行期：
  之后沈夜独自运作了数月，接低风险任务勉强维生。
  意识到单人的天花板不在于能力，而在于信息——
  灰域里你看不到的东西会杀死你。
  
  重建：
  从一次失控实验中拽出林却 → 第一个队员。
  在灰域中遇到一个人硬冲救人的王雅妮 → 第二个。
  在民间医疗站看到姜棠的工作方式 → 第三个。
  赵宋觉醒时的空间损伤被误判为灰域前兆，
  团队前往调查，发现"空间系新人" → 第四个。
  
  赵宋是他打破"不招不确定的人"这条规矩的第一个例外。
  原因很简单：空间系能力在灰域里是王牌——
  稳定空间结构、开辟安全通道、遏制灰域扩张。
  这是沈夜第一个队最缺的东西。

