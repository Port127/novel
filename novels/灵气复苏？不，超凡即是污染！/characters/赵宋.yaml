# 角色档案
# 由 /character-add 创建

name: "赵宋"
aliases: ["空间系新人"]
role: protagonist
archetype: "英雄"
narrative_function: "推动主线"

first_appearance: "第1章"
first_scene: ""

# 基本信息
profile:
  age: "约20岁"
  gender: 男
  occupation: "觉醒前为普通人（具体职业待定）"
  affiliation: ["中阶小团体（初始）"]
  location: "待定"

# 性格特质
traits: [刚毅, 稚嫩, 坚强, 友善但带戒心, 有些小冲动]
moral_spectrum: "正义"

fatal_flaw: |
  冲动与执拗的共振。
  赵宋不是那种不过脑子的莽夫——他会思考、会权衡。
  但当他在意的人或他认定的底线被触碰时，
  理智会在一瞬间让位给一股不计后果的刚烈。
  更危险的是他事后不会后悔这种冲动，
  反而会把它合理化为"该做的事"。
  这意味着同样的错他会犯第二次。

obsession: |
  弄清楚自己到底是什么。
  从"我的力量为什么不对"开始，
  到"脑子里的声音是谁"，
  到"他为什么要我成为他"，
  到最终的"两个宇宙能不能被分开"——
  赵宋的执念始终是同一个问题的不断进化：
  我是什么，我应该是什么。

soft_spot: |
  接纳过他的人。
  赵宋的友善是真的，戒心也是真的。
  但一旦某个人在他最混乱的时候没有退开，
  而是选择留下——
  那个人就会被他刻进骨头里。
  他嘴上不说，行为上却会不自觉地
  把自己放在那个人和危险之间。

misbelief: |
  "我能靠自己搞定。"
  脑中的声音在引导他，他本能地抗拒。
  不是因为恐惧，而是因为赵宋骨子里
  相信自己的判断比任何外部声音都可靠。
  这种信念在前期保护他不被未来赵宋完全操控，
  但也会让他在关键时刻错过正确的引导。

contrast_habit: |
  紧张的时候会下意识攥紧右手又松开，反复捏拳。
  这是一个在危机中暴露内心动摇的小动作——
  他以为没人注意到，但身边细心的人早就看见了。
  与他刚毅硬朗的外表形成反差：
  这个看起来什么都扛得住的人，手在抖。

tragedy_trigger: |
  慢半拍的信任。
  赵宋的戒心让他不容易相信人，
  但他的友善又让他最终会相信。
  问题是——他总在最关键的时刻还在犹豫"能不能信"，
  而等他终于下定决心的时候，窗口已经关了。
  不是不信，是信得太晚。

# 外貌描述
appearance: |
  普通。这是赵宋最大的特征。
  不高不矮，不胖不瘦，五官端正但不抢眼。
  扔进人群里三秒就会被淹没的那种脸。
  只有眼神不太一样——
  有一种和年龄不匹配的沉稳，
  偶尔闪过的锐利让人说不上来哪里不对。
  觉醒后身体素质缓慢提升，但外观变化不大。
  未来赵宋在他脑海中的形象与他一模一样。

# 背景故事
backstory: |
  觉醒之前，赵宋是灵气复苏浪潮中最不起眼的路人甲。
  没有特殊天赋，没有奇遇，没有任何预兆。
  当世界已经出现中阶超凡者的时候，他还是个普通人。
  
  然后是那一声"咔嚓"。
  
  神体从某个不可知的地方降临，
  裹着空间损伤的余波撞进他的生活。
  一个独立运作的中阶超凡者小团体发现了他，
  把他当成刚觉醒的三阶空间系超凡者。
  赵宋自己也不知道真相。他只知道两件事：
  他突然有了某种力量，
  以及他的脑子里偶尔有一些不属于自己的念头。
  
  在另一条从未被实现的时间线上，
  这个普通人沉默地活了八十年，
  最终在未来的尽头跨过临界点觉醒了神体。
  他的神体——带着他残缺的意识——穿越回了过去。
  年轻的赵宋对此一无所知。

# 能力
abilities:
  - name: "概念能力（伪装为空间破碎）"
    description: |
      真实能力为概念级，但表现出的副效应（空间损伤）
      使所有人将其误判为空间系超凡能力。
      赵宋自己也尚未理解真正的能力本质。
  - name: "Path A 物质态（成长中）"
    description: |
      真实物理等阶低于外界判断。
      起步阶段，正在通过有意识的锻炼缓慢提升。
      有完整的成长空间。
  - name: "记忆梦境（被动）"
    description: |
      在特定条件下坠入未来赵宋80年记忆的碎片。
      不可主动触发，不可选择内容。
      清晰度随污染程度递进。
  - name: "神体对话（被动/有限）"
    description: |
      神体激发时可与脑中的未来赵宋进行有限对话。
      受不可名状的限制约束，信息传递量与污染深度正相关。

# 人物弧光
arc:
  - stage: "蒙昧"
    state: "不知道自己是什么，不知道脑中有另一个人。以三阶空间系的伪装在小团体中谨慎生存。"
    chapter: 1
    moment_type: "初次亮相"
    trigger: "觉醒事件"

  - stage: "疑惑"
    state: "知道自己不是空间系，知道脑中有声音，但不知道声音是谁。开始主动探索异常。"
    chapter: TBD
    moment_type: "性格展示"
    trigger: "第一次失控暴露"

  - stage: "警惕的合作"
    state: "与脑中声音建立了不信任但务实的合作关系。开始怀疑自身力量的层级远超预期。"
    chapter: TBD
    moment_type: "内心独白"
    trigger: "第一次有限对话"

  - stage: "身份冲击"
    state: "得知脑中的声音是未来的自己，且正在消散。面临'要不要成为他'的核心抉择。"
    chapter: TBD
    moment_type: "信念崩塌"
    trigger: "未来赵宋身份揭露"

  - stage: "浮士德交易"
    state: "主动追求更深的污染以获取更多信息和力量。代价：认知方式正在改变，人格边界模糊。"
    chapter: TBD
    moment_type: "道德抉择"
    trigger: "关键信息只能通过加深污染获取"

  - stage: "继承"
    state: "未来赵宋消散，神体完全归属。独自面对全部真相和使命。沉默比声音更重。"
    chapter: TBD
    moment_type: "性格转变"
    trigger: "未来赵宋消散"

  - stage: "主导者"
    state: "不再是继承者，而是选择自己道路的人。融合了遗产和自己的意志。"
    chapter: TBD
    moment_type: "成长顿悟"
    trigger: "TBD"

# 人物关系
relations:
  - character: "赵宋（未来）"
    type: "自我/遗产"
    description: "脑海深处正在消散的另一个自己。引导者、诱骗者、遗嘱人。"
    dynamic: "共生与寄生"
    tension_source: "主导权之争——谁决定赵宋成为什么样的人"
  - character: "沈夜"
    type: "上下级/被收留者"
    description: "收留他的人。赵宋感激但有保留——他能感觉到沈夜看他的眼神里有评估的成分。"
    dynamic: ""
    tension_source: "当赵宋的秘密越来越多，沈夜的'评估'迟早会得出一个赵宋不想面对的结论。"
  - character: "王雅妮"
    type: "战友/姐姐式"
    description: "第一个对他说'别怕'的人。不问他是什么，只管他还活不活着。"
    dynamic: "守护与诅咒"
    tension_source: "她保护的赵宋和真实的赵宋之间的落差在持续扩大。"
  - character: "林却"
    type: "队友/被观察者"
    description: "队里最聪明也最让人不安的人。赵宋能感觉到林却在看他——不是敌意，但也不是善意。"
    dynamic: ""
    tension_source: "林却想知道赵宋的秘密，而赵宋最不能让人知道的就是他的秘密。"
  - character: "姜棠"
    type: "队友/被照顾者"
    description: "全队唯一注意到他攥拳习惯的人。不追问，只递水。赵宋不知道该怎么回应这种安静的善意。"
    dynamic: ""
    tension_source: "姜棠知道得越多，她背负的就越多——但赵宋不知道她在背。"

