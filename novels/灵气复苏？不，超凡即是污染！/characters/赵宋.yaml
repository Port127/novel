# 备注
notes: |
  赵宋有两个版本：现在（年轻态）和未来（神体意识态）。
  本档案为年轻态赵宋。未来赵宋可单独建档。
  
  未来赵宋的性格叠层：
  年轻赵宋的底色 + 80年沉积 → 冷冽、沉着、言语诱惑、极重戒心、神经质。
  在赵宋脑海中的形象与年轻赵宋一模一样（同一张脸）。
  曾隶属恒序局。终极目标：分离两个纠缠的宇宙。
  次要目标：报仇、挽回遗憾。

