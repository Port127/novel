notes: |
  第二季分化候选路径：最难抉择的位置。
  姜棠不会主动选择任何势力。
  但当团队分裂时，她是最痛苦的那个——
  因为每一个离开的人都是她"看得到"的人，
  而她无法同时站在所有人身边。
  
  她可能是最后一个离开的人，
  也可能是唯一不离开的人——
  守着一个空了的据点，等所有人回来。
  
  与赵宋的关系是这个团队中最安静也最深的一条线。
  她是赵宋"软肋"定义中的具象——
  一个在他最混乱时没有退开的人。

