# 角色档案

name: "姜棠"
aliases: []
role: supporting
archetype: "盟友"
narrative_function: "情感锚点 / 缓解气氛 / 提供信息"

first_appearance: "第1章"
first_scene: ""

profile:
  age: "25"
  gender: 女
  occupation: "小团体后勤与医疗"
  affiliation: ["独立小团体"]
  location: "待定"

traits: [温和, 细心, 沉默寡言, 韧性极强, 回避冲突]
moral_spectrum: "正义"

fatal_flaw: |
  把所有人的伤口当成自己的责任。
  姜棠不是不知道这不健康。
  她知道。她只是停不下来。
  王雅妮的旧伤她记得比王雅妮自己还清楚，
  沈夜不吃饭的时候她会把食物放在他桌上然后走开，
  林却实验出岔子的后遗症是她跟着观察了三个月才确认无害的。
  她把自己活成了团队的基础设施——
  所有人都依赖她，但没人问过她累不累。
  因为她永远说"没事的"。
  
  这不是善良。这是一种不敢停下来的恐惧。
  如果她不再被需要，她就不知道自己是谁了。

obsession: |
  不让任何人在她看得到的地方受伤。
  不是"不让人受伤"——是"看得到的地方"。
  这个限定词暴露了她真正的创伤：
  她曾经没看到。错过了。
  然后有人在她看不到的地方死了。
  所以现在她的眼睛永远在扫——
  谁的脸色不对，谁的旧伤在发作，谁在硬撑。
  赵宋紧张时反复攥拳的小动作，
  全队只有她注意到了。

soft_spot: |
  说"没事"的人。
  因为她自己就是那种说"没事"的人。
  她听到别人说"没事"的时候，
  会本能地听出那两个字后面省略了多少东西。
  赵宋说"没事"的时候，她不会追问。
  她会在半小时后把一杯温水放在他手边，然后走开。

misbelief: |
  "只要我撑住了，其他人就不会倒。"
  她以为自己是团队的最后一道网。
  但网也会断。
  而当所有人都习惯了有她兜底的时候，
  她崩溃的那一天会比任何人预期的更具破坏性——
  因为没人做过"没有姜棠"的预案。

contrast_habit: |
  独处的时候会哼歌。
  没有歌词，只有旋律，而且经常走调。
  她自己可能都没意识到。
  跟她平时安安静静、滴水不漏的形象完全不同——
  那个哼歌的姜棠比平时的姜棠年轻十岁。
  但只有碰巧路过的人才能听到。

tragedy_trigger: |
  有一天她会面对一个选择：
  救一个人，还是救自己。
  在此之前她从来没有思考过这个问题——
  因为在她的价值体系里，
  "自己"从来不在被保护的名单上。

appearance: |
  圆脸，看起来比实际年龄小。
  总是穿有很多口袋的外套——
  每个口袋里都装着可能用得上的东西：
  绷带、止痛药、信号弹、充电宝、零食。
  手指因为长期处理伤口和配制药剂而略粗糙，
  但动作永远是轻的。
  说话声音不大，但所有人都能听清——
  因为她从不在不重要的时候开口。

backstory: |
  二阶·凝华。觉醒方向偏向生物感知——
  能感知一定范围内生物体的状态波动。
  她不是战斗人员。她是团队活着的保障。
  在灵气复苏的混乱初期自学了超凡医疗的基础知识，
  用二阶的感知能力辅助诊断和治疗——
  不是什么高端疗法，就是能在最短时间内
  止住血、稳住人、不让伤员在送到安全地点之前死掉。
  
  加入沈夜团队的原因很简单：
  沈夜是她遇到的第一个不会说"你不用上前线"
  而是直接问"你能做什么"的人。

abilities:
  - name: "二阶·凝华（生物感知）"
    description: |
      感知范围内生物体的状态波动——
      心率、体温异常、超然物质浓度变化、
      甚至情绪的生理指标。
      不是读心，是读身体。
  - name: "超凡医疗（实用级）"
    description: |
      基于生物感知的战场医疗能力。
      止血、稳定生命体征、判断伤势优先级。
      不能治愈，但能确保伤员在到达安全地点前不会死。

arc:
  - stage: "起点"
    state: "团队的沉默支柱。所有人都依赖她，没有人意识到她也在消耗自己。"
    chapter: 1
    moment_type: "性格展示"

relations:
  - character: "赵宋"
    type: "照顾者/观察者"
    description: "全队唯一注意到赵宋紧张时攥拳习惯的人。不问，不说，只是默默放一杯水在旁边。"
    dynamic: ""
    tension_source: "她越了解赵宋的秘密，背负的就越多。但她不会说出去——这会成为压垮她的又一根稻草。"
  - character: "沈夜"
    type: "队友/被忽视的支撑"
    description: "沈夜需要她的能力，也在意她——但他把这种在意处理成了'合理调配资源'。姜棠看得出来，但不戳破。"
    dynamic: ""
    tension_source: "当沈夜做出牺牲某人的决策时，姜棠是那个要去给被牺牲者包扎伤口的人。"
  - character: "王雅妮"
    type: "朋友/互补"
    description: "王雅妮是唯一会对姜棠说'你也歇会儿'的人。姜棠每次都说'没事'。王雅妮每次都不信。"
    dynamic: "守护与诅咒"
    tension_source: "王雅妮保护所有人用的是拳头，姜棠保护所有人用的是自己。两种保护方式都会把人烧干。"
  - character: "林却"
    type: "队友/沉默的契约"
    description: "两个安静的人之间的默契。姜棠知道林却在想什么，林却知道姜棠在撑什么。谁也不说。"
    dynamic: ""
    tension_source: "如果林却被蚀渊拉走，姜棠是唯一可能提前察觉但不会出声阻止的人——因为她尊重每个人的选择。"

