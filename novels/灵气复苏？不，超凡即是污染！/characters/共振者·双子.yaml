notes: |
  共振者是"融合"主题的具象化呈现——
  不止宇宙在融合，人也在被融合。
  
  与赵宋的镜像：
  赵宋 + 未来赵宋 = 同一个人的两个时间版本共享神体
  韩炽 + 韩凝 = 两个不同的人共享概念核心
  赵宋的终局是继承（未来赵宋消散，留下遗产），
  共振者的终局可能是融合（两人变成一个人）。
  
  势力归属待定：
  - 恒序局路线：被编号、管理、当作"可复制的概念者量产方案"的研究对象
  - 蚀渊路线：被当作"共享核心"的实验素材
  - 独立路线：两人自己在挣扎中寻找答案
  
  韩凝是这对组合中叙事张力更强的角色——
  她意识到了问题，但解决方案可能比问题本身更可怕。

