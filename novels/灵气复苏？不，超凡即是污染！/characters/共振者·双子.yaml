# 角色档案
# 特例四：共振者（双人一核）
# 两人共享一个概念核心，本档案为双人联合档案

name: "韩炽 / 韩凝"
aliases: ["共振者", "双子"]
role: supporting
archetype: "镜像 / 警示"
narrative_function: "镜像对照 / 世界观展示 / 制造冲突"

first_appearance: "第二季或第三季"
first_scene: ""

profile:
  age: "韩炽 28 / 韩凝 28（双胞胎）"
  gender: "韩炽·男 / 韩凝·女"
  occupation: "隶属某势力的战斗小组（具体势力待定，恒序局或蚀渊均可）"
  affiliation: ["待定"]
  location: "待定"

traits:
  韩炽: [沉默, 执行力强, 保护欲极重, 不善言辞, 习惯用行动替代表达]
  韩凝: [敏锐, 善于分析, 冷静到近乎冷淡, 说话精准, 偶尔流露脆弱]
  共振后趋同: [思维越来越像, 口头禅开始重叠, 习惯趋同, 某些时刻分不清想法是谁的]
moral_spectrum: "灰色"

fatal_flaw: |
  他们正在变成同一个人。
  共振久了，两人的人格在缓慢趋同。
  不是一方吞噬另一方——
  是两个人都在失去只属于自己的部分。
  韩炽开始说出韩凝式的精确措辞，
  韩凝开始做出韩炽式的冲动反应。
  他们都察觉到了。谁也不提。
  因为一旦说出来，
  就必须面对一个他们不敢面对的问题：
  如果继续共振下去，"我"还在吗？

obsession: |
  韩炽：保护韩凝。不惜一切代价。
  韩凝：搞清楚共振的终点是什么。
  
  两个执念正在互相矛盾——
  韩炽为了保护韩凝不惜加深共振（更强的战斗力），
  韩凝为了理解共振想要控制甚至中断共振（但这会让两人都变弱）。

soft_spot: |
  彼此。
  这不是煽情。这是一个结构性的弱点。
  两人共享概念核心意味着一人受伤另一人也会有反应。
  韩炽每次替韩凝挡伤害，代价是两个人都痛。
  韩凝每次过度使用概念端，消耗的是两个人共享的储备。
  他们是彼此最强的搭档，也是彼此最致命的弱点。

misbelief: |
  韩炽："只要在一起就没事。"
  韩凝："只要理解了就能控制。"
  
  韩炽的信念让他拒绝任何可能分开的方案。
  韩凝的信念让她以为理性分析能解决存在性问题。
  两个人都错了——但错的方向完全相反。

contrast_habit: |
  两人独处时会下棋。
  不是什么高深的棋——就是五子棋。
  韩炽一直输。韩凝一直赢。
  但随着人格趋同，韩炽开始赢了。
  韩凝注意到了这一点。
  她没有感到高兴。

tragedy_trigger: |
  共振的终点有三种可能：
  1. 两人人格完全融合，变成一个人
  2. 某一方的人格被彻底覆写，变成另一方的复制品
  3. 强制中断共振——两人永久变弱，且可能有不可逆的人格损伤
  
  每一种都是悲剧。
  而他们正在以不同的速度走向这三个可能中的某一个。

appearance: |
  双胞胎，但气质差异让人很少第一时间认出来。
  韩炽偏壮，短发，穿着简洁实用，像个士兵。
  韩凝偏瘦，长发扎低马尾，穿着更正式，像个分析师。
  但随着共振加深——
  韩炽的表情开始出现韩凝式的冷淡，
  韩凝的动作开始出现韩炽式的果断。
  近距离观察时，两个人的眼神有时会
  同时转向同一个方向——不是默契，是同步。

backstory: |
  双胞胎。灵气复苏后都走上了Path A。
  韩炽偏向物理强化，韩凝偏向感知分析。
  
  个体层级的合并错误发生在他们同时到达临界点的那一刻——
  两人体内的超然物质在相变时发生了耦合，
  凝结出的概念核心横跨了两个载体。
  韩炽承载了概念核心的物理端，
  韩凝承载了概念核心的概念端。
  
  合在一起时，他们的战斗力远超任何单个概念者：
  物理端提供执行力和承载力，
  概念端提供精确干预和规则改写。
  但分开后——超出一定距离——双方都会大幅削弱，
  物理端失去概念加持变成纯肉搏，
  概念端失去物理载体变成空有理论。
  
  更危险的副作用是人格趋同。
  共振越频繁、越深入，两人的思维、
  习惯、甚至情绪反应就越像。
  韩凝的分析报告里开始出现韩炽的口语化表达，
  韩炽的战斗直觉里开始掺杂韩凝的犹豫。
  他们从未问过对方："你还是你吗？"
  因为这个问题的答案他们都承受不起。

abilities:
  - name: "共振核心·物理端（韩炽）"
    description: |
      承载概念核心的物理执行侧。
      与韩凝共振时：Path A 能力获得概念级增幅，
      物理攻击附带规则干扰效果。
      独立时：仅保留基础Path A能力，约三阶水平。
  - name: "共振核心·概念端（韩凝）"
    description: |
      承载概念核心的概念干预侧。
      与韩炽共振时：可通过韩炽的身体释放概念级干预，
      精准改写局部规则。
      独立时：只能进行极微弱的概念感知，无法执行任何干预。
  - name: "同步效应（被动）"
    description: |
      共振距离内，两人共享部分感知和生理反应。
      一人受伤另一人感受到同等疼痛（但不受同等伤害）。
      一人情绪剧烈波动时另一人也会受到干扰。

