notes: |
  纪微是人气型角色设计——
  碎片组合的战斗方式天然适合写"智商爽"场景。
  每一次组合都是一道小谜题：
  读者看到纪微面对困境时，会不自觉地想"她这次用哪两块？"
  
  与赵宋的镜像：
  赵宋 = 完整核心 + 不懂使用 + 被误读
  纪微 = 碎裂核心 + 精通使用 + 被低估
  两人如果合作，能展现"概念能力"的两种极端形态。
  赵宋的概念能力是大锤——一下去什么都碎但控制不住力道。
  纪微的碎片组合是手术刀——精准到毫米但切不动重甲。
  
  七碎齐鸣的叙事节奏：
  - 第一季/第二季：组合术展示期，只用两碎片组合，
    建立"工具箱"的读者认知和战斗乐趣
  - 第二季末或第三季：第一次被逼到必须三碎片的场面，
    展现代价，建立禁招的恐惧感
  - 关键节点（第三季或更后）：七碎齐鸣首次执行，
    作为角色高光时刻和转折点
  - 七碎齐鸣不应该频繁使用——它的价值在于"稀缺"和"代价"
  
  第七碎片的长线伏笔：
  - 第七碎片的不稳定性暗示概念核心的自我修复倾向
  - 如果修复成功，纪微将获得一个稳定的第七能力——
    这可能让七碎齐鸣从"自杀攻击"变成"可控终极技"
  - 修复的触发条件可能与赵宋有关——
    赵宋的完整概念核心在附近时，
    第七碎片的表现是否会改变？（待验证）
  
  后续可能发展：
  - 碎片者的存在一旦被蚀渊注意到，
    可能成为"碎片移植"的实验对象
  - 七碎齐鸣的"碎裂"效果如果被恒序局知道，
    她将从"不值得注意"变成"必须管控的变量"
  - 纪微可能是最早主动试探赵宋真实能力的非敌意角色

