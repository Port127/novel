# 角色档案
# 特例三：碎片者

name: "纪微"
aliases: ["碎片者", "零件匠"]
role: supporting
archetype: "工匠 / 竞争者"
narrative_function: "世界观展示 / 制造冲突 / 镜像对照"

first_appearance: "第一季末或第二季初"
first_scene: ""

profile:
  age: "24"
  gender: 女
  occupation: "自由职业（灰域清理 / 情报掮客 / 什么赚钱做什么）"
  affiliation: ["无固定——与多个小团体有合作关系但不隶属任何一方"]
  location: "待定"

traits: [精明, 话多, 自嘲, 极度实际, 不动感情但记性极好]
moral_spectrum: "灰色"

fatal_flaw: |
  把一切都当成交易。
  纪微不是冷血——她只是把情感从决策系统里摘掉了。
  每一次帮忙都有报价，每一次合作都有退出条件，
  每一个承诺都附带有效期。
  她觉得这是聪明。
  实际上这是她在概念碎裂的那一天
  学到的唯一一课的过度延伸：
  完整的东西会碎，所以不要拥有完整的东西。
  
  这意味着她永远建不起真正的信任——
  而在势力化浪潮来临时，
  没有信任的人是最先被抛弃的。

obsession: |
  把碎片用到极致。
  她的概念核心在形成时碎裂成了七块，
  每一块都弱得可笑。
  但她拒绝认为这是缺陷。
  她花了大量的时间研究每一块碎片的特性、
  触发条件、相互干扰的模式——
  然后像搭积木一样设计组合方案。
  "大招是给蠢人用的。聪明人用工具箱。"

soft_spot: |
  欠她钱的人。
  听起来很讽刺，但这是真的。
  如果你欠了纪微的人情而且还没还——
  那你就还在她的"资产清单"上。
  她不会让资产清单上的人出事。
  不是因为在意你，是因为你死了她就亏了。
  ……至少她是这么跟自己解释的。

misbelief: |
  "碎了的东西只要用得好，比完整的还强。"
  她的碎片确实用得精妙。
  但这句话不只是在说概念核心——
  也是在说她自己。
  她把自己的人际关系、信任、归属感都碎片化了，
  以为这样更灵活、更安全。
  直到有一天她发现，碎片可以拼出很多东西，
  但拼不出一个"家"。

contrast_habit: |
  随身带一个旧笔记本——不是电子的，是纸质的。
  里面画满了碎片组合的示意图、
  触发条件的速记、和一些看不懂的符号。
  她在战斗间隙也会翻开来看。
  跟她精明干练的形象不搭——
  那个认真画图的纪微看起来像个在做手工的小学生。

tragedy_trigger: |
  碎片之间互相干扰，同时激活超过两个就会自伤。
  总有一天她会遇到一个场面，
  需要同时激活三个以上碎片才能解决——
  而代价是不可逆的内部损伤。
  她会算一笔账，然后做出"划算"的选择。
  但有些损失在账本上找不到对应的科目。

appearance: |
  个子不高，偏瘦，但动作很利落。
  永远穿暗色系的实用装备——
  口袋比姜棠还多，里面装的东西完全不同。
  头发剪到下巴位置，方便行动。
  左手腕上有一圈疤——
  那是概念核心碎裂那天留下的，
  她拒绝让姜棠或任何人看。
  笑的时候只用半边嘴——
  不知道是习惯还是某种微妙的防御。

backstory: |
  纪微的觉醒是一次结构层级的合并错误。
  
  当超然物质在她体内达到相变临界点时，
  概念核心没有完整凝结——它碎了。
  不是磨损，不是外力击碎，
  是凝结过程本身出了错，
  像一块在烧制过程中裂开的瓷器。
  
  碎裂的瞬间极其痛苦。
  她醒来时发现自己拥有了七块概念碎片，
  每一块都弱得可笑：
  - "让一扇门在十秒内打不开"
  - "让一个人在三秒内忽略一个声音"
  - "让半径两米内温度降低两度并维持一分钟"
  - "让一个正在运动的物体偏移三厘米"
  - "让一面玻璃在下次受到冲击时碎裂"
  - "让自己在五秒内不发出任何声音"
  - "第七块——效果不稳定，每次激活表现不同"
  
  单独来看，这些能力甚至不如一个二阶超凡者。
  但纪微用了将近两年的时间，
  把它们研究透了——触发条件、冷却时间、
  干扰模式、两两组合的叠加效果。
  她用这套"工具箱"在灰域清理、情报交易
  甚至小规模冲突中游刃有余。
  
  没人拿她当概念者看。她自己也不这么自称。
  她的碎片太弱，弱到不会引起蚀渊的注意——
  至少目前是这样。

abilities:
  - name: "概念碎片×7（结构层级特例）"
    description: |
      七块微弱的概念碎片，每块单独效果极小。
      同时激活上限为两块（超过则自伤）。
      碎片不会磨损但也不会成长。
      精妙之处在于组合——
      两块碎片的叠加效果远大于单块之和。
      
      碎片清单：
        ① 锁止：让一扇门/一个开关在十秒内无法被操作
        ② 忽略：让一个人在三秒内忽略一个特定声音
        ③ 降温：让半径两米内温度降低两度，维持一分钟
        ④ 偏移：让一个正在运动的物体偏移三厘米
        ⑤ 脆化：让一面玻璃/一块脆性材料在下次受到冲击时碎裂
        ⑥ 噤声：让自己在五秒内不发出任何声音
        ⑦ 未定：效果不稳定，每次激活表现不同（见"第七碎片"）
      
      冷却时间：
        单碎片激活后需15-30秒冷却才能再次使用同一碎片。
        不同碎片可以交替使用，不共享冷却。

  - name: "碎片组合术"
    description: |
      纪微自研的碎片组合方法论。
      核心原理：两块碎片在精确的时序和目标控制下激活，
      效果不是简单叠加，而是产生概念级的"连锁反应"。
      
      已验证的组合方案（纪微笔记本中有编号）：
      
      【01·死角】④偏移 + ⑤脆化
        先脆化一面承重玻璃或薄壁结构，
        再偏移飞行中的碎片/弹体使其撞入脆化点。
        三厘米偏移 + 预设碎裂 = 精确引爆。
        用途：远程触发陷阱、改变战斗地形。
        纪微评价："三厘米够了。子弹只需要偏一点。"
      
      【02·盲听】②忽略 + ⑥噤声
        自身完全消声 + 目标无法注意到特定声响。
        不是隐身——但在混乱环境中，
        一个无声且不被注意的人比隐身更有效。
        用途：灰域内渗透、脱离追踪、近距离情报窃取。
        纪微评价："隐身是概念者的浪漫。我只需要你三秒钟不看我。"
      
      【03·冻锁】①锁止 + ③降温
        锁住出口的同时降低封闭区域内的温度。
        两度不致命，但十秒关门 + 一分钟降温 =
        被困者体感急剧变化，判断力和反应速度下降。
        用途：困敌、拖延、制造谈判窗口。
        纪微评价："我又不需要打赢你。我只需要让你慢一点。"
      
      【04·碎径】⑤脆化 + ③降温
        先降温使玻璃/脆性材料进入热应力临界，
        再叠加脆化——下一次冲击不是裂开，是粉碎。
        碎片呈粉末状扩散，遮蔽视线并干扰感知类能力。
        用途：制造烟幕、反侦察、掩护撤退。
        纪微评价："二阶感知者最怕什么？不是看不到，是看到的全是噪音。"
      
      【05·偏锁】④偏移 + ①锁止
        锁住对手的武器/装备的操作机构，
        同时偏移其下一次物理输出的轨迹。
        效果窗口极短（十秒锁止 + 瞬时偏移），
        但足够在近战中制造一次致命失误。
        用途：近战反制、打断对手的连续技。
        纪微评价："你的刀偏了三厘米，鞘又卡住了。不好意思。"
      
      【06·空位】②忽略 + ④偏移
        让对手忽略某个方向的声音 + 偏移一个物体飞向那个方向。
        对手的注意力被声音盲区拉偏，
        而真正的攻击从"他不会注意到"的角度切入。
        用途：配合队友的攻击制造注意力死角。
        纪微评价："我不攻击。我只是把你的注意力挪了三厘米。"
      
      未验证/高风险组合（笔记本中用红笔标注）：
      - ⑥噤声 + ⑦未定 = 效果未知，纪微试过一次，
        结果是她本人失声了四十八小时，不敢再试
      - ①锁止 + ⑦未定 = 笔记本里只写了三个字："别再碰"
      
      组合上限：
        同时只能维持两块碎片的激活。
        若强行激活第三块，碎片之间的逻辑干扰
        会反噬她的神经系统——头痛、耳鸣、鼻血、短暂失明。
        第四块起会导致内脏应激和意识中断。

  - name: "七碎齐鸣（禁招）"
    description: |
      七块碎片强制同时激活。
      
      纪微从未成功执行过。
      但她在笔记本最后一页用铅笔画过一张推演图——
      七块碎片的干扰模式不是随机的，
      它们之间存在某种底层的"断面对称性"，
      就像一块瓷器的碎片虽然形状各异，
      但断面可以严丝合缝地拼回去。
      
      理论推演：
      七碎齐鸣不会"修复"概念核心。
      碎了的东西不会变回完整的。
      但七块碎片的干扰场在同时激活时会互相抵消，
      产生一个极短暂的（预估3-5秒）"无干扰窗口"——
      在这个窗口中，七种微弱效果同时作用、
      互不排斥，形成一个涌现性的元效果：
      
      「碎裂」——概念级的碎裂。
      不是物理破坏。是对目标"完整性"的直接干预。
      物体会碎、屏障会碎、甚至概念级的防御
      在这一击面前也会出现裂纹。
      本质是她自身"碎裂"状态的外化投射——
      她不是在攻击，是在让目标体验她经历过的事。
      
      代价：
      - 七碎齐鸣后全部碎片进入长时间冷却（预估一到两周）
      - 执行期间的自伤是累积的：
        七块同时激活意味着神经系统承受五重超限干扰。
        最乐观的估计是失去意识、全身剧痛、卧床数天。
        最悲观的可能是碎片本身被震荡波及，
        某些碎片永久损坏——工具箱里的零件会越来越少。
      - 每一次七碎齐鸣都在赌：这次之后还有几块碎片能用？
      
      纪微对这一招的态度：
      "我的碎片不会磨损，但会被我自己搞坏。
      这不是大招。这是破产清算。
      只有在一切正常手段都失败之后，
      才会考虑把自己的全部资产一次性砸出去。"

  - name: "第七碎片（未解明）"
    description: |
      七块碎片中唯一效果不固定的一块。
      
      已记录的激活表现（纪微笔记本中有详细记录）：
      - 第1次：自身周围半米内所有液体瞬间沸腾后复原
      - 第2次：目标物体表面出现了三秒的镜面反射
      - 第3次：纪微本人闻到了一种不存在的气味并持续了一小时
      - 第4次：附近一扇关着的门自动打开了
      - 第5次：什么都没发生（但林却级别的感知者会察觉到超然物质浓度的微妙波动）
      - 第6次起纪微不再主动测试
      
      纪微的笔记："每次效果不同，但'规模'始终微弱。
      它不是随机的——我只是还没找到模式。"
      
      作者层面的伏笔：
      第七碎片的不稳定可能不是缺陷。
      它可能是碎片在自发修复的过程中
      处于一种"未定态"——每次激活时
      都在尝试不同的凝结方向。
      如果有一天它稳定下来，
      它可能是七碎齐鸣从"禁招"变成"可控能力"的关键。

