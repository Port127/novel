  - character: "赵宋"
    type: "特例同类/镜像"
    description: "两个特例的第一次相遇。庄怀瑾是赵宋第一次见到'概念能力的另一种可能'。"
    dynamic: ""
    tension_source: "庄怀瑾代表了一种可能的终点——被力量绑定，失去自由。赵宋会问自己：我会不会也走到这一步？"
  - character: "林却"
    type: "信息交换者"
    description: "林却对庄怀瑾的知识如饥似渴。庄怀瑾对林却的好奇心既欣赏又警惕。"
    dynamic: ""
    tension_source: "林却想知道的某些东西，庄怀瑾知道但不愿说。"

