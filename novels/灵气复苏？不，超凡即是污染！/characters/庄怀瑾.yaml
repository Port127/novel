notes: |
  庄怀瑾是第一季中后期的关键NPC，不是常驻角色。
  他的锚地可以作为团队的临时庇护所和信息节点。
  
  对赵宋的镜像意义：
  赵宋的概念核心锚定在他的神体上（移动的锚点），
  庄怀瑾的概念核心锚定在土地上（固定的锚点）。
  一个是"力量跟着人走但人不理解力量"，
  另一个是"人理解力量但力量不跟着人走"。
  
  后续可能的发展：
  当各势力（尤其是修补匠和蚀渊）发现锚地的存在后，
  庄怀瑾的安全将受到直接威胁——
  他将被迫面对"走出去还是一起死"的选择。

