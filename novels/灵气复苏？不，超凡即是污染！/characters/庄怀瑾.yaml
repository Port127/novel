  - stage: "隐士"
    state: "被困在锚地内，以观测者和思考者的身份存在。与外界几乎断绝联系。"
    chapter: TBD
    moment_type: "初次亮相"
  - stage: "窗口"
    state: "赵宋团队的到来打破了他的独处。他开始作为信息提供者参与外部事务——但不离开锚地。"
    chapter: TBD
    moment_type: "性格展示"

