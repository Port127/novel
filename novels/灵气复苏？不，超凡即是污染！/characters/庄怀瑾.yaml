# 角色档案
# 特例二：锚地者

name: "庄怀瑾"
aliases: ["锚地者", "那个不会消散的灰域里的人"]
role: supporting
archetype: "门槛守卫 / 隐士"
narrative_function: "世界观展示 / 提供信息 / 镜像对照"

first_appearance: "第一季中后期"
first_scene: "团队发现一个'不会消散的灰域'——实际是庄怀瑾的锚地"

profile:
  age: "外貌约40，实际年龄不详"
  gender: 男
  occupation: "无（被锚定在固定区域内）"
  affiliation: ["无——无法离开锚地，不属于任何势力"]
  location: "一处永久固化的灰域（实为锚地）"

traits: [从容, 博学, 带着倦意的幽默, 洞察力强, 偶尔流露出深重的孤独]
moral_spectrum: "灰色"

fatal_flaw: |
  已经不想出去了。
  他告诉所有人他"不能"离开锚地——
  这是事实。但不是全部的事实。
  全部的事实是：他曾经尝试过，
  在概念核心被剥离的痛苦面前退了回来。
  从那以后他说服自己这里也很好。
  安全，安静，不用面对外面那个正在崩塌的世界。
  他把"被囚禁"重新包装成了"选择留下"。
  但午夜时分他偶尔会走到锚地的边界，
  看着外面的天空，站很久。

obsession: |
  理解"融合"本身。
  他是被锚定的人，也是观测者。
  锚地内部的超然物质浓度极高且稳定，
  让他比任何人都更深入地感受到了B宇宙的逻辑。
  他花了大量的时间思考两个宇宙的关系——
  不是为了解决问题，而是为了理解问题。
  "理解"是他给自己找的活下去的理由。

soft_spot: |
  年轻的、还在挣扎的人。
  他自己已经不挣扎了。
  但看到赵宋他们来到锚地时——
  那种紧绷的、充满未知的、活着的状态——
  会让他想起自己还有选择的时候。
  他不会说"我很羡慕你们"，
  但他给出的帮助总是比他嘴上承认的多。

misbelief: |
  "理解就够了，不需要行动。"
  他用"理解"代替了"参与"。
  这让他成为了一个出色的信息提供者，
  但也让他永远只是一个旁观者。
  当真正需要他走出去的时刻到来时，
  他会发现自己的脚已经生了根。

contrast_habit: |
  在锚地内养了几盆植物——
  用超然物质浓缩环境下长出来的植物，
  形态扭曲但颜色异常鲜艳。
  他给每盆植物都起了名字。
  这是一个被困在概念级力量笼子里的人，
  在做最普通的事。

tragedy_trigger: |
  如果有一天锚地被外力破坏——
  比如被修补匠视为"必须清除的逻辑异常"——
  他将面对一个选择：
  走出去，在外面作为普通人活着；
  或者和锚地一起被抹杀。
  他对两个选项的恐惧一样大。

appearance: |
  看起来像一个久居室内的中年学者。
  穿着随意，头发有点长但不邋遢。
  眼睛很亮——不是那种精力充沛的亮，
  而是那种见过太多东西之后沉淀下来的亮。
  锚地内的高浓度环境让他的皮肤呈现
  一种微妙的、不属于正常肤色的青白。
  手指修长，习惯性地在空气中
  做出像是在翻书的动作——
  他在"翻"锚地内的超然物质流。

backstory: |
  庄怀瑾的觉醒不是发生在他身上——是发生在他脚下。
  
  灵气复苏的某个阶段，某次异常浓烈的超然物质潮汐
  在他所在的区域引发了一次深度灰域。
  当灰域消散后，他还在。灰域也还在。
  准确地说，不是灰域没消散——
  是一个概念核心在这块区域内"凝结"了，
  而它选择锚定的不是庄怀瑾的身体，而是这块土地。
  
  庄怀瑾成了一个空间层级的合并错误：
  概念核心与地点绑定，而非与人绑定。
  在锚地范围内，他拥有近乎绝对的概念级控制力——
  可以改写局部物理规则、操纵超然物质流、
  甚至在有限程度上预测灰域内部的变化。
  但一旦走出锚地，概念核心会被现实抚平机制剥离，
  他将变成一个毫无力量的普通人。
  
  他试过一次。走了三步就被疼痛拽了回来。
  从此他不再尝试。
  
  锚地的外观与灰域相似——
  从外部看，这里是一个"不会消散的灰域"。
  沈夜的团队是在一次例行灰域巡查中发现它的。

abilities:
  - name: "锚地控制（空间层级特例）"
    description: |
      在锚地范围内拥有概念级环境控制力——
      改写局部物理规则、操纵超然物质流、
      屏蔽外界感知、创建安全区域。
      离开锚地则力量完全消失。
  - name: "深度感知"
    description: |
      长期浸泡在高浓度超然物质中，
      对B宇宙逻辑的感知深度远超常人。
      能"读"超然物质的流向和浓度变化，
      提供类似天气预报的灰域预警。

