# 故事大纲（结构化版）
# 由 /pipeline-outline-bootstrap 创建
# 与 outline.md 互补：此文件为结构化数据，outline.md 为叙述性文档

# 全书概要
premise: "海临城被末世游戏《临界》吞噬，陈默手握灰盒调试器能改规则，但每次动用观测权重就涨。权力有代价，代价是深渊。"
theme:
  - 权力与代价
  - 规则与漏洞
  - 生存与秩序
tone:
  - 紧张
  - 冷峻
  - 热血
  - 悬疑

# ============================================================
# 结构骨架
# ============================================================
structure:
  - act: "第一阶段：生存奠基"
    title: "从恐惧到规则玩家"
    chapters: [1, 10]
    arc: "陈默从被裁程序员变成末世的规则玩家，用做项目思维拆解恐惧，建立小队与篝火据点雏形"
    key_event: "职业试炼，灰盒权限点首次可用"
    turning_point: "归属锁定立威，宋行舟看出灰盒痕迹"
    pacing_note: "快速推进，每章引入新规则与新人物，钩子密集"
    
  - act: "第二阶段：据点成型"
    title: "从小队到据点治理"
    chapters: [11, 25]
    arc: "陈默从规则玩家变成据点核心，建立制度、接纳外人、源点攻坚、清算日防守"
    key_event: "清算日防守，与白烬会首次正面交锋"
    turning_point: "周野以伤换命，陈默冻结救场但反噬加重"
    pacing_note: "中速推进，势力与人祸副本交织，据点制度立起来"
    
  - act: "第三阶段：远征天穹"
    title: "从守住到攻城"
    chapters: [26, 40]
    arc: "陈默走出据点，直面跨区势力，夺取门票碎片，与秦烬正面交锋"
    key_event: "门票碎片合成，城市领主令开幕"
    turning_point: "陈默被标为高观测目标，全城追杀"
    pacing_note: "加速推进，数据风暴、势力混战、规则博弈交织"
    
  - act: "第四阶段：主城入城"
    title: "从攻城到改世界"
    chapters: [41, 50]
    arc: "陈默入城，记忆回廊揭示真相，补丁生效但代价兑现——权限清零、秦烬夺走结算"
    key_event: "第一次补丁，暗潮削弱，清晨无暗潮的奇迹窗"
    turning_point: "代价兑现：权限被清零一半，秦烬夺走结算，跨区联机开启"
    pacing_note: "收束推进，真相揭示、代价兑现、钩子留白"

# ============================================================
# 多时间线（可选）
# ============================================================
timelines:
  - name: "主线时间线"
    description: "陈默从开服到入城的50天"
    chapters: [1, 50]
  - name: "回滚时间线"
    description: "记忆回廊揭示的旧版本片段"
    chapters: [48]
    note: "重启次数：6，陈默在某个版本出现过"

