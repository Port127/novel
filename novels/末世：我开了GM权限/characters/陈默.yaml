appearance: 帅气十足
backstory: test update
abilities:
- name: 灰盒调试器
  description: 开发者模式的入口。弱点标注、归属锁定、冻结指令、补丁注入。代价：权限点稀缺、精神负荷、观测权重上调。
- name: 数据编译者
  description: 隐藏职业，信息加工者。能把掉落、碎片、信息编译成临时模块。与灰盒互相喂养。
