# 设定条目：观测权重机制
# 由 /pipeline-outline-bootstrap 创建

id: rule_002
name: 观测权重机制
category: world_rule
status: tentative

summary: 每一次规则的改写都在后台留下痕迹。权重累积到临界值时，审判会降临——形式不固定，但必然致命。

description: |
  系统没有公榜，没有排行榜，没有"改写者积分榜"。
  
  但后台有一本账。
  
  观测权重是隐性的。普通玩家看不见，势力看不见，连陈默也只能通过灰盒的提示窗口感受到它在上涨——像一个倒计时的影子，永远悬在视网膜边缘。
  
  每次动用高阶指令，权重就加一分。每次改写规则边角，权重就再加一分。累积不是线性，而是指数——越用越快，越快越危险。
  
  权重阈值的后果：
  
  **低阈值**——系统记录。灰盒窗口会弹出"异常改写者记录中"的提示。这不算惩罚，只是提醒：你在被看见。
  
  **中阈值**——势力锁定。白烬会的清算名单上，你的名字从"待观察"升到"优先猎杀"。烬环商会的黑皮账本里，你的灰盒波形被标成高价样本。雾塔局把你的每一次指令回响拍成录像，卖给跨区势力。
  
  **高阈值**——跨区介入。黑潮同盟的潮印会追踪你的坐标。审计者投影会出现在结算区，盯着你的每一次掉落。
  
  **临界值**——审判降临。
  
  审判的形式不固定。可能是直接抹杀：系统判定你为"漏洞"，把你的坐标从地图上抹掉。可能是制造事故：暗潮提前降临，怪物定向刷新，你的据点一夜之间变成副本。可能是安排追杀：白烬会的精英、黑潮同盟的潮印猎人、甚至秦烬本人，同时收到你的坐标。
  
  但它有个弱点：权重可以洗清。
  
  方式未知，但存在。也许是一次代价极大的"脱敏"，也许是一次审计任务的完成，也许是一次权限的清零。洗清的方式是陈默需要探索的另一条线索——他在用权力活下去的同时，也要找到把权力账本清空的办法。

rules:
  - "权重隐性——只有后台知道，玩家不可见，灰盒持有者只能通过提示感知趋势"
  - "权重累积是指数级——越用越快，越快越危险"
  - "阈值分层：低阈值（系统记录）→ 中阈值（势力锁定）→ 高阈值（跨区介入）→ 临界值（审判降临）"

constraints:
  - "审判形式不固定：可能是直接抹杀、制造事故、安排追杀的组合"
  - "权重可以洗清——方式待探索（脱敏、审计任务、权限清零等）"

