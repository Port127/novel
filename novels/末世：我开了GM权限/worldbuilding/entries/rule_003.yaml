# 设定条目：暗潮机制
# 由 /pipeline-outline-bootstrap 创建

id: rule_003
name: 暗潮机制
category: world_rule
status: tentative

summary: 世界的呼吸是错的。每夜零点，数据风暴的潮汐涌起——怪物翻倍、灯光颤抖、通信断断续续，而人的脑子会被什么东西轻轻敲开。

description: |
  暗潮不是"夜晚怪物变强"这么简单。
  
  它是这个世界的呼吸——一种不正常的呼吸。每到零点，规则就像退潮后的礁石一样裸露出来，然后又像涨潮一样重新覆盖。
  
  在这六个小时的潮汐期里，怪物刷新率翻倍，灯泡开始颤抖，手机信号变成雪花，无线电台里会传来一些不该存在的人声。
  
  但最危险的不是怪物，是精神污染。
  
  污染像辐射，但它不伤皮肤，伤脑子。
  
  **低度污染**——你会听见一些不该存在的声音。不是幻听，是真的有人在说话，但你找不到人。可能是隔壁楼里某个已死之人的最后一句话，可能是某个还未出生的人提前泄露的遗言，可能是系统后台的日志被翻译成了人声。
  
  **中度污染**——你会开始做一些莫名其妙的事。比如盯着墙壁上的裂缝看整整两小时，比如把所有食物按颜色分类然后全部扔掉，比如给每个怪物起名字然后和它们说话。你以为自己在做决策，但你不知道决策的源头已经被置换了。
  
  **重度污染**——你会变成怪。
  
  不是"变成怪物"，而是"变成怪"——人会开始忘记自己是谁，开始把其他人的脸看成刷新点，开始把血看成掉落物，开始把队友看成Boss。人还在，但人已经不在了。
  
  暗潮的触发逻辑有两层：
  
  一层是系统的潮汐周期——自动的、固定的、不可绕过的。世界每隔24小时就要"喘一口气"，喘气的时候规则会松动，怪物会溢出。
  
  另一层是观测权重的加成——高权重者的暗潮会更凶。系统会在后台调整污染强度、刷新密度、甚至定向投放精英。
  
  陈默用补丁削弱了暗潮，但这只是临时效果。他创造了一个"奇迹窗"——一个没有暗潮的清晨。但这个窗口也让他付出了代价：权限点清零一半，被秦烬抢走结算，观测权重飙升。
  
  压制污染的方式：
  
  **火源与篝火**——火是这个世界唯一"不受规则管辖"的东西。它不是数据，不是代码，它是原始的热。在火的范围内，污染会被暂时压制。
  
  **安全标签**——系统给予的"临时免疫"。它像一个防火墙，把污染挡在外面。标签碎片可以升级篝火为庇护所，庇护所可以升级为领地。
  
  **净化路线**——林知夏的觉醒方向。她能用某种方式清理污染的残留，但她自己也正在被污染慢慢侵蚀。

rules:
  - "暗潮周期：每天0:00-6:00，自动触发，不可绕过"
  - "观测权重加成：高权重者的暗潮更凶（污染强度上升、刷新密度增加、定向投放精英）"
  - "精神污染递进：低度（莫名人声）→ 中度（莫名行为）→ 重度（变怪）"

constraints:
  - "暗潮期间外出几乎等于自杀"
  - "火源/篝火/安全标签可压制污染，但只是临时"
  - "补丁可以削弱暗潮，但代价极高且效果临时"

