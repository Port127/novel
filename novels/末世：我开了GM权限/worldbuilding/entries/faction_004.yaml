id: faction_004
name: 审计者/烬序
category: faction
status: tentative

summary: 他们不是人，也不是系统。他们站在规则的后台，翻阅每一本账簿，判定谁是漏洞、谁是钥匙、谁该被清算。他们不说话，他们只留下一个名字：烬序。

description: |
  审计者没有脸。
  
  陈默第一次看见审计者的时候，它是一个投影。投影站在结算区的角落，像一段没有被渲染完全的代码——边缘模糊，颜色像灰烬，嘴的位置是空的。
  
  投影没有说话，但陈默的视网膜上弹出了一条系统提示：异常改写者记录中。他知道，那个投影在看他。不是看他的脸，是看他的权限波形，看他后台的账簿，看他每一次灰盒指令的回响。
  
  审计者的名字叫烬序。
  
  烬序不是组织名，也不是代号。它更像一个"签名"——每一次审计判定、每一次异常记录、每一次权重上调，都会在后台留下"烬序"两个字。
  
  陈默不知道烬序是什么。是人？是系统投影？还是某种更高层的存在？他只知道，烬序站在规则的尽头，站在权限的边界，站在他每一次使用灰盒时都会感到的那个"有人在翻我的档案"的体感背后。
  
  烬序不直接清算人。
  
  审计者的工作不是杀人，是"判定"。判定谁是异常改写者，判定谁的观测权重到达阈值，判定谁该被送上清算名单。
  
  判定之后，烬序不执行。执行的是白烬会、是黑潮同盟、是系统定向投放的精英怪、是暗潮的提前降临。烬序只负责"盖章"，盖完章后，审判会以不固定的形式降临。
  
  但烬序的盖章有一个奇怪的边界：它只盖"漏洞持有者"，不盖"规则利用者"。
  
  陈默持有灰盒，他是漏洞。秦烬持有借口令，他是规则利用者。审计者记录过秦烬的名字，但没有清算他。为什么？因为秦烬的权限是"利用规则边角"，不是"改写规则内核"。
  
  这就是烬序的判定逻辑：漏洞必须被堵死，利用者可以被容忍。
  
  **回滚次数**——烬序留下的另一条线索。
  
  在主城的第二环，记忆回廊的尽头，陈默看见了一行字：重启次数：6。
  
  他不知道这行字是什么意思。但他记得Patch-07说过的一句话："这个世界不是第一次开服。"
  
  回滚。重启。重置。世界被"回滚"过六次。每次回滚意味着什么？是世界崩坏后被修复？是规则崩溃后被重写？还是某种更高层的"编辑"在调试这个世界，把不满意的版本删除，重新开服？
  
  陈默在某个版本出现过吗？
  
  Patch-07的日志里有一条奇怪的记录：CN-HL-07 Patch Log。日志的日期是世界开服之前，内容是"内测补丁遗留"。陈默参与过那个项目，但他不记得项目的具体内容。
  
  也许他在这个世界的某个旧版本里出现过。也许灰盒不是"意外遗留"，而是"被投放"。也许陈默不是"漏洞的持有者"，而是"漏洞本身"。
  
  这些线索像钉子一样钉在陈默脑子里，但烬序没有回答。烬序只负责判定，不负责解释。
  
  与跨区门的关系——烬序站在门的另一侧。
  
  跨区门的开启需要权限。权限的形态未知，但烬序似乎与门的另一侧有联系。有人猜测：跨区门的另一侧是审计者的"总部"，是烬序的"后台"，是这个世界真正的"控制室"。
  
  黑潮同盟与烬序有隐性协议。协议的内容不写，但表现为：烬序不清算黑潮的收费口，不清算潮印标记。也许潮印是烬序的"追踪通道"，黑潮是烬序的"外勤供货商"。
  
  这也是陈默需要探索的另一条线索：跨区门通向哪里？烬序站在门的哪一侧？他手里的灰盒，是不是就是门的钥匙？

rules:
  - "异常改写者记录：记录所有改写规则内核的行为"
  - "观测权重判定：后台账簿，决定惩罚阈值"
  - "审计惩罚：临界值触发后，审判以不固定形式降临"
  - "判定边界：只清算漏洞持有者，不清算规则利用者"

constraints:
  - "审计者身份保持神秘（人？系统？更高层？不设定）"
  - "烬序不直接执行，只负责判定和盖章"
  - "回滚次数：6——世界重置过六次，陈默在某个版本出现过"

