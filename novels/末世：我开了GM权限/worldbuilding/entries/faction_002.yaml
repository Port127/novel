id: faction_002
name: 烬环商会
category: faction
status: tentative

summary: 他们不杀人，他们只让你买不到药。以"交易中立"为壳的资源寡头，掌控税券、账本与情报——水、粮、命，都在他们的账簿里。

description: |
  烬环商会的门口没有旗帜，没有守卫，只有一个账台。
  
  账台后面坐着一个人，手里拿着一本黑皮账簿。你问他水多少钱，他会翻开账簿看一眼你的名字，然后告诉你：今天的水价是昨天的一倍。
  
  你问他为什么，他会把账簿翻到下一页，指着一行字说：因为昨天你和一个被白烬会盯上的人说过话。
  
  这就是烬环商会的逻辑。他们不杀人，不抢东西，不烧据点。他们只是把资源流通的全部管道捏在手里，然后像拧水龙头一样，拧紧每一个他们不喜欢的人。
  
  **税券池**——他们的核心武器。
  
  世界融合后，货币死了。人民币、美元、欧元，全部变成了废纸。系统只承认一种货币：能量晶。但能量晶不够用，不够流通，不够支撑一个城市的交易网络。
  
  烬环商会发明了税券。
  
  税券像游戏里的"代币"，但又不一样。它不是系统发行的，而是商会发行的。商会说：一张税券可以换一瓶水，十张税券可以换一盒药，一百张税券可以换一张跨区通行证。
  
  你问税券从哪来。商会说：做任务、交贡献、卖情报、或者直接用能量晶兑换。但兑换比例不是固定的——商会每天调整，像股市一样涨跌。
  
  涨跌的原因不写在公告里，写在账簿里。账簿是商会的眼睛，它记录每一笔交易、每一个人、每一次势力动向。商会知道你昨天去了哪里、和谁说过话、有没有被白烬会盯上、有没有被雾塔局拍照。
  
  账簿决定了你的税券汇率。喜欢你的人，汇率稳定；不喜欢你的人，汇率翻倍。
  
  这就是税券池的本质：**不是货币，是控制权。**
  
  **黑市账本**——他们的情报网络。
  
  账簿不只是记录交易，它记录一切。雾塔局的录像、白烬会的清洗名单、黑潮同盟的潮印位置、灰盒波形的高价样本——全部在账本里。
  
  商会不生产情报，它收购情报。然后加工、分类、标价、出售。情报的价格比水更贵，因为情报可以救命，也可以杀人。
  
  陈默第一次见到账簿是在魏成的仓库里。那一页写着：灰盒波形收购价——三百税券。旁边还有一行备注：优先收购"补丁注入"波形，因为补丁是灰盒最危险的权限。
  
  **灰盒波形收购**——他们对陈默的兴趣。
  
  商会不猎杀GM，不清算漏洞持有者。他们收购GM的波形，收购灰盒的录像，收购陈默每一次指令回响的画面。
  
  收购价写在账簿里，每天都在涨。涨的原因不写，但陈默知道：有人在跨区频道问他的坐标，有人在主城大厅等他的掉落，有人把他的名字从"待观察"改成"高价样本"。
  
  商会背后有股东。股东是谁？账簿里没有写。但商会的高层在跨区频道有私人通讯，在主城有私人柜台，在审计者的投影面前有私人对话。
  
  股东不露面，但他们决定税券池的汇率上限、决定灰盒波形的收购价上限、决定商会在城市内的扩张边界。
  
  这是一张看不见的网，商会只是网的节点之一。

rules:
  - "税券池：商会发行的代币，汇率浮动，账簿决定个人汇率"
  - "黑市账本：记录一切交易与动向，收购并出售情报"
  - "灰盒波形收购：高价收购GM波形，价格每日上涨"

constraints:
  - "商会不直接动刀，只控制资源流通"
  - "商会背后有神秘股东（跨区势力？审计者？身份待定）"
  - "账簿记录一切，但不记录股东的身份"

