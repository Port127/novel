# 设定条目：世界融合规则
# 由 /pipeline-outline-bootstrap 创建

id: rule_001
name: 世界融合规则
category: world_rule
status: confirmed

summary: 城市被游戏吞噬，规则成为物理，死亡不再有后路。

description: |
  那一夜，海临城的路灯闪烁了三次。
  
  第三次之后，世界公告像审判书一样挂在每个人的视网膜上。《临界》不是一款游戏了——它是这个城市的新名字，也是每个人的新命运。
  
  数据化的本质是"规则覆盖"。怪物刷新点取代了便利店的位置，任务链取代了上班打卡的节奏，掉落取代了工资条上的数字。职业觉醒成为新的身份证，等级成为新的社会分层。
  
  最残酷的一条规则写在最显眼的位置：**死亡真实。**
  
  新手期的72小时是系统给的最后善意——它会画出路径，但不会替你走。越拖越难，越等越死。这不是游戏，这是审判。
  
  规则不再是虚拟的约束，它们变成了物理法则。你可以不服，但代价是血。

rules:
  - "世界开服瞬间，城市变成副本——规则单向覆盖物理"
  - "融合是单向的：规则覆盖现实，现实不会反噬规则"
  - "新手期72小时：路径明确，生命不保"
  - "规则具有强制执行力，绕过的唯一方式是持有更高层权限"

constraints:
  - "死亡真实。普通玩家没有复活机制"
  - "规则单向覆盖现实物理法则，不会被现实反噬"
  - "原游戏玩家不知道城市被拉入——他们也只是棋子"

