# 设定条目：白烬会
# 由 /pipeline-outline-bootstrap 创建

id: faction_001
name: 白烬会
category: faction
status: tentative

summary: 他们不求生，他们求胜。把末世当竞技场的玩家化组织，信奉清算弱者，猎杀GM，以恐惧与资源控制扩张。

description: |
  白烬会的旗帜是白色的火焰。
  
  火焰不该是白色的，但在这个世界里，规则可以覆盖常识。白烬会的旗帜飘在每一个被清算过的据点上方，像一种无声的公告：这里的人已经被"处理"了。
  
  他们不是求生者。求生者会害怕、会团结、会为了活下去牺牲一切。白烬会不害怕，他们把末世当成竞技场，把其他幸存者当成NPC，把死亡当成积分的结算方式。
  
  秦烬坐在白烬会的最高处，像一个冷静的玩家在看着游戏面板。他不恨陈默，也不想杀陈默。他只是想赢。陈默手里有灰盒，秦烬手里有借口令——两个都是规则的入口，但入口的密码不一样。
  
  借口令的来源是一团迷雾。它与灰盒有联系，与烬序有联系，但联系的线还没有被拉直。秦烬对陈默说了一句："你是管理员接班候选。"这句话像一枚钉子，钉在陈默脑子里，但他不知道钉子的另一端连着什么。
  
  白烬会的核心不是人数，而是权限。
  
  **秦烬**——首领，极端理性，持有借口令（能短时改写归属与复活判定）。他把陈默当成对手，当成"钥匙"，当成必须被控制的变量。
  
  **沈鸢**——智囊，擅长交易与挑拨。她以合作姿态出现在陈默面前，说"我们可以共享情报"，但她的每一句话都在收集灰盒波形、每一次交易都在试探权限边界。
  
  **罗魇**——执行官，近战压迫感极强。他负责清算据点，负责让被围攻的人在绝望中选择投降。他的斧头劈开过不止一个庇护所的门。
  
  **杜阙**——狙击手，擅长远程点杀。他不杀最强的人，他杀最弱的人。他知道"人心崩盘"比"据点崩盘"更容易引发投降。
  
  白烬会的运作逻辑像一台精密的机器：
  
  **清算日机制**——定期对独立据点发动清洗。清洗的规则写在公告里：归顺或灭亡。归顺者成为白烬会的附庸，灭亡者成为白烬会的积分。
  
  **猎杀GM**——专门清算灰盒调试器持有者。白烬会在跨区频道发布悬赏，把"灰盒波形"标成高价目标。他们知道灰盒是规则的漏洞，漏洞必须被堵死——或者被控制。
  
  **复活额度**——白烬会有某种方式让成员"复活"。具体机制未知，但秦烬在主城大厅展示了复活额度的余额，像一个玩家展示他的游戏积分。普通玩家死亡是真实的，但白烬会的死亡是可结算的。这让他们更像"玩家"，更像"不是求生者"。
  
  与其他势力的关系：
  
  他们与烬环商会互相利用——白烬会提供清洗服务，商会提供税券与情报。
  
  他们与黑潮同盟互相交易——黑潮提供污染者炸弹与武器，白烬会提供坐标与通行权。
  
  他们与审计者的关系模糊——秦烬被烬序审计名单记录过，但审计者似乎没有直接清算白烬会。也许审计者只清算"漏洞持有者"，不清算"规则利用者"。

rules:
  - "清算日机制：定期清洗独立据点，逼人归顺或灭亡"
  - "猎杀GM：专门清算灰盒调试器持有者"
  - "复活额度：成员死亡可结算复活（机制待定）"

constraints:
  - "复活额度有上限（秦烬暗示）"
  - "借口令效果有限（不能完全改写规则，只能改写边角）"
  - "审计者不直接清算白烬会（原因待定）"

