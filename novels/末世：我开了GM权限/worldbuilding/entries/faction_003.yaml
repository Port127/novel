# 设定条目：黑潮同盟
# 由 /pipeline-outline-bootstrap 创建

id: faction_003
name: 黑潮同盟
category: faction
status: tentative

summary: 他们不在城市里求生，他们在城市之间穿行。潮印是他们的眼睛，收费口是他们的嘴，跨区门是他们等着的终点。他们不抢水，他们抢路。

description: |
  黑潮同盟的旗帜是黑色的潮汐纹。
  
  潮汐不是水，是脚印。黑潮同盟的人像潮水一样在城市之间流动，从一个地图刷到另一个地图，从一个副本穿到另一个副本。他们不属于任何一个城市，他们属于"路"。
  
  他们不抢水，不抢粮，不抢据点。他们抢门。
  
  **潮印机制**——他们的眼睛。
  
  潮印是一种特殊的标记，像隐形的钉子，钉在目标的视网膜边缘。被钉上的人看不见潮印，但黑潮同盟的人能看见——他们能追踪钉子到任何地方，哪怕你躲进副本、躲进据点、躲进主城的第二环。
  
  潮印的原理像一种"权限寄生虫"。它附着在目标的权限波形上，把波形变成一种可追踪的信号。持有权限的人会被潮印自动标记——灰盒、借口令、管理员碎片，全部在潮印的追踪范围内。
  
  陈默第一次看见潮印是在第20章。那只精英怪"江潮猎手"掉落了一块带潮印徽记的能量晶。徽记像一只黑色的眼睛，盯着他。他知道：这只怪不是城市里的野怪，它是跨区势力投放的"标记炸弹"。
  
  潮印的解除方式未知。有人猜测需要"权限清洗"，有人猜测需要"跨区门的认证"，有人猜测需要"审计者的赦免"。但黑潮同盟不公布答案——潮印是他们的武器，公布答案等于暴露弱点。
  
  **收费口**——他们的嘴。
  
  黑潮同盟在每一个关键路段设收费口。断路、桥梁、隧道、裂隙入口——全部被潮印旗封住。
  
  你想过去，交护送费。不交？那就绕路。绕路的代价是时间、是体力、是可能在风暴里死掉的风险。黑潮同盟不逼你交钱，他们只是把"不交钱"的代价放大到你不敢承受的程度。
  
  收费口的护送费不是税券，不是能量晶，是"情报"。黑潮同盟问你：你看见过谁？你听说过什么？你手里有没有什么"不该存在的东西"？
  
  陈默在第34章拒绝交高价，只用少量物资换了一句情报：尖塔外围镜头分布。然后他用补丁注入绕开了收费口——把一段废旧围栏临时规则化成"可通行缺口"。
  
  这是黑潮同盟第一次吃瘪。但收费口的人没有追杀，只是把陈默的坐标记进了账簿，把"潮印追猎"的威胁挂在公屏上。
  
  **跨区门**——他们等着的终点。
  
  黑潮同盟真正的目标不是收费口，不是护送费，不是潮印追猎。他们真正的目标是"跨区门"。
  
  跨区门是城市之间的通道，像副本入口，但又不一样。它不是系统开放的，而是需要"权限"才能开启。权限的形态未知——可能是门票碎片，可能是管理员钥匙，可能是审计者的赦免令。
  
  黑潮同盟知道跨区门的存在，他们在等权限成型。他们会盯着每一个持有门票碎片的人，盯着每一个拿到管理员钥匙的人，盯着每一个被审计者标记的人。
  
  等权限成型的那一刻，他们会入场。入场的方式不是合作，是抢。
  
  与审计者的关系——他们有联系。
  
  黑潮同盟不只是掠夺者，他们与审计者有某种隐性的协议。协议的内容未知，但表现为：审计者不清算黑潮同盟的收费口，不清算潮印标记，不清算跨区门的追踪。
  
  有人说：黑潮同盟是审计者的"外勤"。审计者负责判定异常，黑潮同盟负责追猎异常。还有人说：黑潮同盟是审计者的"供货商"，他们把权限持有者的坐标卖给审计者，换取不被清算的特权。
  
  真相藏在潮印的背后。潮印不只是追踪工具，它可能也是一种"审计通道"——被潮印标记的人，审计者也会看见。

rules:
  - "潮印机制：权限寄生虫，附着在权限波形上，自动标记并追踪"
  - "收费口：关键路段设护送费，以情报换取通行"
  - "跨区门：城市之间的通道，需权限开启（形态待定）"

constraints:
  - "潮印解除方式未知（权限清洗？跨区门认证？审计者赦免？）"
  - "跨区门开启需要权限（门票碎片、管理员钥匙、审计者赦免令）"
  - "黑潮同盟与审计者有隐性协议（协议内容待定）"

