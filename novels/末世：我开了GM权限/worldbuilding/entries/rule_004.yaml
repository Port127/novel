# 设定条目：据点体系
# 由 /pipeline-outline-bootstrap 创建

id: rule_004
name: 据点体系
category: world_rule
status: tentative

summary: 人在末世里需要一个锚点。篝火、庇护所、领地——三级递进，从"躲"到"守"到"立城"。但锚点越稳，敌人越近。

description: |
  暗潮降临的时候，人会本能地找一个地方躲起来。
  
  但躲不是安全。暗潮的污染像水一样渗透，墙挡不住，门挡不住，只有"火"能挡住。火是这个世界里唯一不受规则管辖的东西，它像一块原始的礁石，在规则的潮汐里露出水面。
  
  篝火是据点的第一级。
  
  一堆燃烧的东西——木头、布料、油桶，任何能烧的——都可以变成篝火。但普通的火不是据点，只是"临时压制区"。要变成据点，需要篝火核心。
  
  篝火核心不是自然存在的，它是陈默用编译者把"火"临时规则化的产物。第5章的暗潮里，他编译出了残缺的篝火核心，把地下车库变成了"弱安全区"。
  
  篝火级据点的功能很简单：压制污染、提供临时照明、让疲惫的人能喘一口气。但它不能挡住怪物，不能提供医疗，不能存储物资。它只是一个"喘气的地方"，不是"活下去的地方"。
  
  庇护所是据点的第二级。
  
  升级庇护所需要两样东西：安全标签碎片、权限碎片。
  
  安全标签碎片从副本、源点、精英击杀中获得。它像"防火墙升级包"，把篝火的压制范围扩大，把压制效果稳定化。
  
  权限碎片从主城任务链中获得。它像"后台权限窗口"，解锁更多据点功能——仓库、修理台、医疗角、外环哨点。
  
  庇护所级据点像一个"小型营地"。它能接纳外人，能存储物资，能提供基础医疗，能设立外环哨点预警。但它还不能挡住白烬会的清算日，不能挡住黑潮同盟的潮印追猎。
  
  领地是据点的第三级，也是最高级。
  
  升级领地需要更多的碎片——更多的安全标签，更高的权限等级，更多的贡献值积累。贡献值是据点成员用"工时"换的，每一小时的巡逻、修理、医疗、战斗，都会被程雪记进账簿，变成贡献积分。
  
  领地级据点像一个"游戏主城"。围墙、炮塔、医疗室、通讯台——全部上线。它不再只是"躲"和"守"，它能"扩张"。灯塔同盟会来签联防条款，顾聿会送新人换医疗资格，据点开始像一个"小型政权"。
  
  但领地有一个代价：它会自动被系统纳入"主城网络"。
  
  城市领主令开启的时候，全城节点与源点集体点亮。领地级据点会被追踪，会被评级，会被纳入清算优先级名单。白烬会会优先攻击有墙的据点，黑潮同盟会优先在领地外围设收费口。
  
  据点升级是双刃剑：越稳，敌人越近。
  
  **据点被破**——锚点崩塌的时刻。
  
  据点被攻破后，污染会像潮水一样涌进来。但涌进来的人不会全部被淹没——会有幸存者。
  
  幸存者的污染程度取决于他们在据点里的位置、他们在被破时的反应、他们有没有被及时救援。林知夏会建立"伤情分级与隔离"，把污染程度分成"轻度、中度、重度、变怪"。轻度可以净化，中度需要隔离治疗，重度需要长期压制，变怪需要处置。
  
  幸存者会记住被破的那一刻。那一刻会改变他们对据点的态度——有人会更坚决地守，有人会选择离开，有人会把陈默当成"救不了的罪人"。
  
  据点不是绝对的安全，只是一个"暂时的锚点"。锚点会被冲走，但人要学会造新的锚点。

rules:
  - "篝火级：火源压制污染，临时安全区，不能挡怪、不能存储"
  - "庇护所级：安全标签碎片+权限碎片升级，解锁仓库/修理台/医疗角/哨点"
  - "领地级：更多碎片+贡献值升级，围墙/炮塔/医疗室/通讯台，具备主城功能"
  - "据点被破后部分污染，有幸存者——污染程度分级（轻度/中度/重度/变怪）"

constraints:
  - "升级条件：安全标签碎片数量、权限碎片等级、贡献值积累（都需要）"
  - "领地级据点自动纳入主城网络——被追踪、评级、纳入清算名单"
  - "据点升级会吸引更强敌对势力（白烬会优先攻击有墙的据点）"

