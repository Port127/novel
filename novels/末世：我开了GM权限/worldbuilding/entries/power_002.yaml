# 设定条目：数据编译者
# 由 /pipeline-outline-bootstrap 创建

id: power_002
name: 数据编译者
category: power_system
status: tentative

summary: 隐藏职业，信息加工者。陈默的程序员背景是觉醒的密码——他能把碎片编译成武器，把日志编译成真相，把规则边角编译成活下去的筹码。

description: |
  新手礼包弹出的时候，所有人都期待一个战斗职业：战士、法师、刺客，什么能杀怪的都行。
  
  陈默看到的选项是"数据编译者"。
  
  系统提示说这是隐藏分支，触发条件与"信息处理能力"相关。陈默想了想自己六年的程序员生涯——每天对着日志、报错、堆栈信息，把混乱的代码编译成能跑的程序。
  
  也许这就是密码。他的脑子已经被训练成一台编译器，现在系统只是给了他一个正式的接口。
  
  编译者的本质不是战斗，而是"加工"。他能把掉落物里的碎片、信息流里的异常波形、审计日志里的规则边角——全部编译成可用的模块。
  
  这些模块是临时的武器、临时的技能、临时的分析结果。它们有使用次数的限制，每次调用都会损耗，用完就要重新编译。
  
  编译过程消耗精神负荷。连续编译会让大脑像在跑一段没有注释的代码——混乱、幻觉、判断力下滑。
  
  但编译者有一个独特的优势：它与灰盒互相喂养。
  
  灰盒给编译者更多权限素材——弱点标注的数据、归属锁定的逻辑、冻结指令的波形。编译者把这些素材编译成更精准的模块，再喂回灰盒执行。
  
  这是一个闭环：看见规则→编译规则→执行规则→看见更多规则。
  
  每一次闭环，陈默都离规则的真相更近一步。但每一次闭环，观测权重也在后台默默上涨。

rules:
  - "编译掉落：把击杀产出的碎片编译成临时技能模块，有使用次数限制"
  - "编译信息：把情报、日志、异常波形编译成可执行的分析结果"
  - "编译规则：把规则边角编译成可临时激活的补丁片段"

constraints:
  - "觉醒条件与程序员背景相关——信息处理能力是密码"
  - "编译模块会损耗，用完需要重新编译补充"
  - "编译过程消耗精神负荷（混乱、幻觉、判断力下滑）"
  - "某些编译结果会触发观测权重（如编译审计日志）"

