# 设定条目：主城门槛与献祭规则
# 由 /pipeline-outline-bootstrap 创建

id: rule_005
name: 主城门槛与献祭规则
category: world_rule
status: tentative

summary: 门票是钥匙，但钥匙不等于入场。站在主城门口的人，必须交出一些东西——能量晶、权限点、或者血。献祭不是交易，是筛选。

description: |
  门票碎片合成的那一刻，主城入口像一道裂隙，撕开城市的边缘。
  
  裂隙里有光，但不是暖光。它是冷的、白的、像审计者投影边缘的那种灰烬色。陈默站在裂隙前，看见一个面板弹出来——献祭规则。
  
  面板上写着一句话：献祭不是交易，是筛选。
  
  系统不告诉你为什么要筛选，不告诉你筛选的标准是什么。它只给你三个选项，让你选一个：
  
  **能量晶献祭**——交出一定数量的能量晶。数量不是固定的，它会根据你的"贡献值"浮动。贡献值高的人，献祭数量低；贡献值低的人，献祭数量翻倍。系统像在说：你在这个城市里做了多少事，我们记得。记得的人，入场便宜；不记得的人，入场昂贵。
  
  **权限点献祭**——交出灰盒的权限点。这个选项对普通人不存在，只有灰盒持有者能看见。权限点是陈默最稀缺的资源，每次高阶指令都会消耗。献祭权限点意味着：你的灰盒会暂时变弱，你的权限窗口会暂时缩小，你的改写能力会暂时下降。
  
  **生命值献祭**——交出生命值比例。这是最危险的选项。献祭一定比例的生命值后，你的身体会变虚弱、你的恢复速度会下降、你在副本里的死亡阈值会降低。系统像在说：你要入场，就先流点血。
  
  三个选项，你必须选一个。不选，裂隙不开。
  
  陈默没有赌全据点。他带精简小队先试探，把献祭成本拆成"拆包献祭"和"分摊献祭"。
  
  拆包献祭——把献祭比例拆成小份，让队伍成员每人交一小部分。这样没有一个人的代价是致命的，但总和足够打开裂隙。
  
  分摊献祭——用灰盒做最低限度的绕过测试，把献祭比例压到可控范围。但他发现：灰盒可以降成本，但会立刻抬高观测权重。后台的账簿上，"异常改写者"的标签又亮了一次。
  
  陈默选择了拆包+分摊的组合。他不想用自己的权限点，不想用队友的血，也不想让观测权重飙升。他把成本压到了"可接受但不舒服"的程度——每个人都会虚弱几天，但没有人的命会悬在边缘。
  
  **入场后的变化**——灰盒的加成与记录。
  
  入城之后，陈默发现灰盒变得"更灵敏"。不是权限上限提升，而是加成——灰盒在主城里的响应速度更快、权限窗口更清晰、改写边角更精准。
  
  但灵敏的另一面是"记录"。主城的系统像审计者的后台，它把每一次灰盒的响应都记下来。陈默的观测权重在主城里上涨得更快，异常改写者的标签在主城里亮得更频繁。
  
  主城是灰盒的"放大器"，也是审计者的"显微镜"。陈默在主城里能做更多事，但他做的每一件事都会被更清楚地看见。
  
  **第二环：记忆回廊**——筛选的真正入口。
  
  入城试炼的第一环只是检票和分路。真正的筛选在第二环——记忆回廊。
  
  回廊是一条看不见尽头的长路。路上没有怪物，没有机关，只有"回放"。每个人必须走完一段回放——看见自己过去的某个片段、看见自己参与的某个项目、看见自己做过或没做过的某个选择。
  
  陈默看见的是CN-HL-07的断片。他看见自己站在一个代码仓库前，看见补丁日志在他视网膜上闪烁，看见灰盒在他手里第一次震动。他看见的不是完整的真相，只是碎片——像有人在剪辑一部电影，只给他看了几个镜头。
  
  回廊尽头写着一行字：重启次数：6。
  
  他不知道这行字的含义，不知道回廊为什么让他看见这些。但他知道：记忆回廊不只是筛选，它是审计。审计者在用回廊翻阅每一个入场者的档案，判定谁是漏洞、谁是钥匙、谁该被放进主城深处。

rules:
  - "献祭三选项：能量晶献祭（数量浮动，贡献值决定）、权限点献祭（灰盒持有者专属）、生命值献祭（比例献祭，最危险）"
  - "陈默的应对：拆包献祭（拆分给队伍）+ 分摊献祭（灰盒降成本但抬权重）"
  - "入场后灰盒加成：响应更快、窗口更清晰、改写更精准（不是权限上限提升）"
  - "入场后记录加成：观测权重上涨更快、异常标签亮得更频繁"

constraints:
  - "献祭不是交易，是筛选——系统不公布筛选标准"
  - "灰盒降献祭成本会抬高观测权重"
  - "记忆回廊作用保持神秘（揭示真相？审计检测？筛选门槛？）"

