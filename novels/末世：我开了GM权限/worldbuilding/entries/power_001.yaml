# 设定条目：灰盒调试器
# 由 /pipeline-outline-bootstrap 创建

id: power_001
name: 灰盒调试器
category: power_system
status: tentative

summary: 开发者模式的入口，规则漏洞的钥匙。每次动用，观测者就更近一步。

description: |
  陈默手里的东西不是"装备"，也不是"觉醒产物"。
  
  它是一个入口。
  
  灰盒调试器的本质是**开发者模式的钥匙**——它让持有者能窥视规则的后台，能看见普通人看不见的弱点裂纹，能锁定掉落的归属权，能冻结怪物的一秒钟，能把普通物品临时"补丁化"成规则生效的形态。
  
  但这个入口没有说明书，也没有安全护栏。
  
  每一次动用，系统都会记录。
  
  观测权重不是数字游戏，它是**审判的倒计时**。权重上涨意味着有人在后台翻你的档案、有人在跨区频道讨论你的坐标、有人在清算名单上把你的名字从"待观察"改成"必杀"。
  
  白烬会猎杀GM。更大的势力在等他上线。
  
  使用灰盒的代价：
  
  **权限点**——每一次高阶指令都要消耗。权限点不可再生，只能通过击杀精英、完成审计任务、解锁管理员碎片来补充。用完的那一天，灰盒变成废铁。
  
  **精神负荷**——连续使用会让大脑像过载的CPU。幻觉、记忆断层、判断力下滑。不是累，是"被改写"。
  
  **观测权重上调**——这是真正的惩罚。权重累积到临界值时，审计者会降下"异常判定"。具体形式未知，但大纲暗示：会被追杀、会被跨区势力锁定、会被系统主动制造"事故"。
  
  陈默不知道灰盒从哪来的。他只知道那枚黑色手环在他抽屉里震动了三次，而第三次之后，世界开服了。

rules:
  - "弱点标注：把怪物弱点以高亮裂纹显示，视觉层权限"
  - "归属锁定：短时间锁定击杀归属与掉落绑定，规则层权限"
  - "冻结指令：对单体强制停滞0.5-1秒，高阶权限，冷却长"
  - "补丁注入：把普通物品临时规则化，最危险的权限"

constraints:
  - "权限点稀缺且不可再生，用完灰盒失效"
  - "连续使用增加精神负荷（幻觉、记忆断层、判断力下滑）"
  - "观测权重上调——审计者追踪、势力锁定、清算名单升级"
  - "观测惩罚临界值触发时，后果未知但必然致命"

