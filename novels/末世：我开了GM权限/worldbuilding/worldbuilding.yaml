# 世界观索引
# 由 /novel-init 创建，/setting-add 自动更新
# 与 setting.md 互补：此文件为结构化索引，setting.md 为叙述性文档
# 详细设定条目存放在 entries/ 目录下

# ============================================================
# 核心概念（3-5 条定义这个世界的基本规则）
# ============================================================
core_concepts:
  - name: 世界融合
    one_liner: 城市被游戏吞噬，规则成为物理，死亡不再有后路
    entry_id: rule_001
  - name: 观测权重
    one_liner: 每一次规则的改写都在后台留下痕迹，权重累积到临界值时审判降临
    entry_id: rule_002
  - name: 暗潮机制
    one_liner: 世界的呼吸是错的，每夜零点数据风暴涌起，精神污染渗透
    entry_id: rule_003
  - name: 据点体系
    one_liner: 人在末世里需要一个锚点，篝火→庇护所→领地，三级递进
    entry_id: rule_004
  - name: 主城门槛
    one_liner: 门票是钥匙，但钥匙不等于入场，献祭不是交易是筛选
    entry_id: rule_005

# ============================================================
# 力量体系概要
# ============================================================
power_system:
  name: 灰盒+编译者双体系
  type: 规则改写
  entry_ids:
    - power_001
    - power_002
  summary: 灰盒是开发者模式的入口，编译者是信息加工者，两者互相喂养但每次使用观测者更近一步

# ============================================================
# 势力概要
# ============================================================
factions_summary:
  - name: 白烬会
    stance: 猎杀GM，清算弱者，把末世当竞技场
    entry_id: faction_001
  - name: 烬环商会
    stance: 资源寡头，掌控税券与账本，让你买不到水
    entry_id: faction_002
  - name: 黑潮同盟
    stance: 跨区掠夺者，潮印追猎，在等跨区门
    entry_id: faction_003
  - name: 审计者/烬序
    stance: 系统监察，判定漏洞，不执行只盖章
    entry_id: faction_004

# ============================================================
# 地理概要
# ============================================================
geography_summary:
  spatial_hierarchy: 城市→副本→主城→跨区门
  entry_ids: []
  note: 地理设定尚未补全，可在后续pipeline-setting-consolidate中添加

